<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2DD4BF">
  <title>Hadley's Dream World</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/creatures.css">
  <link rel="stylesheet" href="css/fashion.css">
  <link rel="stylesheet" href="css/room.css">
</head>
<body>

  <!-- Save Indicator -->
  <div id="save-indicator" class="save-indicator">
    <span id="save-icon">☁️</span>
    <span id="save-text">Saved</span>
  </div>

  <!-- ========== Loading Screen ========== -->
  <div id="loading-screen" class="screen active">
    <div class="loader"></div>
    <p>Loading Dream World...</p>
    <p style="font-size:0.7em;color:#aaa;margin-top:10px;">v4</p>
  </div>

  <!-- ========== Hub Screen ========== -->
  <div id="hub-screen" class="screen" style="display:none;">
    <div class="hub-settings">
      <button class="icon-btn" id="btn-mute" title="Toggle Sound">🔊</button>
      <button class="icon-btn" id="btn-collection" title="Collection">📖</button>
      <button class="icon-btn" id="btn-stats" title="Stats">📊</button>
    </div>

    <h1 class="hub-title sparkle-text">Hadley's Dream World</h1>
    <p class="hub-subtitle">Choose your adventure!</p>

    <div class="hub-stats">
      <div class="stat-badge"><span class="stat-icon">🪙</span> <span id="hub-coins">100</span></div>
      <div class="stat-badge"><span class="stat-icon">🐾</span> <span id="hub-creatures">0</span>/<span id="hub-creatures-total">30</span></div>
      <div class="stat-badge"><span class="stat-icon">👗</span> <span id="hub-outfits">21</span></div>
    </div>

    <div class="hub-modes">
      <button class="mode-btn creatures" onclick="Game.switchMode('creatures')">
        <div class="mode-icon">🌿</div>
        <div class="mode-info">
          Creature World
          <small>Explore & catch cute creatures</small>
        </div>
      </button>
      <button class="mode-btn fashion" onclick="Game.switchMode('fashion')">
        <div class="mode-icon">👗</div>
        <div class="mode-info">
          Fashion Studio
          <small>Style outfits & win challenges</small>
        </div>
      </button>
      <!-- Room mode hidden temporarily
      <button class="mode-btn room" onclick="Game.switchMode('room')">
        <div class="mode-icon">🏠</div>
        <div class="mode-info">
          Dream Room
          <small>Decorate your perfect room</small>
        </div>
      </button>
      -->
    </div>
  </div>

  <!-- ========== Creature World Screen ========== -->
  <div id="creatures-screen" class="screen" style="display:none;">
    <div class="top-bar" id="creatures-top">
      <button class="back-btn" onclick="Game.switchMode('hub')">←</button>
      <span class="title">Creature World</span>
      <span class="coins-display">🪙 <span class="coins-val">0</span></span>
    </div>

    <!-- Location Select -->
    <div id="location-select" class="scroll-area">
      <h2 style="text-align:center;margin-bottom:16px;">Choose a Location</h2>
      <div class="location-grid" id="location-grid"></div>
    </div>

    <!-- Location Explore -->
    <div id="location-explore" class="hidden">
      <div class="location-scene" id="location-scene">
        <div class="location-name" id="location-name-display"></div>
        <div class="explore-spots" id="explore-spots"></div>
        <button class="btn small back-location-btn" onclick="CreatureWorld.backToLocations()">← Back</button>
      </div>
    </div>

    <!-- Catch Mini-Game Canvas Overlay -->
    <div id="catch-overlay" class="hidden">
      <div id="catch-creature-svg" class="hidden"></div>
      <canvas id="catch-canvas"></canvas>
      <div id="catch-info">
        <div id="catch-creature-name"></div>
        <div id="catch-rarity"></div>
        <div id="catch-instruction">Tap when the circles align!</div>
      </div>
      <div id="catch-result" class="hidden">
        <div id="catch-result-text"></div>
        <button class="btn" onclick="CreatureWorld.closeCatch()">OK!</button>
      </div>
    </div>
  </div>

  <!-- ========== Fashion Studio Screen ========== -->
  <div id="fashion-screen" class="screen" style="display:none;">
    <div class="top-bar">
      <button class="back-btn" onclick="Game.switchMode('hub')">←</button>
      <span class="title">Fashion Studio</span>
      <span class="coins-display">🪙 <span class="coins-val">0</span></span>
    </div>

    <div id="fashion-main" class="scroll-area">
      <div class="fashion-menu">
        <button class="btn" onclick="Fashion.startFreeMode()">Free Dress</button>
        <button class="btn pink" onclick="Fashion.startChallenge()">Challenge!</button>
        <button class="btn gold" onclick="Fashion.openShop()">Shop 🛍️</button>
      </div>
      <div class="fashion-recent-scores" id="fashion-recent"></div>
    </div>

    <!-- Dress-up area -->
    <div id="fashion-dressup" class="hidden">
      <div class="dressup-layout">
        <div class="avatar-area" id="avatar-area">
          <div class="avatar" id="avatar-display"></div>
          <div id="challenge-timer" class="hidden">
            <span id="timer-display">60</span>s
          </div>
          <div id="challenge-theme-label" class="hidden"></div>
        </div>
        <div class="wardrobe-area" id="wardrobe-area">
          <div class="wardrobe-tabs" id="wardrobe-tabs"></div>
          <div class="wardrobe-items" id="wardrobe-items"></div>
        </div>
      </div>
      <div class="dressup-actions">
        <button class="btn small" onclick="Fashion.clearOutfit()">Clear</button>
        <button class="btn small pink" id="btn-submit-outfit" onclick="Fashion.submitChallenge()">Submit</button>
        <button class="btn small" onclick="Fashion.exitDressup()">Done</button>
      </div>
    </div>

    <!-- Fashion Shop -->
    <div id="fashion-shop" class="hidden scroll-area">
      <div class="shop-header">
        <button class="btn small" onclick="Fashion.closeShop()">← Back</button>
        <h2>Fashion Shop</h2>
        <span class="coins-display">🪙 <span class="coins-val">0</span></span>
      </div>
      <div class="shop-tabs" id="shop-tabs"></div>
      <div class="shop-grid" id="shop-grid"></div>
    </div>

    <!-- Challenge Result -->
    <div id="challenge-result" class="hidden modal-overlay">
      <div class="modal">
        <h2 id="challenge-result-title"></h2>
        <div class="stars" id="challenge-stars"></div>
        <p id="challenge-score-text"></p>
        <p id="challenge-coins-earned"></p>
        <button class="btn" onclick="Fashion.closeResult()">Yay!</button>
      </div>
    </div>
  </div>

  <!-- Dream Room Screen — hidden temporarily
  <div id="room-screen" class="screen" style="display:none;">
    <div class="top-bar">
      <button class="back-btn" onclick="Game.switchMode('hub')">←</button>
      <span class="title">Dream Room</span>
      <span class="coins-display">🪙 <span class="coins-val">0</span></span>
    </div>

    <div class="room-container" id="room-container">
      <div class="room-grid" id="room-grid"></div>
      <div id="room-creatures"></div>
    </div>

    <div class="room-toolbar" id="room-toolbar">
      <button class="toolbar-btn active" data-tab="furniture" onclick="Room.switchTab('furniture')">🪑</button>
      <button class="toolbar-btn" data-tab="creatures" onclick="Room.switchTab('creatures')">🐾</button>
      <button class="toolbar-btn" data-tab="themes" onclick="Room.switchTab('themes')">🎨</button>
      <button class="toolbar-btn" data-tab="shop" onclick="Room.switchTab('shop')">🛒</button>
    </div>

    <div class="room-panel" id="room-panel">
      <div id="room-panel-content"></div>
    </div>
  </div>
  -->

  <!-- ========== Collection Screen (Modal) ========== -->
  <div id="collection-overlay" class="hidden modal-overlay" onclick="Game.closeCollection(event)">
    <div class="modal" style="max-width:460px;max-height:85vh;" onclick="event.stopPropagation()">
      <h2>Creature Collection</h2>
      <div class="card-grid" id="collection-grid" style="grid-template-columns:repeat(auto-fill,minmax(80px,1fr));"></div>
      <button class="btn small" style="margin-top:16px;width:100%;" onclick="Game.closeCollection()">Close</button>
    </div>
  </div>

  <!-- ========== Stats Screen (Modal) ========== -->
  <div id="stats-overlay" class="hidden modal-overlay" onclick="Game.closeStats(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2>Stats & Leaderboard</h2>
      <div id="stats-content"></div>
      <div id="leaderboard-content" style="margin-top:16px;"></div>
      <button class="btn small" style="margin-top:16px;width:100%;" onclick="Game.closeStats()">Close</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/save.js"></script>
  <script src="js/creatures.js"></script>
  <script src="js/fashion.js"></script>
  <script src="js/room.js"></script>
  <script src="js/game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    }
  </script>
</body>
</html>
