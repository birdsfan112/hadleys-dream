<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .body{fill:#FFB6C1;stroke:#DDA0DD;stroke-width:2}
    .eye{fill:#333} .shine{fill:#FFF}
    .blush{fill:#FF69B4;opacity:0.25}
  </style>
  <!-- Tail -->
  <path d="M140 145 Q165 155 170 140 Q175 125 160 130" stroke="#DDA0DD" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Tail flower -->
  <circle cx="170" cy="138" r="5" fill="#FF69B4"/><circle cx="170" cy="138" r="2" fill="#FFD700"/>
  <!-- Wings (stubby) -->
  <path d="M55 95 Q35 70 45 55 Q55 50 60 65 Q65 75 65 95 Z" fill="#DDA0DD" stroke="#C8A2C8" stroke-width="1" opacity="0.7"/>
  <path d="M145 95 Q165 70 155 55 Q145 50 140 65 Q135 75 135 95 Z" fill="#DDA0DD" stroke="#C8A2C8" stroke-width="1" opacity="0.7"/>
  <!-- Body -->
  <ellipse cx="100" cy="125" rx="40" ry="35" class="body"/>
  <!-- Lighter belly -->
  <ellipse cx="100" cy="133" rx="25" ry="22" fill="#FFD6E0" stroke="none"/>
  <!-- Head -->
  <circle cx="100" cy="78" r="32" class="body"/>
  <!-- Flower wreath around neck -->
  <circle cx="72" cy="100" r="4" fill="#FF69B4"/>
  <circle cx="72" cy="100" r="1.5" fill="#FFD700"/>
  <circle cx="84" cy="95" r="3.5" fill="#DDA0DD"/>
  <circle cx="84" cy="95" r="1.5" fill="#FFF"/>
  <circle cx="100" cy="93" r="4" fill="#FFD700"/>
  <circle cx="100" cy="93" r="1.5" fill="#FFF"/>
  <circle cx="116" cy="95" r="3.5" fill="#FF69B4"/>
  <circle cx="116" cy="95" r="1.5" fill="#FFD700"/>
  <circle cx="128" cy="100" r="4" fill="#9999FF"/>
  <circle cx="128" cy="100" r="1.5" fill="#FFF"/>
  <!-- Eyes (dreamy half-lidded) -->
  <circle cx="86" cy="75" r="8" class="eye"/>
  <circle cx="114" cy="75" r="8" class="eye"/>
  <circle cx="89" cy="73" r="3" class="shine"/>
  <circle cx="117" cy="73" r="3" class="shine"/>
  <!-- Eyelids -->
  <path d="M78 72 Q86 68 94 72" fill="#FFB6C1" stroke="none"/>
  <path d="M106 72 Q114 68 122 72" fill="#FFB6C1" stroke="none"/>
  <!-- Blush -->
  <ellipse cx="72" cy="84" rx="8" ry="5" class="blush"/>
  <ellipse cx="128" cy="84" rx="8" ry="5" class="blush"/>
  <!-- Nose -->
  <ellipse cx="100" cy="82" rx="3" ry="2.5" fill="#DDA0DD"/>
  <!-- Mouth -->
  <path d="M94 88 Q100 93 106 88" stroke="#DDA0DD" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Small horns -->
  <polygon points="82,50 78,38 86,48" fill="#DDA0DD"/>
  <polygon points="118,50 122,38 114,48" fill="#DDA0DD"/>
  <!-- Feet -->
  <ellipse cx="80" cy="158" rx="12" ry="7" class="body"/>
  <ellipse cx="120" cy="158" rx="12" ry="7" class="body"/>
  <!-- Floating hearts -->
  <path d="M45 55 Q45 50 48 50 Q51 50 51 54 Q51 58 45 62 Q39 58 39 54 Q39 50 42 50 Q45 50 45 55 Z" fill="#FF69B4" opacity="0.4">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="1.8s" repeatCount="indefinite"/>
  </path>
  <path d="M155 45 Q155 40 158 40 Q161 40 161 44 Q161 48 155 52 Q149 48 149 44 Q149 40 152 40 Q155 40 155 45 Z" fill="#DDA0DD" opacity="0.3">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </path>
  <path d="M50 130 Q50 126 52.5 126 Q55 126 55 129 Q55 132 50 135 Q45 132 45 129 Q45 126 47.5 126 Q50 126 50 130 Z" fill="#FFB6C1" opacity="0.35">
    <animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>