<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="dd-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6D9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="dd-eye-shine" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:0.3" />
    </radialGradient>
    <radialGradient id="dd-glow-aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFB6C1;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#FFB6C1;stop-opacity:0" />
    </radialGradient>
    <filter id="dd-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dd-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <style>
    @keyframes dd-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes dd-petal-drift {
      0% { transform: translateY(0px) translateX(0px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-40px) translateX(12px) rotate(180deg); opacity: 0; }
    }
    @keyframes dd-heart-float {
      0%, 100% { opacity: 0.2; transform: translateY(0px); }
      50% { opacity: 0.6; transform: translateY(-8px); }
    }
    .dd-body { animation: dd-breathe 3s ease-in-out infinite; }
    .dd-petal { animation: dd-petal-drift 3.5s ease-in infinite; }
    .dd-heart { animation: dd-heart-float 2s ease-in-out infinite; }
  </style>

  <!-- Soft rosy glow aura -->
  <circle cx="100" cy="108" r="68" fill="url(#dd-glow-aura)"/>

  <!-- Elegant tail with flowers -->
  <path d="M142 145 Q168 158 175 140 Q180 125 162 130" stroke="url(#dd-body-grad)" stroke-width="9" fill="none" stroke-linecap="round" filter="url(#dd-shadow)"/>
  <!-- Flower on tail -->
  <circle cx="175" cy="138" r="6" fill="#FF69B4" filter="url(#dd-shadow)"/>
  <circle cx="175" cy="138" r="3" fill="#FFD700"/>

  <!-- Stubby wings (cute, flower-patterned) -->
  <path d="M52 98 Q32 70 42 52 Q54 48 62 68 Q68 82 68 98 Z" fill="url(#dd-body-grad)" stroke="#DDA0DD" stroke-width="1.5" opacity="0.8" filter="url(#dd-shadow)"/>
  <!-- Wing flower pattern -->
  <circle cx="48" cy="75" r="3" fill="#FF69B4" opacity="0.6"/>
  <circle cx="60" cy="70" r="2.5" fill="#FFD700" opacity="0.5"/>

  <path d="M148 98 Q168 70 158 52 Q146 48 138 68 Q132 82 132 98 Z" fill="url(#dd-body-grad)" stroke="#DDA0DD" stroke-width="1.5" opacity="0.8" filter="url(#dd-shadow)"/>
  <!-- Wing flower pattern -->
  <circle cx="152" cy="75" r="3" fill="#FF69B4" opacity="0.6"/>
  <circle cx="140" cy="70" r="2.5" fill="#FFD700" opacity="0.5"/>

  <!-- Body -->
  <g class="dd-body">
    <ellipse cx="100" cy="130" rx="42" ry="37" fill="url(#dd-body-grad)" filter="url(#dd-shadow)"/>
    <!-- Belly -->
    <ellipse cx="100" cy="138" rx="28" ry="24" fill="#FFD6E0" opacity="0.5"/>

    <!-- Head -->
    <circle cx="100" cy="80" r="34" fill="url(#dd-body-grad)" filter="url(#dd-shadow)"/>

    <!-- Small graceful horns -->
    <polygon points="80,48 75,32 88,46" fill="url(#dd-body-grad)" filter="url(#dd-shadow)"/>
    <polygon points="120,48 125,32 112,46" fill="url(#dd-body-grad)" filter="url(#dd-shadow)"/>

    <!-- Flower wreath around neck (precious) -->
    <circle cx="70" cy="105" r="5" fill="#FF69B4" filter="url(#dd-shadow)"/>
    <circle cx="70" cy="105" r="2" fill="#FFD700"/>
    <circle cx="83" cy="98" r="4" fill="#DDA0DD" filter="url(#dd-shadow)"/>
    <circle cx="83" cy="98" r="1.8" fill="#FFF" opacity="0.7"/>
    <circle cx="100" cy="96" r="5" fill="#FFD700" filter="url(#dd-shadow)"/>
    <circle cx="100" cy="96" r="2" fill="#FFF" opacity="0.6"/>
    <circle cx="117" cy="98" r="4" fill="#FF69B4" filter="url(#dd-shadow)"/>
    <circle cx="117" cy="98" r="1.8" fill="#FFD700" opacity="0.7"/>
    <circle cx="130" cy="105" r="5" fill="#9999FF" filter="url(#dd-shadow)"/>
    <circle cx="130" cy="105" r="2" fill="#FFF" opacity="0.6"/>

    <!-- Eyes (dreamy, gentle half-closed) -->
    <circle cx="85" cy="78" r="9" fill="#2C3E50"/>
    <circle cx="115" cy="78" r="9" fill="#2C3E50"/>
    <!-- Eye shine (soft) -->
    <circle cx="88" cy="75" r="4" fill="url(#dd-eye-shine)"/>
    <circle cx="118" cy="75" r="4" fill="url(#dd-eye-shine)"/>
    <circle cx="90" cy="72" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="120" cy="72" r="1.5" fill="#FFFFFF" opacity="0.8"/>

    <!-- Sleepy eyelids -->
    <path d="M76 74 Q85 70 94 74" fill="#FFB6C1" opacity="0.4"/>
    <path d="M106 74 Q115 70 124 74" fill="#FFB6C1" opacity="0.4"/>

    <!-- Blush (soft and sweet) -->
    <ellipse cx="70" cy="88" rx="11" ry="6" fill="#FF69B4" opacity="0.24"/>
    <ellipse cx="130" cy="88" rx="11" ry="6" fill="#FF69B4" opacity="0.24"/>

    <!-- Nose (tiny) -->
    <ellipse cx="100" cy="84" rx="3.5" ry="3" fill="#DDA0DD"/>
    <circle cx="100" cy="83" r="0.8" fill="#FFFFFF" opacity="0.6"/>

    <!-- Gentle smile -->
    <path d="M93 92 Q100 98 107 92" stroke="#DDA0DD" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Feet -->
  <ellipse cx="78" cy="165" rx="14" ry="8" fill="url(#dd-body-grad)" filter="url(#dd-shadow)"/>
  <ellipse cx="122" cy="165" rx="14" ry="8" fill="url(#dd-body-grad)" filter="url(#dd-shadow)"/>

  <!-- Floating flower petals (drifting) -->
  <circle cx="140" cy="60" r="2.5" fill="#FF69B4" class="dd-petal" style="animation-delay: 0s"/>
  <circle cx="60" cy="50" r="2" fill="#DDA0DD" class="dd-petal" style="animation-delay: 0.7s"/>
  <circle cx="115" cy="70" r="2" fill="#FFD700" class="dd-petal" style="animation-delay: 1.4s"/>
  <circle cx="80" cy="60" r="2.5" fill="#FF69B4" class="dd-petal" style="animation-delay: 2.1s"/>

  <!-- Floating hearts (love/dreams) -->
  <path d="M50 58 Q50 52 53.5 52 Q57 52 57 57 Q57 62 50 68 Q43 62 43 57 Q43 52 46.5 52 Q50 52 50 58 Z" fill="#FF69B4" class="dd-heart" style="animation-delay: 0s" opacity="0.4"/>
  <path d="M160 48 Q160 42 163.5 42 Q167 42 167 47 Q167 52 160 58 Q153 52 153 47 Q153 42 156.5 42 Q160 42 160 48 Z" fill="#DDA0DD" class="dd-heart" style="animation-delay: 0.5s" opacity="0.35"/>
  <path d="M55 140 Q55 135 58 135 Q61 135 61 139 Q61 143 55 147 Q49 143 49 139 Q49 135 52 135 Q55 135 55 140 Z" fill="#FFB6C1" class="dd-heart" style="animation-delay: 1s" opacity="0.3"/>
</svg>
