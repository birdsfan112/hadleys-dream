<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bs-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6BA3C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7FA0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bs-belly" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#B8D5E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7BA8C8;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="bs-eye-shine" cx="60%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.3" />
    </radialGradient>
    <filter id="bs-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bs-bubble1" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#87CEEB;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:0.15" />
    </radialGradient>
  </defs>
  <style>
    @keyframes bs-bobbing {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes bs-bubble-float {
      0% { transform: translateY(20px); opacity: 1; }
      100% { transform: translateY(-40px); opacity: 0.3; }
    }
    .bs-body { animation: bs-bobbing 3s ease-in-out infinite; }
    .bs-bubble { animation: bs-bubble-float 4s ease-in forwards; }
  </style>

  <!-- Shadow -->
  <ellipse cx="100" cy="160" rx="45" ry="8" fill="#000" opacity="0.1"/>

  <!-- Body group with bobbing animation -->
  <g class="bs-body">
    <!-- Main body -->
    <ellipse cx="100" cy="120" rx="52" ry="38" fill="url(#bs-body-grad)" filter="url(#bs-shadow)"/>
    <!-- Head -->
    <circle cx="100" cy="80" r="38" fill="url(#bs-body-grad)" filter="url(#bs-shadow)"/>
    <!-- Belly highlight -->
    <ellipse cx="100" cy="128" rx="36" ry="20" fill="url(#bs-belly)"/>

    <!-- Left flipper -->
    <ellipse cx="55" cy="135" rx="18" ry="11" fill="url(#bs-body-grad)" transform="rotate(-30 55 135)" filter="url(#bs-shadow)"/>
    <!-- Right flipper -->
    <ellipse cx="145" cy="135" rx="18" ry="11" fill="url(#bs-body-grad)" transform="rotate(30 145 135)" filter="url(#bs-shadow)"/>

    <!-- Tail -->
    <ellipse cx="100" cy="165" rx="15" ry="9" fill="url(#bs-body-grad)"/>

    <!-- Eyes with shine -->
    <circle cx="82" cy="78" r="7" fill="#2C3E50"/>
    <circle cx="118" cy="78" r="7" fill="#2C3E50"/>
    <circle cx="82" cy="76" r="4" fill="url(#bs-eye-shine)"/>
    <circle cx="118" cy="76" r="4" fill="url(#bs-eye-shine)"/>
    <circle cx="84" cy="74" r="1.5" fill="#FFF"/>
    <circle cx="120" cy="74" r="1.5" fill="#FFF"/>

    <!-- Nose -->
    <ellipse cx="100" cy="92" rx="5" ry="4" fill="#4A7FA0"/>
    <!-- Small nose shine -->
    <circle cx="102" cy="91" r="1.5" fill="#87CEEB" opacity="0.6"/>

    <!-- Whiskers -->
    <line x1="65" y1="88" x2="50" y2="85" stroke="#4A7FA0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="68" y1="95" x2="52" y2="98" stroke="#4A7FA0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="70" y1="100" x2="55" y2="108" stroke="#4A7FA0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="135" y1="88" x2="150" y2="85" stroke="#4A7FA0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="132" y1="95" x2="148" y2="98" stroke="#4A7FA0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="130" y1="100" x2="145" y2="108" stroke="#4A7FA0" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Mouth (cute smile) -->
    <path d="M90 105 Q100 112 110 105" stroke="#4A7FA0" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Cheek blush -->
    <ellipse cx="65" cy="92" rx="10" ry="6" fill="#FF69B4" opacity="0.2"/>
    <ellipse cx="135" cy="92" rx="10" ry="6" fill="#FF69B4" opacity="0.2"/>
  </g>

  <!-- Floating bubbles with animation -->
  <circle cx="140" cy="45" r="9" fill="url(#bs-bubble1)" stroke="#87CEEB" stroke-width="1.5" class="bs-bubble" style="animation-delay: 0s"/>
  <circle cx="155" cy="30" r="7" fill="url(#bs-bubble1)" stroke="#87CEEB" stroke-width="1.2" class="bs-bubble" style="animation-delay: 0.8s"/>
  <circle cx="125" cy="35" r="6" fill="url(#bs-bubble1)" stroke="#87CEEB" stroke-width="1" class="bs-bubble" style="animation-delay: 1.5s"/>
</svg>
