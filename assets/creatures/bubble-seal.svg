<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .body{fill:#B0C4DE;stroke:#87CEEB;stroke-width:2}
    .eye{fill:#333} .shine{fill:#FFF}
    .blush{fill:#FF69B4;opacity:0.25}
  </style>
  <!-- Body (plump seal lying on belly) -->
  <ellipse cx="100" cy="125" rx="55" ry="40" class="body"/>
  <!-- Head -->
  <circle cx="100" cy="85" r="38" class="body"/>
  <!-- Lighter belly -->
  <ellipse cx="100" cy="135" rx="38" ry="22" fill="#D6E4F0" opacity="0.6"/>
  <!-- Left flipper -->
  <ellipse cx="55" cy="140" rx="20" ry="10" class="body" transform="rotate(-25 55 140)"/>
  <!-- Right flipper -->
  <ellipse cx="145" cy="140" rx="20" ry="10" class="body" transform="rotate(25 145 140)"/>
  <!-- Tail -->
  <ellipse cx="100" cy="170" rx="16" ry="8" class="body"/>
  <!-- Eyes -->
  <circle cx="85" cy="82" r="6" class="eye"/>
  <circle cx="115" cy="82" r="6" class="eye"/>
  <circle cx="87" cy="79" r="2.5" class="shine"/>
  <circle cx="117" cy="79" r="2.5" class="shine"/>
  <!-- Nose -->
  <ellipse cx="100" cy="92" rx="5" ry="3.5" fill="#87CEEB"/>
  <!-- Whisker dots -->
  <circle cx="85" cy="95" r="1.5" fill="#87CEEB" opacity="0.6"/>
  <circle cx="80" cy="92" r="1.5" fill="#87CEEB" opacity="0.6"/>
  <circle cx="82" cy="98" r="1.5" fill="#87CEEB" opacity="0.6"/>
  <circle cx="115" cy="95" r="1.5" fill="#87CEEB" opacity="0.6"/>
  <circle cx="120" cy="92" r="1.5" fill="#87CEEB" opacity="0.6"/>
  <circle cx="118" cy="98" r="1.5" fill="#87CEEB" opacity="0.6"/>
  <!-- Mouth -->
  <path d="M93 100 Q100 106 107 100" stroke="#87CEEB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="72" cy="92" rx="9" ry="5" class="blush"/>
  <ellipse cx="128" cy="92" rx="9" ry="5" class="blush"/>
  <!-- Floating bubbles -->
  <circle cx="140" cy="55" r="8" fill="none" stroke="#87CEEB" stroke-width="1" opacity="0.5"/>
  <circle cx="155" cy="40" r="6" fill="none" stroke="#87CEEB" stroke-width="0.8" opacity="0.4"/>
  <circle cx="130" cy="38" r="5" fill="none" stroke="#87CEEB" stroke-width="0.8" opacity="0.3"/>
</svg>