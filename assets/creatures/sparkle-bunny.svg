<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Fur gradients -->
    <radialGradient id="sb-body-grad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#FFD6E8"/>
      <stop offset="50%" stop-color="#FFB6D9"/>
      <stop offset="100%" stop-color="#E85BA8"/>
    </radialGradient>
    <linearGradient id="sb-ear-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCCE0"/>
      <stop offset="100%" stop-color="#FF99CC"/>
    </linearGradient>
    <radialGradient id="sb-shine-grad" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow filter -->
    <filter id="sb-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <style>
    .sb-body { fill: url(#sb-body-grad); }
    .sb-ear { fill: url(#sb-ear-grad); stroke: #E85BA8; stroke-width: 1.5; }
    .sb-ear-inner { fill: #FFB6D9; opacity: 0.7; }
    .sb-eye { fill: #2C2C2C; }
    .sb-star-eye { fill: #2C2C2C; }
    .sb-shine { fill: white; }
    .sb-blush { fill: #FF99CC; opacity: 0.5; filter: url(#blur); }
    .sb-tail { fill: url(#sb-body-grad); filter: url(#sb-shadow); }
    .sb-sparkle { fill: #FFE66D; opacity: 0.8; }
  </style>

  <filter id="blur"><feGaussianBlur in="SourceGraphic" stdDeviation="2"/></filter>

  <!-- Shadow beneath -->
  <ellipse cx="100" cy="175" rx="45" ry="8" fill="#000000" opacity="0.1"/>

  <!-- Left ear -->
  <ellipse cx="70" cy="35" rx="16" ry="48" class="sb-ear"/>
  <ellipse cx="70" cy="45" rx="9" ry="35" class="sb-ear-inner"/>
  <!-- Right ear -->
  <ellipse cx="130" cy="35" rx="16" ry="48" class="sb-ear"/>
  <ellipse cx="130" cy="45" rx="9" ry="35" class="sb-ear-inner"/>

  <!-- Fluffy body -->
  <circle cx="100" cy="125" r="56" class="sb-body"/>
  <!-- Body highlight for roundness -->
  <ellipse cx="85" cy="100" rx="25" ry="30" fill="#FFFFFF" opacity="0.15"/>

  <!-- Fluffy tail to the side -->
  <g class="sb-tail">
    <ellipse cx="155" cy="120" rx="18" ry="22" transform="rotate(35 155 120)"/>
    <circle cx="165" cy="105" r="10"/>
  </g>

  <!-- Feet -->
  <ellipse cx="75" cy="175" rx="16" ry="11" class="sb-body"/>
  <ellipse cx="125" cy="175" rx="16" ry="11" class="sb-body"/>
  <!-- Foot shine -->
  <ellipse cx="75" cy="172" rx="10" ry="6" fill="#FFFFFF" opacity="0.2"/>
  <ellipse cx="125" cy="172" rx="10" ry="6" fill="#FFFFFF" opacity="0.2"/>

  <!-- Eyes - star pupils -->
  <!-- Left eye -->
  <circle cx="80" cy="110" r="10" class="sb-eye"/>
  <!-- Star pupil left -->
  <path d="M80 105 L82 108 L85 109 L82 111 L83 114 L80 112 L77 114 L78 111 L75 109 L78 108 Z" class="sb-eye" fill="#FF1493"/>
  <!-- Eye shine spots -->
  <circle cx="82" cy="106" r="3" class="sb-shine"/>
  <circle cx="78" cy="108" r="1.5" class="sb-shine"/>

  <!-- Right eye -->
  <circle cx="120" cy="110" r="10" class="sb-eye"/>
  <!-- Star pupil right -->
  <path d="M120 105 L122 108 L125 109 L122 111 L123 114 L120 112 L117 114 L118 111 L115 109 L118 108 Z" class="sb-eye" fill="#FF1493"/>
  <!-- Eye shine spots -->
  <circle cx="122" cy="106" r="3" class="sb-shine"/>
  <circle cx="118" cy="108" r="1.5" class="sb-shine"/>

  <!-- Rosy cheeks -->
  <ellipse cx="55" cy="128" rx="14" ry="9" class="sb-blush"/>
  <ellipse cx="145" cy="128" rx="14" ry="9" class="sb-blush"/>

  <!-- Nose -->
  <ellipse cx="100" cy="125" rx="5" ry="4" fill="#FF69B4"/>
  <circle cx="101" cy="124" r="1.5" class="sb-shine"/>

  <!-- Mouth - cute smile -->
  <path d="M95 135 Q100 142 105 135" stroke="#E85BA8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Red bow with gem -->
  <g transform="translate(130, 48)">
    <!-- Left bow side -->
    <path d="M-8 0 Q-15 -8 -18 0 Q-15 8 -8 8 Z" fill="#FF1744" stroke="#CC0033" stroke-width="1"/>
    <!-- Right bow side -->
    <path d="M8 0 Q15 -8 18 0 Q15 8 8 8 Z" fill="#FF1744" stroke="#CC0033" stroke-width="1"/>
    <!-- Gem center -->
    <circle cx="0" cy="4" r="4" fill="#FF6B9D" stroke="#E85BA8" stroke-width="1"/>
    <!-- Gem shine -->
    <circle cx="-1" cy="2" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Floating sparkle stars - animated opacity -->
  <g class="sb-sparkle">
    <!-- Sparkle 1 - top left -->
    <g transform="translate(40, 70)">
      <path d="M0 -8 L2 -2 L8 0 L2 2 L0 8 L-2 2 L-8 0 L-2 -2 Z" class="sb-sparkle"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </g>
    <!-- Sparkle 2 - top right -->
    <g transform="translate(160, 65)">
      <path d="M0 -7 L1.5 -1.5 L7 0 L1.5 1.5 L0 7 L-1.5 1.5 L-7 0 L-1.5 -1.5 Z" class="sb-sparkle"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.3s" repeatCount="indefinite"/>
    </g>
    <!-- Sparkle 3 - bottom right -->
    <g transform="translate(155, 150)">
      <path d="M0 -6 L1 -1 L6 0 L1 1 L0 6 L-1 1 L-6 0 L-1 -1 Z" class="sb-sparkle"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </g>
    <!-- Sparkle 4 - bottom left -->
    <g transform="translate(45, 155)">
      <path d="M0 -6.5 L1.5 -1.5 L6.5 0 L1.5 1.5 L0 6.5 L-1.5 1.5 L-6.5 0 L-1.5 -1.5 Z" class="sb-sparkle"/>
      <animate attributeName="opacity" values="0.4;0.95;0.4" dur="2.1s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Gentle breathing animation -->
  <g>
    <animateTransform
      attributeName="transform"
      type="scale"
      values="1,1; 1.02,1.02; 1,1"
      dur="3s"
      repeatCount="indefinite"
      additive="sum"
    />
  </g>
</svg>