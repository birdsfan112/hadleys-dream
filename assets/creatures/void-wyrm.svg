<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Layered body gradient: deep space colors -->
    <linearGradient id="vw-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1A0A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000015;stop-opacity:1" />
    </linearGradient>
    <!-- Nebula gradient for body shading -->
    <radialGradient id="vw-nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#0A0A1F;stop-opacity:0.1" />
    </radialGradient>
    <!-- Cosmic eye glow -->
    <radialGradient id="vw-eye-glow" cx="40%" cy="40%" r="80%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#0088FF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#000088;stop-opacity:0.2" />
    </radialGradient>
    <!-- Energy tendril gradient -->
    <linearGradient id="vw-energy-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0A0A1F;stop-opacity:0.4" />
    </linearGradient>
    <filter id="vw-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="vw-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>
  <style>
    @keyframes vw-undulate {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes vw-particle-float {
      0% { transform: translateY(0px) translateX(0px); opacity: 1; }
      100% { transform: translateY(-40px) translateX(8px); opacity: 0.3; }
    }
    @keyframes vw-eye-glow-pulse {
      0%, 100% { filter: drop-shadow(0px 0px 4px #00FFFF); }
      50% { filter: drop-shadow(0px 0px 12px #00FFFF); }
    }
    @keyframes vw-energy-crackle {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .vw-body { animation: vw-undulate 4s ease-in-out infinite; }
    .vw-particle { animation: vw-particle-float 3.5s ease-in infinite; }
    .vw-eyes { animation: vw-eye-glow-pulse 2s ease-in-out infinite; }
    .vw-energy { animation: vw-energy-crackle 1.5s ease-in-out infinite; }
  </style>

  <!-- Cosmic dust particles (stars floating around wyrm) -->
  <circle cx="40" cy="55" r="2.5" fill="#FFD700" class="vw-particle" style="animation-delay: 0s" filter="url(#vw-glow)"/>
  <circle cx="165" cy="38" r="2" fill="#FFFFFF" class="vw-particle" style="animation-delay: 0.8s" filter="url(#vw-glow)"/>
  <circle cx="25" cy="125" r="2.5" fill="#FFD700" class="vw-particle" style="animation-delay: 1.5s" filter="url(#vw-glow)"/>
  <circle cx="180" cy="145" r="2" fill="#00FFFF" class="vw-particle" style="animation-delay: 2.2s" filter="url(#vw-glow)"/>
  <circle cx="55" cy="175" r="2.5" fill="#FFD700" class="vw-particle" style="animation-delay: 2.8s" filter="url(#vw-glow)"/>

  <!-- Main serpentine body -->
  <g class="vw-body">
    <!-- Head -->
    <circle cx="85" cy="50" r="22" fill="url(#vw-body-grad)" filter="url(#vw-shadow)"/>
    <!-- Head nebula shading -->
    <circle cx="85" cy="50" r="22" fill="url(#vw-nebula)"/>

    <!-- Horns (cosmic spikes) -->
    <polygon points="70,32 62,8 78,28" fill="url(#vw-body-grad)" stroke="#4B0082" stroke-width="1.5" filter="url(#vw-shadow)"/>
    <polygon points="100,32 108,8 92,28" fill="url(#vw-body-grad)" stroke="#4B0082" stroke-width="1.5" filter="url(#vw-shadow)"/>

    <!-- Cosmic eyes (swirling galaxies within) -->
    <g class="vw-eyes">
      <circle cx="78" cy="48" r="9" fill="url(#vw-eye-glow)" filter="url(#vw-glow)"/>
      <circle cx="95" cy="48" r="9" fill="url(#vw-eye-glow)" filter="url(#vw-glow)"/>
    </g>

    <!-- Star-field dots inside eyes (tiny galaxy points) -->
    <circle cx="76" cy="45" r="1.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="80" cy="50" r="0.8" fill="#FFD700" opacity="0.8"/>
    <circle cx="78" cy="48" r="0.5" fill="#00FFFF" opacity="0.7"/>
    <circle cx="93" cy="45" r="1.2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="97" cy="50" r="0.8" fill="#FFD700" opacity="0.8"/>
    <circle cx="95" cy="48" r="0.5" fill="#00FFFF" opacity="0.7"/>

    <!-- Floating whisker-like cosmic tendrils -->
    <path d="M65 54 Q45 42 28 48" stroke="url(#vw-energy-grad)" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#vw-shadow)"/>
    <path d="M65 58 Q44 60 30 68" stroke="url(#vw-energy-grad)" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#vw-shadow)"/>

    <!-- Blush (ethereal glow) -->
    <ellipse cx="66" cy="56" rx="8" ry="4" fill="#4B0082" opacity="0.25"/>
    <ellipse cx="105" cy="56" rx="8" ry="4" fill="#4B0082" opacity="0.25"/>

    <!-- Mouth (mysterious) -->
    <path d="M80 60 Q86 65 92 60" stroke="#4B0082" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Main serpentine body (S-curve coil) -->
    <path d="M85 72 Q50 92 52 128 Q55 160 100 165 Q142 168 155 140 Q165 110 135 100" stroke="url(#vw-body-grad)" stroke-width="26" fill="none" stroke-linecap="round" filter="url(#vw-shadow)"/>
    <!-- Body nebula shading overlay -->
    <path d="M85 72 Q50 92 52 128 Q55 160 100 165 Q142 168 155 140 Q165 110 135 100" fill="url(#vw-nebula)" opacity="0.5"/>

    <!-- Scale texture pattern along body -->
    <path d="M60 95 Q65 92 70 95" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M55 110 Q60 107 65 110" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.45"/>
    <path d="M58 130 Q63 127 68 130" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.4"/>
    <path d="M75 155 Q80 152 85 155" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.4"/>
    <path d="M100 163 Q105 160 110 163" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.35"/>
    <path d="M128 155 Q133 152 138 155" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.35"/>
    <path d="M148 135 Q153 132 158 135" stroke="#4B0082" stroke-width="1.2" fill="none" opacity="0.3"/>

    <!-- Energy tendrils floating around body -->
    <g class="vw-energy">
      <path d="M35 110 L30 100 L35 95" stroke="url(#vw-energy-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M165 125 L175 120 L172 115" stroke="url(#vw-energy-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M75 185 L78 195 L82 188" stroke="url(#vw-energy-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Tail coil (extends the serpentine form) -->
    <path d="M155 140 Q175 115 175 85" stroke="url(#vw-body-grad)" stroke-width="20" fill="none" stroke-linecap="round" filter="url(#vw-shadow)"/>
  </g>

  <!-- Additional nebula cloud patches for depth -->
  <circle cx="70" cy="105" r="15" fill="#4B0082" opacity="0.15"/>
  <circle cx="135" cy="150" r="12" fill="#4B0082" opacity="0.12"/>
</svg>
