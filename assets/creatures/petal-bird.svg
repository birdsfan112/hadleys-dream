<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pb-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB7C5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF91A4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pb-wing-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF91A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pb-eye-shine" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB7C5;stop-opacity:0.3" />
    </radialGradient>
    <radialGradient id="pb-flower-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.9" />
    </radialGradient>
    <filter id="pb-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pb-wing-flutter {
      0%, 100% { transform: rotateY(0deg); }
      50% { transform: rotateY(-25deg); }
    }
    @keyframes pb-note-float {
      0% { transform: translateY(0px) translateX(0px); opacity: 1; }
      100% { transform: translateY(-50px) translateX(15px); opacity: 0; }
    }
    .pb-wings { animation: pb-wing-flutter 1.5s ease-in-out infinite; }
    .pb-note { animation: pb-note-float 2.5s ease-in infinite; }
  </style>

  <!-- Branch perch -->
  <line x1="40" y1="155" x2="160" y2="155" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>
  <line x1="60" y1="155" x2="55" y2="170" stroke="#8B6F47" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Floating musical note particles -->
  <g class="pb-note" style="animation-delay: 0s">
    <circle cx="120" cy="80" r="1.5" fill="#FFD700"/>
    <path d="M122 75 Q125 70 126 50" stroke="#FFD700" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
  <g class="pb-note" style="animation-delay: 0.8s">
    <circle cx="100" cy="60" r="1.5" fill="#FFD700"/>
    <path d="M102 55 Q105 50 106 30" stroke="#FFD700" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
  <g class="pb-note" style="animation-delay: 1.6s">
    <circle cx="140" cy="90" r="1.5" fill="#FFD700"/>
    <path d="M142 85 Q145 80 146 60" stroke="#FFD700" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Main body -->
  <!-- Tail feathers -->
  <ellipse cx="55" cy="115" rx="15" ry="8" fill="url(#pb-wing-grad)" transform="rotate(-25 55 115)" filter="url(#pb-shadow)"/>
  <ellipse cx="50" cy="125" rx="13" ry="7" fill="url(#pb-wing-grad)" transform="rotate(-15 50 125)" filter="url(#pb-shadow)"/>

  <!-- Body -->
  <circle cx="100" cy="110" r="38" fill="url(#pb-body-grad)" filter="url(#pb-shadow)"/>
  <!-- Belly highlight -->
  <ellipse cx="100" cy="118" rx="22" ry="28" fill="#FFB7C5" opacity="0.5"/>

  <!-- Wings (petal-like, animated) -->
  <g class="pb-wings">
    <!-- Left wing -->
    <ellipse cx="62" cy="105" rx="14" ry="26" fill="url(#pb-wing-grad)" opacity="0.85" transform="rotate(-15 62 105)" filter="url(#pb-shadow)"/>
    <!-- Right wing -->
    <ellipse cx="138" cy="105" rx="14" ry="26" fill="url(#pb-wing-grad)" opacity="0.85" transform="rotate(15 138 105)" filter="url(#pb-shadow)"/>
  </g>

  <!-- Head -->
  <circle cx="100" cy="68" r="30" fill="url(#pb-body-grad)" filter="url(#pb-shadow)"/>

  <!-- Eyes with shine -->
  <circle cx="88" cy="64" r="5" fill="#2C3E50"/>
  <circle cx="112" cy="64" r="5" fill="#2C3E50"/>
  <circle cx="86" cy="61" r="3" fill="url(#pb-eye-shine)"/>
  <circle cx="110" cy="61" r="3" fill="url(#pb-eye-shine)"/>
  <circle cx="88" cy="59" r="1.5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="112" cy="59" r="1.5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Beak (small and delicate) -->
  <polygon points="128,68 142,72 128,76" fill="#FFA500" filter="url(#pb-shadow)"/>
  <polygon points="128,70 137,72 128,74" fill="#FFD700" opacity="0.6"/>

  <!-- Blush -->
  <ellipse cx="78" cy="75" rx="10" ry="6" fill="#FF69B4" opacity="0.22"/>
  <ellipse cx="122" cy="75" rx="10" ry="6" fill="#FF69B4" opacity="0.22"/>

  <!-- Flower hat (decorative crown) -->
  <g transform="translate(100,40)">
    <!-- Petals (yellow) -->
    <ellipse cx="-8" cy="0" rx="6" ry="7" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="8" cy="0" rx="6" ry="7" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="7" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="0" cy="8" rx="6" ry="7" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="-5.5" cy="-5.5" rx="5.5" ry="6" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="5.5" cy="-5.5" rx="5.5" ry="6" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="-5.5" cy="5.5" rx="5.5" ry="6" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <ellipse cx="5.5" cy="5.5" rx="5.5" ry="6" fill="url(#pb-flower-grad)" filter="url(#pb-shadow)"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#FF91A4" filter="url(#pb-shadow)"/>
  </g>

  <!-- Feet -->
  <line x1="85" y1="147" x2="85" y2="160" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="115" y1="147" x2="115" y2="160" stroke="#FFA500" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tiny toes -->
  <line x1="80" y1="160" x2="90" y2="160" stroke="#FFA500" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="110" y1="160" x2="120" y2="160" stroke="#FFA500" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>
