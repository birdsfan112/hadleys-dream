<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cs-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C71585;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cs-eye-shine" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6D9;stop-opacity:0.4" />
    </radialGradient>
    <radialGradient id="cs-crown-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FF8DB9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB5A8D;stop-opacity:1" />
    </radialGradient>
    <filter id="cs-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes cs-sway {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    @keyframes cs-tail-wave {
      0%, 100% { transform: rotate(-8deg); }
      33% { transform: rotate(0deg); }
      66% { transform: rotate(8deg); }
    }
    @keyframes cs-bubble-rise {
      0% { transform: translateY(0px); opacity: 1; }
      100% { transform: translateY(-30px); opacity: 0.5; }
    }
    .cs-body { animation: cs-sway 3.5s ease-in-out infinite; }
    .cs-tail { animation: cs-tail-wave 2.5s ease-in-out infinite; transform-origin: 105px 155px; }
    .cs-bubble { animation: cs-bubble-rise 3s ease-in forwards; }
  </style>

  <!-- Subtle bubbles rising -->
  <circle cx="50" cy="120" r="2" fill="#87CEEB" opacity="0.3" class="cs-bubble" style="animation-delay: 0s"/>
  <circle cx="145" cy="110" r="2.5" fill="#87CEEB" opacity="0.25" class="cs-bubble" style="animation-delay: 1s"/>
  <circle cx="85" cy="140" r="1.5" fill="#87CEEB" opacity="0.2" class="cs-bubble" style="animation-delay: 1.8s"/>

  <!-- Main body -->
  <g class="cs-body">
    <!-- Curled tail -->
    <g class="cs-tail">
      <path d="M105 155 Q120 165 128 175 Q132 185 120 192 Q110 190 112 180 Q115 170 108 165" fill="url(#cs-body-grad)" stroke="#C71585" stroke-width="1.5" filter="url(#cs-shadow)"/>
      <!-- Tail segment lines -->
      <path d="M107 160 Q115 165 122 170" stroke="#C71585" stroke-width="0.8" fill="none" opacity="0.4"/>
      <path d="M110 168 Q118 173 125 180" stroke="#C71585" stroke-width="0.8" fill="none" opacity="0.4"/>
    </g>

    <!-- Main body (S-curve seahorse shape) -->
    <ellipse cx="100" cy="120" rx="30" ry="45" fill="url(#cs-body-grad)" filter="url(#cs-shadow)"/>

    <!-- Body segmentation (elegant details) -->
    <path d="M78 98 Q92 95 108 98" stroke="#C71585" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M76 110 Q92 107 112 110" stroke="#C71585" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M76 125 Q92 122 112 125" stroke="#C71585" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M78 140 Q95 138 106 140" stroke="#C71585" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Belly highlight -->
    <ellipse cx="92" cy="120" rx="16" ry="35" fill="#FFB6D9" opacity="0.4"/>

    <!-- Head -->
    <circle cx="100" cy="58" r="30" fill="url(#cs-body-grad)" filter="url(#cs-shadow)"/>

    <!-- Snout (elegant and delicate) -->
    <ellipse cx="120" cy="65" rx="18" ry="9" fill="url(#cs-body-grad)" filter="url(#cs-shadow)"/>

    <!-- Eyes (elegant with lashes) -->
    <ellipse cx="92" cy="52" rx="8" ry="10" fill="#2C3E50"/>
    <circle cx="90" cy="48" r="4" fill="url(#cs-eye-shine)"/>
    <circle cx="92" cy="46" r="1.5" fill="#FFF"/>
    <!-- Eyelashes -->
    <path d="M85 47 Q88 42 92 45" stroke="#2C3E50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M86 45 Q90 40 94 44" stroke="#2C3E50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M87 50 Q90 47 93 50" stroke="#2C3E50" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="80" cy="68" rx="10" ry="6" fill="#FF69B4" opacity="0.25"/>

    <!-- Mouth (delicate smile) -->
    <path d="M128 72 Q133 76 130 72" stroke="#C71585" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Dorsal fin (flowing like silk ribbon) -->
    <path d="M68 85 Q55 72 60 55 Q65 70 72 82" fill="url(#cs-body-grad)" opacity="0.8" filter="url(#cs-shadow)"/>
    <!-- Fin detail lines -->
    <path d="M70 80 Q65 70 68 60" stroke="#C71585" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Pectoral fins -->
    <ellipse cx="75" cy="115" rx="12" ry="18" fill="url(#cs-body-grad)" opacity="0.7" transform="rotate(-30 75 115)" filter="url(#cs-shadow)"/>
    <ellipse cx="125" cy="115" rx="12" ry="18" fill="url(#cs-body-grad)" opacity="0.7" transform="rotate(30 125 115)" filter="url(#cs-shadow)"/>
  </g>

  <!-- Coral crown on head -->
  <g filter="url(#cs-shadow)">
    <!-- Left branch -->
    <path d="M85 40 L80 22 L76 32 L70 18 L74 28" stroke="url(#cs-crown-grad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Center branch -->
    <path d="M100 38 L98 18 L101 28 L103 16 L102 26" stroke="url(#cs-crown-grad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Right branch -->
    <path d="M115 40 L120 22 L124 32 L130 18 L126 28" stroke="url(#cs-crown-grad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Small coral buds and details -->
    <circle cx="80" cy="25" r="2" fill="url(#cs-crown-grad)"/>
    <circle cx="70" cy="20" r="1.5" fill="url(#cs-crown-grad)"/>
    <circle cx="98" cy="20" r="2" fill="url(#cs-crown-grad)"/>
    <circle cx="103" cy="18" r="1.5" fill="url(#cs-crown-grad)"/>
    <circle cx="120" cy="25" r="2" fill="url(#cs-crown-grad)"/>
    <circle cx="130" cy="20" r="1.5" fill="url(#cs-crown-grad)"/>
  </g>
</svg>
