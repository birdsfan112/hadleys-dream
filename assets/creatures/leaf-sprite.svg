<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Leaf gradients -->
    <linearGradient id="ls-leaf-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5016"/>
      <stop offset="50%" stop-color="#3D7D44"/>
      <stop offset="100%" stop-color="#2D5016"/>
    </linearGradient>
    <linearGradient id="ls-leaf-med" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="50%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="ls-leaf-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7CB342"/>
      <stop offset="50%" stop-color="#9CCC65"/>
      <stop offset="100%" stop-color="#7CB342"/>
    </linearGradient>
    <!-- Face and body -->
    <radialGradient id="ls-face-grad" cx="40%" cy="40%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </radialGradient>
    <!-- Glow effect -->
    <filter id="ls-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dewdrop shimmer -->
    <radialGradient id="ls-dewdrop" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#E0F7FA" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#80DEEA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00838F" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <style>
    .ls-leaf-dark { fill: url(#ls-leaf-dark); stroke: #1B3A1B; stroke-width: 0.8; }
    .ls-leaf-med { fill: url(#ls-leaf-med); stroke: #2D5016; stroke-width: 0.8; }
    .ls-leaf-light { fill: url(#ls-leaf-light); stroke: #4CAF50; stroke-width: 0.6; }
    .ls-face { fill: url(#ls-face-grad); stroke: #81C784; stroke-width: 1; }
    .ls-eye { fill: #1B5E20; }
    .ls-shine { fill: #FFFFFF; }
    .ls-vine { stroke: #558B2F; stroke-width: 1.5; fill: none; stroke-linecap: round; }
  </style>

  <!-- Soft glow background -->
  <circle cx="100" cy="100" r="75" fill="#81C784" opacity="0.08" filter="url(#ls-glow)"/>

  <!-- Back layer leaves (darker) -->
  <ellipse cx="60" cy="95" rx="22" ry="28" class="ls-leaf-dark" transform="rotate(-40 60 95)" opacity="0.8"/>
  <ellipse cx="140" cy="100" rx="24" ry="30" class="ls-leaf-dark" transform="rotate(45 140 100)" opacity="0.7"/>
  <ellipse cx="100" cy="50" rx="18" ry="26" class="ls-leaf-dark" transform="rotate(-15 100 50)" opacity="0.75"/>

  <!-- Mid layer leaves (medium green) -->
  <ellipse cx="50" cy="110" rx="26" ry="32" class="ls-leaf-med" transform="rotate(-60 50 110)"/>
  <ellipse cx="150" cy="110" rx="26" ry="32" class="ls-leaf-med" transform="rotate(60 150 110)"/>
  <ellipse cx="100" cy="60" rx="22" ry="28" class="ls-leaf-med" transform="rotate(0 100 60)"/>

  <!-- Front layer leaves (lighter) -->
  <ellipse cx="70" cy="125" rx="20" ry="26" class="ls-leaf-light" transform="rotate(-25 70 125)"/>
  <ellipse cx="130" cy="125" rx="20" ry="26" class="ls-leaf-light" transform="rotate(25 130 125)"/>

  <!-- Leaf veins for texture -->
  <path d="M60 67 Q65 80 70 95" stroke="#1B5E20" stroke-width="0.5" fill="none" opacity="0.4"/>
  <path d="M140 70 Q135 85 130 100" stroke="#1B5E20" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- Small crown leaves on top -->
  <path d="M85 45 L80 25 L90 35 Q85 30 85 45" class="ls-leaf-light" stroke="#4CAF50" stroke-width="0.8"/>
  <path d="M100 40 L98 15 L108 32 Q100 22 100 40" class="ls-leaf-light" stroke="#4CAF50" stroke-width="0.8"/>
  <path d="M115 45 L120 25 L110 35 Q115 30 115 45" class="ls-leaf-light" stroke="#4CAF50" stroke-width="0.8"/>

  <!-- Vine-like hair tendrils -->
  <path d="M75 70 Q65 55 60 40 Q58 30 62 25" class="ls-vine"/>
  <path d="M125 70 Q135 55 140 40 Q142 30 138 25" class="ls-vine"/>
  <path d="M100 50 Q95 30 92 15" class="ls-vine"/>

  <!-- Body/face peeking out -->
  <circle cx="100" cy="105" r="32" class="ls-face"/>

  <!-- Large curious eyes -->
  <circle cx="85" cy="98" r="8" class="ls-eye"/>
  <circle cx="115" cy="98" r="8" class="ls-eye"/>
  <!-- Eye highlights - star shape -->
  <path d="M85 95 L87 98 L90 99 L87 101 L88 104 L85 102 L82 104 L83 101 L80 99 L83 98 Z" class="ls-shine" opacity="0.9"/>
  <path d="M115 95 L117 98 L120 99 L117 101 L118 104 L115 102 L112 104 L113 101 L110 99 L113 98 Z" class="ls-shine" opacity="0.9"/>
  <!-- Secondary shine -->
  <circle cx="82" cy="100" r="1.5" class="ls-shine"/>
  <circle cx="112" cy="100" r="1.5" class="ls-shine"/>

  <!-- Curious expression - open mouth -->
  <circle cx="100" cy="115" r="2.5" fill="#1B5E20"/>
  <path d="M100 115 L100 120" stroke="#1B5E20" stroke-width="1" stroke-linecap="round"/>

  <!-- Tiny bare feet dangling -->
  <ellipse cx="85" cy="145" rx="6" ry="5" fill="#D4E8D4"/>
  <ellipse cx="115" cy="145" rx="6" ry="5" fill="#D4E8D4"/>
  <!-- Foot details -->
  <circle cx="83" cy="147" r="1.5" fill="#A1D0A1"/>
  <circle cx="87" cy="147" r="1.5" fill="#A1D0A1"/>
  <circle cx="113" cy="147" r="1.5" fill="#A1D0A1"/>
  <circle cx="117" cy="147" r="1.5" fill="#A1D0A1"/>

  <!-- Dewdrop decorations on leaves - shimmer animation -->
  <g>
    <circle cx="65" cy="85" r="4" fill="url(#ls-dewdrop)"/>
    <circle cx="64" cy="84" r="1" class="ls-shine" opacity="0.7"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="135" cy="110" r="3.5" fill="url(#ls-dewdrop)"/>
    <circle cx="134" cy="109" r="0.8" class="ls-shine" opacity="0.7"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </g>
  <g>
    <circle cx="105" cy="65" r="3" fill="url(#ls-dewdrop)"/>
    <circle cx="104" cy="64" r="0.7" class="ls-shine" opacity="0.7"/>
    <animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.8s" repeatCount="indefinite"/>
  </g>

  <!-- Gentle floating/bobbing animation -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 0,-3; 0,0"
      dur="4s"
      repeatCount="indefinite"
      additive="sum"
    />
  </g>
</svg>