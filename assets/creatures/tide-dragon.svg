<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Multi-layered gradients for iridescent scales -->
    <linearGradient id="td-head-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A9B8E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CED1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#20B2AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="td-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4CC;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CED1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A8B7E;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="td-eye-glow" cx="30%" cy="30%" r="75%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00CED1;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0099CC;stop-opacity:0.4" />
    </radialGradient>
    <radialGradient id="td-orb-grad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#7FFFD4;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#00CED1;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1A7B7A;stop-opacity:0.8" />
    </radialGradient>
    <filter id="td-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.5"/>
      <feOffset dx="1.5" dy="2.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="td-glow-filter">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
    @keyframes td-breathe {
      0%, 100% { transform: scale(1, 1); }
      50% { transform: scale(1.02, 1.05); }
    }
    @keyframes td-tail-wave {
      0% { transform: rotate(-8deg); }
      25% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
      75% { transform: rotate(0deg); }
      100% { transform: rotate(-8deg); }
    }
    @keyframes td-particle-float {
      0% { transform: translateY(0px) translateX(0px); opacity: 1; }
      100% { transform: translateY(-40px) translateX(8px); opacity: 0.2; }
    }
    @keyframes td-energy-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .td-body { animation: td-breathe 4s ease-in-out infinite; }
    .td-tail { animation: td-tail-wave 3s ease-in-out infinite; transform-origin: 100px 165px; }
    .td-particle { animation: td-particle-float 3s ease-in infinite; }
    .td-energy { animation: td-energy-pulse 2s ease-in-out infinite; }
  </style>

  <!-- Floating water orb in claw -->
  <ellipse cx="150" cy="155" rx="15" ry="20" fill="url(#td-orb-grad)" filter="url(#td-shadow)"/>
  <!-- Orb highlights -->
  <ellipse cx="146" cy="145" rx="5" ry="7" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="152" cy="150" r="2" fill="#FFFFFF" opacity="0.4"/>

  <!-- Main body group -->
  <g class="td-body">
    <!-- Elaborate head -->
    <circle cx="100" cy="70" r="36" fill="url(#td-head-grad)" filter="url(#td-shadow)"/>

    <!-- Head scale pattern (overlapping semi-transparent circles for texture) -->
    <circle cx="88" cy="55" r="4" fill="#00FFFF" opacity="0.3"/>
    <circle cx="100" cy="50" r="4" fill="#00FFFF" opacity="0.25"/>
    <circle cx="112" cy="55" r="4" fill="#00FFFF" opacity="0.3"/>
    <circle cx="78" cy="70" r="3" fill="#00FFFF" opacity="0.25"/>
    <circle cx="122" cy="70" r="3" fill="#00FFFF" opacity="0.25"/>

    <!-- Flowing whiskers -->
    <line x1="75" y1="80" x2="55" y2="88" stroke="#1A9B8E" stroke-width="2" stroke-linecap="round"/>
    <line x1="72" y1="88" x2="50" y2="100" stroke="#1A9B8E" stroke-width="2" stroke-linecap="round"/>
    <line x1="125" y1="80" x2="145" y2="88" stroke="#1A9B8E" stroke-width="2" stroke-linecap="round"/>
    <line x1="128" y1="88" x2="150" y2="100" stroke="#1A9B8E" stroke-width="2" stroke-linecap="round"/>

    <!-- Eyes (glowing cosmic style) -->
    <circle cx="82" cy="68" r="8" fill="url(#td-eye-glow)" filter="url(#td-glow-filter)"/>
    <circle cx="118" cy="68" r="8" fill="url(#td-eye-glow)" filter="url(#td-glow-filter)"/>
    <!-- Inner eye pupils -->
    <circle cx="82" cy="70" r="4" fill="#0A3F3A"/>
    <circle cx="118" cy="70" r="4" fill="#0A3F3A"/>
    <!-- Eye shine -->
    <circle cx="84" cy="66" r="2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="120" cy="66" r="2" fill="#FFFFFF" opacity="0.9"/>

    <!-- Horn details -->
    <polygon points="75,48 68,25 80,45" fill="url(#td-body-grad)" stroke="#1A9B8E" stroke-width="1.5" filter="url(#td-shadow)"/>
    <polygon points="125,48 132,25 120,45" fill="url(#td-body-grad)" stroke="#1A9B8E" stroke-width="1.5" filter="url(#td-shadow)"/>
    <!-- Horn ridges -->
    <line x1="72" y1="45" x2="70" y2="28" stroke="#1A9B8E" stroke-width="0.8" opacity="0.6"/>
    <line x1="128" y1="45" x2="130" y2="28" stroke="#1A9B8E" stroke-width="0.8" opacity="0.6"/>

    <!-- Mouth (fierce smile) -->
    <path d="M90 85 Q100 92 110 85" stroke="#1A9B8E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Elaborate serpentine body -->
    <ellipse cx="100" cy="130" rx="38" ry="48" fill="url(#td-body-grad)" filter="url(#td-shadow)"/>

    <!-- Body segmentation (scale details) -->
    <path d="M68 105 Q92 100 116 105" stroke="#1A9B8E" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M65 120 Q92 116 120 120" stroke="#1A9B8E" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M68 135 Q95 132 125 135" stroke="#1A9B8E" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M75 150 Q98 148 120 150" stroke="#1A9B8E" stroke-width="1.2" fill="none" opacity="0.5"/>

    <!-- Belly scale plate -->
    <ellipse cx="100" cy="135" rx="24" ry="32" fill="#00FFFF" opacity="0.25"/>

    <!-- Flowing dorsal fin (wave-like) -->
    <path d="M60 95 Q50 85 48 65 Q50 80 58 90 Q62 100 65 110" fill="url(#td-body-grad)" opacity="0.9" filter="url(#td-shadow)"/>
    <path d="M140 95 Q150 85 152 65 Q150 80 142 90 Q138 100 135 110" fill="url(#td-body-grad)" opacity="0.9" filter="url(#td-shadow)"/>

    <!-- Elegant curling tail -->
    <g class="td-tail">
      <path d="M100 178 Q110 195 105 210 Q98 215 92 205 Q90 195 95 180" fill="url(#td-body-grad)" stroke="#1A9B8E" stroke-width="1.5" filter="url(#td-shadow)"/>
      <!-- Tail detail lines -->
      <path d="M98 188 Q108 200 100 212" stroke="#1A9B8E" stroke-width="1" fill="none" opacity="0.5"/>
    </g>

    <!-- Claws/paws -->
    <ellipse cx="70" cy="160" rx="12" ry="16" fill="url(#td-body-grad)" filter="url(#td-shadow)" transform="rotate(-25 70 160)"/>
    <ellipse cx="130" cy="160" rx="12" ry="16" fill="url(#td-body-grad)" filter="url(#td-shadow)" transform="rotate(25 130 160)"/>

    <!-- Lightning-like energy lines around body -->
    <g class="td-energy">
      <path d="M40 120 L35 125 L38 128" stroke="#00FFFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M160 110 L168 105 L165 100" stroke="#00FFFF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M50 75 L48 68 L52 65" stroke="#00FFFF" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Floating water particle effects -->
  <circle cx="45" cy="110" r="2" fill="#87CEEB" class="td-particle" style="animation-delay: 0s"/>
  <circle cx="155" cy="100" r="2.5" fill="#87CEEB" class="td-particle" style="animation-delay: 0.5s"/>
  <circle cx="55" cy="140" r="1.5" fill="#87CEEB" class="td-particle" style="animation-delay: 1s"/>
  <circle cx="150" cy="145" r="2" fill="#87CEEB" class="td-particle" style="animation-delay: 1.5s"/>
  <circle cx="35" cy="85" r="1.5" fill="#87CEEB" class="td-particle" style="animation-delay: 2s"/>
</svg>
