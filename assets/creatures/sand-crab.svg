<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sc-body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8956A;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sc-eye-base" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sc-eye-shine" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#87CEEB;stop-opacity:0.2" />
    </radialGradient>
    <radialGradient id="sc-shell-grad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#C9A876;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9D7E5D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5D4F;stop-opacity:1" />
    </radialGradient>
    <filter id="sc-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes sc-sway {
      0%, 100% { transform: translateX(-3px) rotate(-1deg); }
      50% { transform: translateX(3px) rotate(1deg); }
    }
    .sc-body { animation: sc-sway 3s ease-in-out infinite; }
  </style>

  <!-- Shadow -->
  <ellipse cx="100" cy="165" rx="50" ry="8" fill="#000" opacity="0.08"/>

  <!-- Main body group -->
  <g class="sc-body">
    <!-- Main body (round crab) -->
    <ellipse cx="100" cy="115" rx="45" ry="42" fill="url(#sc-body-grad)" filter="url(#sc-shadow)"/>

    <!-- Sand texture dots on body -->
    <circle cx="80" cy="100" r="1.5" fill="#9D7E5D" opacity="0.4"/>
    <circle cx="105" cy="95" r="1" fill="#9D7E5D" opacity="0.35"/>
    <circle cx="125" cy="110" r="1.2" fill="#9D7E5D" opacity="0.4"/>
    <circle cx="90" cy="130" r="1" fill="#9D7E5D" opacity="0.35"/>
    <circle cx="115" cy="135" r="1.5" fill="#9D7E5D" opacity="0.4"/>
    <circle cx="75" cy="120" r="1" fill="#9D7E5D" opacity="0.35"/>

    <!-- Left eye stalk -->
    <line x1="85" y1="75" x2="80" y2="50" stroke="url(#sc-body-grad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right eye stalk -->
    <line x1="115" y1="75" x2="120" y2="50" stroke="url(#sc-body-grad)" stroke-width="5" stroke-linecap="round"/>

    <!-- Eyes (googly style) -->
    <circle cx="80" cy="45" r="7" fill="url(#sc-eye-base)"/>
    <circle cx="120" cy="45" r="7" fill="url(#sc-eye-base)"/>
    <circle cx="78" cy="42" r="4.5" fill="url(#sc-eye-shine)"/>
    <circle cx="118" cy="42" r="4.5" fill="url(#sc-eye-shine)"/>
    <circle cx="77" cy="39" r="2" fill="#FFF"/>
    <circle cx="117" cy="39" r="2" fill="#FFF"/>

    <!-- Left pincer (mitt-like) -->
    <ellipse cx="55" cy="110" rx="18" ry="22" fill="url(#sc-body-grad)" transform="rotate(-20 55 110)" filter="url(#sc-shadow)"/>
    <path d="M50 100 Q48 110 52 115" stroke="#9D7E5D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
    <!-- Right pincer (mitt-like) -->
    <ellipse cx="145" cy="110" rx="18" ry="22" fill="url(#sc-body-grad)" transform="rotate(20 145 110)" filter="url(#sc-shadow)"/>
    <path d="M150 100 Q152 110 148 115" stroke="#9D7E5D" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>

    <!-- Walking legs (front pair) — segmented with joints -->
    <!-- Front left leg: upper segment + joint + lower segment + foot -->
    <path d="M75 142 Q68 148 62 145" stroke="url(#sc-body-grad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M62 145 Q56 150 52 158" stroke="url(#sc-body-grad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <ellipse cx="50" cy="160" rx="5" ry="3" fill="url(#sc-body-grad)" transform="rotate(-15 50 160)"/>
    <circle cx="62" cy="145" r="3" fill="#C4956A"/>

    <!-- Front right leg -->
    <path d="M125 142 Q132 148 138 145" stroke="url(#sc-body-grad)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M138 145 Q144 150 148 158" stroke="url(#sc-body-grad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <ellipse cx="150" cy="160" rx="5" ry="3" fill="url(#sc-body-grad)" transform="rotate(15 150 160)"/>
    <circle cx="138" cy="145" r="3" fill="#C4956A"/>

    <!-- Back left leg -->
    <path d="M70 150 Q60 158 55 155" stroke="url(#sc-body-grad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M55 155 Q46 162 40 170" stroke="url(#sc-body-grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <ellipse cx="38" cy="172" rx="4.5" ry="2.5" fill="url(#sc-body-grad)" transform="rotate(-20 38 172)"/>
    <circle cx="55" cy="155" r="2.5" fill="#C4956A"/>

    <!-- Back right leg -->
    <path d="M130 150 Q140 158 145 155" stroke="url(#sc-body-grad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M145 155 Q154 162 160 170" stroke="url(#sc-body-grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <ellipse cx="162" cy="172" rx="4.5" ry="2.5" fill="url(#sc-body-grad)" transform="rotate(20 162 172)"/>
    <circle cx="145" cy="155" r="2.5" fill="#C4956A"/>

    <!-- Shell hat on top -->
    <ellipse cx="100" cy="70" rx="32" ry="28" fill="url(#sc-shell-grad)" filter="url(#sc-shadow)"/>
    <!-- Shell spiral pattern -->
    <path d="M75 70 Q80 65 90 68 Q95 70 92 80 Q88 85 80 82 Q75 80 78 72" stroke="#6B5D4F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M82 68 Q86 67 90 70 Q88 75 82 76" stroke="#6B5D4F" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Shell shine -->
    <ellipse cx="85" cy="65" rx="12" ry="8" fill="#E8D5C4" opacity="0.4"/>
  </g>
</svg>
