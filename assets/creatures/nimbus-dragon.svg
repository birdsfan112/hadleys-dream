<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="nd-body" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#D3D3D3"/>
      <stop offset="100%" stop-color="#B0C4DE"/>
    </radialGradient>
    <linearGradient id="nd-wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="100%" stop-color="#A9A9A9"/>
    </linearGradient>
    <radialGradient id="nd-head" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#E8E8E8"/>
      <stop offset="100%" stop-color="#B0C4DE"/>
    </radialGradient>
    <filter id="nd-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes nd-drift {
        0%, 100% { transform: translateY(0px) translateX(0px); }
        50% { transform: translateY(-5px) translateX(2px); }
      }
      @keyframes nd-wing-flutter {
        0%, 100% { transform: rotateZ(0deg); }
        25% { transform: rotateZ(-8deg); }
        75% { transform: rotateZ(8deg); }
      }
      .nd-creature { animation: nd-drift 3.5s ease-in-out infinite; }
      .nd-wing { animation: nd-wing-flutter 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <g class="nd-creature">
    <!-- Wings -->
    <g class="nd-wing">
      <ellipse cx="60" cy="95" rx="32" ry="50" fill="url(#nd-wing)" filter="url(#nd-shadow)"/>
      <path d="M 50 80 Q 55 70 60 80" stroke="#778899" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 55 100 Q 60 90 65 100" stroke="#778899" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 50 120 Q 55 110 60 120" stroke="#778899" stroke-width="1" fill="none" opacity="0.4"/>
    </g>

    <g class="nd-wing">
      <ellipse cx="140" cy="95" rx="32" ry="50" fill="url(#nd-wing)" filter="url(#nd-shadow)"/>
      <path d="M 150 80 Q 145 70 140 80" stroke="#778899" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 145 100 Q 140 90 135 100" stroke="#778899" stroke-width="1" fill="none" opacity="0.4"/>
      <path d="M 150 120 Q 145 110 140 120" stroke="#778899" stroke-width="1" fill="none" opacity="0.4"/>
    </g>

    <!-- Body -->
    <ellipse cx="100" cy="130" rx="50" ry="50" fill="url(#nd-body)" filter="url(#nd-shadow)"/>

    <!-- Neck -->
    <ellipse cx="100" cy="80" rx="28" ry="35" fill="url(#nd-head)"/>

    <!-- Head -->
    <circle cx="100" cy="45" r="30" fill="url(#nd-head)"/>

    <!-- Horn/crest -->
    <path d="M 100 15 L 95 -5 L 100 10 L 105 -5 Z" fill="#D3D3D3"/>
    <path d="M 100 15 Q 98 5 100 -2" stroke="#A9A9A9" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- Eyes (ethereal) -->
    <circle cx="88" cy="40" r="8" fill="#FFFFFF"/>
    <circle cx="112" cy="40" r="8" fill="#FFFFFF"/>
    <circle cx="88" cy="40" r="5" fill="#87CEEB"/>
    <circle cx="112" cy="40" r="5" fill="#87CEEB"/>
    <circle cx="90" cy="37" r="2" fill="#FFFFFF"/>
    <circle cx="114" cy="37" r="2" fill="#FFFFFF"/>

    <!-- Blush -->
    <ellipse cx="72" cy="50" rx="6" ry="5" fill="#FF69B4" opacity="0.25"/>
    <ellipse cx="128" cy="50" rx="6" ry="5" fill="#FF69B4" opacity="0.25"/>

    <!-- Snout -->
    <ellipse cx="100" cy="60" rx="12" ry="10" fill="url(#nd-head)"/>

    <!-- Mouth -->
    <path d="M 95 65 Q 100 70 105 65" stroke="#778899" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Front claws/feet -->
    <ellipse cx="75" cy="170" rx="14" ry="22" fill="url(#nd-body)"/>
    <ellipse cx="125" cy="170" rx="14" ry="22" fill="url(#nd-body)"/>

    <!-- Talons -->
    <path d="M 70 188 L 65 200" stroke="#A9A9A9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 75 190 L 75 202" stroke="#A9A9A9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 80 188 L 85 200" stroke="#A9A9A9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 120 188 L 115 200" stroke="#A9A9A9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 125 190 L 125 202" stroke="#A9A9A9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 130 188 L 135 200" stroke="#A9A9A9" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Back spikes -->
    <ellipse cx="85" cy="100" rx="6" ry="15" fill="#A9A9A9" opacity="0.6"/>
    <ellipse cx="100" cy="95" rx="6" ry="18" fill="#A9A9A9" opacity="0.6"/>
    <ellipse cx="115" cy="100" rx="6" ry="15" fill="#A9A9A9" opacity="0.6"/>

    <!-- Tail -->
    <path d="M 55 135 Q 35 140 30 165" stroke="url(#nd-body)" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#nd-shadow)"/>
    <circle cx="30" cy="165" r="8" fill="url(#nd-body)" opacity="0.8"/>
  </g>
</svg>
