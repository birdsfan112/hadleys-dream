<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bp-wing-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF85C4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1493;stop-opacity:0.8" />
    </linearGradient>
    <radialGradient id="bp-eye-shine" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFB6D9;stop-opacity:0.3" />
    </radialGradient>
    <filter id="bp-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="1" dy="1.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes bp-wing-flutter {
      0%, 100% { transform: rotateZ(-8deg); }
      50% { transform: rotateZ(8deg); }
    }
    @keyframes bp-sparkle-trail {
      0% { opacity: 0.8; transform: translateY(0px); }
      100% { opacity: 0; transform: translateY(-30px); }
    }
    .bp-wings { animation: bp-wing-flutter 1.2s ease-in-out infinite; }
    .bp-trail { animation: bp-sparkle-trail 2s ease-in infinite; }
  </style>

  <!-- Upper wings (elaborate with eye-spot patterns) -->
  <g class="bp-wings">
    <path d="M50 88 Q15 42 32 15 Q58 -8 70 28 Q80 62 72 88 Z" fill="url(#bp-wing-grad)" stroke="#FF1493" stroke-width="1.5" filter="url(#bp-shadow)"/>
    <path d="M150 88 Q185 42 168 15 Q142 -8 130 28 Q120 62 128 88 Z" fill="url(#bp-wing-grad)" stroke="#FF1493" stroke-width="1.5" filter="url(#bp-shadow)"/>
    <!-- Lower wings (smaller) -->
    <path d="M60 108 Q28 125 38 152 Q50 168 72 135 Z" fill="url(#bp-wing-grad)" stroke="#FF1493" stroke-width="1.5" filter="url(#bp-shadow)"/>
    <path d="M140 108 Q172 125 162 152 Q150 168 128 135 Z" fill="url(#bp-wing-grad)" stroke="#FF1493" stroke-width="1.5" filter="url(#bp-shadow)"/>
  </g>

  <!-- Wing eye-spot patterns and details -->
  <circle cx="48" cy="48" r="5" fill="#FFF" opacity="0.5"/>
  <circle cx="48" cy="48" r="2" fill="#FF1493" opacity="0.6"/>
  <circle cx="55" cy="68" r="4" fill="#FFF" opacity="0.4"/>
  <circle cx="42" cy="60" r="3" fill="#FFD700" opacity="0.5"/>
  <circle cx="152" cy="48" r="5" fill="#FFF" opacity="0.5"/>
  <circle cx="152" cy="48" r="2" fill="#FF1493" opacity="0.6"/>
  <circle cx="145" cy="68" r="4" fill="#FFF" opacity="0.4"/>
  <circle cx="158" cy="60" r="3" fill="#FFD700" opacity="0.5"/>

  <!-- Pixie body -->
  <ellipse cx="100" cy="120" rx="24" ry="32" fill="#FF69B4" filter="url(#bp-shadow)"/>
  <!-- Pixie dress detail -->
  <ellipse cx="100" cy="128" rx="18" ry="18" fill="#FFB6D9" opacity="0.4"/>

  <!-- Head -->
  <circle cx="100" cy="80" r="26" fill="#FF69B4" filter="url(#bp-shadow)"/>

  <!-- Pixie wings (on back, small, iridescent) -->
  <ellipse cx="92" cy="105" rx="8" ry="14" fill="#E0F0FF" stroke="#87CEEB" stroke-width="0.8" opacity="0.7" filter="url(#bp-shadow)"/>
  <ellipse cx="108" cy="105" rx="8" ry="14" fill="#E0F0FF" stroke="#87CEEB" stroke-width="0.8" opacity="0.7" filter="url(#bp-shadow)"/>

  <!-- Antennae (with heart tips) -->
  <line x1="88" y1="60" x2="72" y2="30" stroke="#FF1493" stroke-width="2" stroke-linecap="round"/>
  <path d="M68 26 Q70 28 72 26 Q70 24 68 26" fill="#FF1493"/>

  <line x1="112" y1="60" x2="128" y2="30" stroke="#FF1493" stroke-width="2" stroke-linecap="round"/>
  <path d="M128 26 Q130 28 132 26 Q130 24 128 26" fill="#FF1493"/>

  <!-- Eyes with star sparkle -->
  <circle cx="88" cy="78" r="8" fill="#2C3E50"/>
  <circle cx="112" cy="78" r="8" fill="#2C3E50"/>
  <!-- Star shine in eyes -->
  <polygon points="92,74 93.5,76 96,76 94,78 94.5,80.5 92,79 89.5,80.5 90,78 88,76 90.5,76" fill="url(#bp-eye-shine)"/>
  <polygon points="116,74 117.5,76 120,76 118,78 118.5,80.5 116,79 113.5,80.5 114,78 112,76 114.5,76" fill="url(#bp-eye-shine)"/>

  <!-- Blush -->
  <ellipse cx="75" cy="88" rx="10" ry="5" fill="#FF1493" opacity="0.22"/>
  <ellipse cx="125" cy="88" rx="10" ry="5" fill="#FF1493" opacity="0.22"/>

  <!-- Mouth (happy) -->
  <path d="M94 92 Q100 98 106 92" stroke="#FF1493" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Pixie feet -->
  <ellipse cx="88" cy="152" rx="8" ry="5" fill="#FF69B4" filter="url(#bp-shadow)"/>
  <ellipse cx="112" cy="152" rx="8" ry="5" fill="#FF69B4" filter="url(#bp-shadow)"/>

  <!-- Sparkle trail -->
  <circle cx="75" cy="165" r="3" fill="#FFD700" class="bp-trail" style="animation-delay: 0s" opacity="0.8"/>
  <circle cx="100" cy="175" r="2.5" fill="#FF69B4" class="bp-trail" style="animation-delay: 0.4s" opacity="0.7"/>
  <circle cx="125" cy="165" r="3" fill="#FFD700" class="bp-trail" style="animation-delay: 0.8s" opacity="0.8"/>
</svg>
