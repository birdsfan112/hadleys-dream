<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sj-bell-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#E6D7FF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#D8BFD8;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#B19CD9;stop-opacity:0.6" />
    </radialGradient>
    <radialGradient id="sj-inner-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#E6D7FF;stop-opacity:0.1" />
    </radialGradient>
    <radialGradient id="sj-eye-shine" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6D7FF;stop-opacity:0.3" />
    </radialGradient>
    <filter id="sj-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sj-glow-effect">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
    @keyframes sj-pulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.08); }
    }
    @keyframes sj-tentacle-drift {
      0%, 100% { transform: translateX(0px); }
      50% { transform: translateX(3px); }
    }
    @keyframes sj-sparkle-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
    .sj-bell { animation: sj-pulse 2.5s ease-in-out infinite; transform-origin: 100px 75px; }
    .sj-tentacle { animation: sj-tentacle-drift 3s ease-in-out infinite; }
    .sj-sparkle { animation: sj-sparkle-twinkle 1.5s ease-in-out infinite; }
  </style>

  <!-- Ethereal jellyfish bell/dome (main body) -->
  <g class="sj-bell">
    <!-- Main bell shape (translucent dome) -->
    <ellipse cx="100" cy="75" rx="44" ry="40" fill="url(#sj-bell-grad)" filter="url(#sj-shadow)"/>
    <!-- Inner glow layer -->
    <ellipse cx="100" cy="70" rx="38" ry="32" fill="url(#sj-inner-glow)" filter="url(#sj-glow-effect)"/>

    <!-- Eyes (dreamy half-closed crescent style) -->
    <circle cx="80" cy="70" r="9" fill="#2C3E50"/>
    <circle cx="120" cy="70" r="9" fill="#2C3E50"/>
    <!-- Eye shine -->
    <circle cx="78" cy="67" r="4" fill="url(#sj-eye-shine)"/>
    <circle cx="118" cy="67" r="4" fill="url(#sj-eye-shine)"/>
    <circle cx="80" cy="65" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="120" cy="65" r="1.5" fill="#FFFFFF" opacity="0.9"/>

    <!-- Upper eyelids (sleepy expression) -->
    <path d="M70 66 Q80 60 90 66" fill="#D8BFD8" opacity="0.6"/>
    <path d="M110 66 Q120 60 130 66" fill="#D8BFD8" opacity="0.6"/>

    <!-- Blush -->
    <ellipse cx="70" cy="85" rx="10" ry="6" fill="#E6B9FF" opacity="0.25"/>
    <ellipse cx="130" cy="85" rx="10" ry="6" fill="#E6B9FF" opacity="0.25"/>

    <!-- Sweet dreamy mouth -->
    <path d="M92 95 Q100 101 108 95" stroke="#B19CD9" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Flowing tentacles (4-5 strands, gradient fade) -->
  <!-- Tentacle 1 (far left) -->
  <g class="sj-tentacle" style="animation-delay: 0s">
    <path d="M65 110 Q60 135 63 160 Q64 170 55 180" stroke="#D8BFD8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <!-- Tentacle fade effect -->
    <line x1="65" y1="110" x2="63" y2="160" stroke="#E6D7FF" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Tentacle 2 -->
  <g class="sj-tentacle" style="animation-delay: 0.3s">
    <path d="M82" y1="114 Q78 145 84 170 Q87 180 78 188" stroke="#D8BFD8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.75"/>
    <line x1="82" y1="114" x2="84" y2="170" stroke="#E6D7FF" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Tentacle 3 (center) -->
  <g class="sj-tentacle" style="animation-delay: 0.6s">
    <path d="M100 115 Q100 148 100 175 Q100 185 105 195" stroke="#D8BFD8" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>
    <line x1="100" y1="115" x2="100" y2="175" stroke="#E6D7FF" stroke-width="1.5" fill="none" opacity="0.45"/>
  </g>

  <!-- Tentacle 4 -->
  <g class="sj-tentacle" style="animation-delay: 0.9s">
    <path d="M118 114 Q122 145 116 170 Q113 180 122 188" stroke="#D8BFD8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.75"/>
    <line x1="118" y1="114" x2="116" y2="170" stroke="#E6D7FF" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Tentacle 5 (far right) -->
  <g class="sj-tentacle" style="animation-delay: 1.2s">
    <path d="M135 110 Q140 135 137 160 Q136 170 145 180" stroke="#D8BFD8" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <line x1="135" y1="110" x2="137" y2="160" stroke="#E6D7FF" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- Floating sparkle particles (bioluminescent) -->
  <circle cx="70" cy="175" r="2.5" fill="#E6D7FF" class="sj-sparkle" style="animation-delay: 0s" filter="url(#sj-glow-effect)"/>
  <circle cx="105" cy="185" r="2" fill="#D8BFD8" class="sj-sparkle" style="animation-delay: 0.4s" filter="url(#sj-glow-effect)"/>
  <circle cx="125" cy="170" r="2.5" fill="#E6D7FF" class="sj-sparkle" style="animation-delay: 0.8s" filter="url(#sj-glow-effect)"/>
  <circle cx="90" cy="190" r="1.5" fill="#B19CD9" class="sj-sparkle" style="animation-delay: 1.2s" filter="url(#sj-glow-effect)"/>
</svg>
