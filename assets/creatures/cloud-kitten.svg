<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <style>
    .body{fill:#FFF;stroke:#E8E8E8;stroke-width:2}
    .eye{fill:#333} .shine{fill:#FFF}
    .blush{fill:#FF69B4;opacity:0.25}
  </style>
  <!-- Cloud-like body from overlapping circles -->
  <circle cx="72" cy="130" r="32" class="body"/>
  <circle cx="128" cy="130" r="32" class="body"/>
  <circle cx="100" cy="118" r="38" class="body"/>
  <circle cx="100" cy="140" r="30" class="body"/>
  <!-- Head -->
  <circle cx="100" cy="85" r="38" class="body"/>
  <!-- Ears -->
  <polygon points="72,60 65,35 82,52" fill="#FFF" stroke="#E8E8E8" stroke-width="2"/>
  <polygon points="128,60 135,35 118,52" fill="#FFF" stroke="#E8E8E8" stroke-width="2"/>
  <polygon points="72,58 68,42 80,53" fill="#FFB6C1" opacity="0.4"/>
  <polygon points="128,58 132,42 120,53" fill="#FFB6C1" opacity="0.4"/>
  <!-- Halo -->
  <ellipse cx="100" cy="40" rx="18" ry="6" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.4"/>
  <!-- Eyes (sleepy curves) -->
  <path d="M84 82 Q88 88 92 82" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M108 82 Q112 88 116 82" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="76" cy="92" rx="8" ry="5" class="blush"/>
  <ellipse cx="124" cy="92" rx="8" ry="5" class="blush"/>
  <!-- Nose -->
  <polygon points="97,93 103,93 100,97" fill="#FFB6C1"/>
  <!-- Mouth -->
  <path d="M94 99 Q100 105 106 99" stroke="#E8E8E8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="82" cy="165" rx="12" ry="7" class="body"/>
  <ellipse cx="118" cy="165" rx="12" ry="7" class="body"/>
</svg>