<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="po-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#F0F0F0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E0E8F0" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <style>
    .body{fill:#DEB887;stroke:#D2B48C;stroke-width:2}
    .eye{fill:#333} .shine{fill:#FFF}
    .blush{fill:#FF69B4;opacity:0.25}
  </style>
  <!-- Tail (visible at bottom) -->
  <path d="M100 175 Q85 180 80 190 Q85 192 95 185" class="body"/>
  <!-- Body (lying on back, oval wider at middle) -->
  <ellipse cx="100" cy="120" rx="48" ry="55" class="body"/>
  <!-- Lighter belly patch -->
  <ellipse cx="100" cy="125" rx="32" ry="38" fill="#F5DEB3" opacity="0.7"/>
  <!-- Head -->
  <circle cx="100" cy="65" r="35" class="body"/>
  <!-- Ears -->
  <circle cx="68" cy="48" r="8" class="body"/>
  <circle cx="132" cy="48" r="8" class="body"/>
  <circle cx="68" cy="48" r="5" fill="#D2B48C" opacity="0.5"/>
  <circle cx="132" cy="48" r="5" fill="#D2B48C" opacity="0.5"/>
  <!-- Lighter face -->
  <ellipse cx="100" cy="72" rx="22" ry="18" fill="#F5DEB3" opacity="0.5"/>
  <!-- Eyes (playful squinting ~ shapes) -->
  <path d="M82 62 Q86 58 90 62 Q86 66 82 62" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M110 62 Q114 58 118 62 Q114 66 110 62" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="76" cy="72" rx="8" ry="5" class="blush"/>
  <ellipse cx="124" cy="72" rx="8" ry="5" class="blush"/>
  <!-- Nose -->
  <ellipse cx="100" cy="72" rx="4" ry="3" fill="#D2B48C"/>
  <!-- Mouth -->
  <path d="M94 78 Q100 84 106 78" stroke="#D2B48C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Paws held up -->
  <ellipse cx="72" cy="95" rx="12" ry="8" class="body" transform="rotate(-15 72 95)"/>
  <ellipse cx="128" cy="95" rx="12" ry="8" class="body" transform="rotate(15 128 95)"/>
  <!-- Pearl (glowing) -->
  <circle cx="100" cy="95" r="12" fill="url(#po-glow)" stroke="#E0E8F0" stroke-width="1"/>
  <circle cx="96" cy="90" r="3" fill="white" opacity="0.7"/>
  <!-- Back paws -->
  <ellipse cx="75" cy="170" rx="14" ry="8" class="body"/>
  <ellipse cx="125" cy="170" rx="14" ry="8" class="body"/>
</svg>