<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="dl-body" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FF8A8A"/>
      <stop offset="100%" stop-color="#FF6347"/>
    </radialGradient>
    <radialGradient id="dl-head" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB0B0"/>
      <stop offset="100%" stop-color="#FF6347"/>
    </radialGradient>
    <radialGradient id="dl-flower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE4B5"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
    <filter id="dl-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes dl-bob {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      @keyframes dl-sway {
        0%, 100% { transform: rotateZ(-3deg); }
        50% { transform: rotateZ(3deg); }
      }
      .dl-creature { animation: dl-bob 2.8s ease-in-out infinite; }
      .dl-flower { animation: dl-sway 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <g class="dl-creature">
    <!-- Daisy flower hat -->
    <g class="dl-flower">
      <!-- Petals -->
      <ellipse cx="100" cy="30" rx="8" ry="16" fill="url(#dl-flower)"/>
      <ellipse cx="115" cy="35" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(45 115 35)"/>
      <ellipse cx="120" cy="50" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(90 120 50)"/>
      <ellipse cx="115" cy="65" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(135 115 65)"/>
      <ellipse cx="100" cy="70" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(180 100 70)"/>
      <ellipse cx="85" cy="65" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(225 85 65)"/>
      <ellipse cx="80" cy="50" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(270 80 50)"/>
      <ellipse cx="85" cy="35" rx="8" ry="16" fill="url(#dl-flower)" transform="rotate(315 85 35)"/>
      <!-- Center -->
      <circle cx="100" cy="50" r="12" fill="#FFD700"/>
      <circle cx="100" cy="50" r="8" fill="#FFA500"/>
    </g>

    <!-- Body -->
    <ellipse cx="100" cy="130" rx="50" ry="55" fill="url(#dl-body)" filter="url(#dl-shadow)"/>

    <!-- Wing covers (elytra) -->
    <ellipse cx="75" cy="110" rx="20" ry="50" fill="#FF0000" opacity="0.8"/>
    <ellipse cx="125" cy="110" rx="20" ry="50" fill="#FF0000" opacity="0.8"/>

    <!-- Black spots on wings -->
    <circle cx="75" cy="85" r="8" fill="#000000"/>
    <circle cx="125" cy="85" r="8" fill="#000000"/>
    <circle cx="75" cy="110" r="7" fill="#000000"/>
    <circle cx="125" cy="110" r="7" fill="#000000"/>
    <circle cx="75" cy="135" r="8" fill="#000000"/>
    <circle cx="125" cy="135" r="8" fill="#000000"/>

    <!-- Head -->
    <circle cx="100" cy="65" r="28" fill="url(#dl-head)"/>

    <!-- Eyes (big and cute) -->
    <circle cx="88" cy="58" r="8" fill="#FFFFFF"/>
    <circle cx="112" cy="58" r="8" fill="#FFFFFF"/>
    <circle cx="88" cy="58" r="5" fill="#000000"/>
    <circle cx="112" cy="58" r="5" fill="#000000"/>
    <circle cx="90" cy="55" r="2" fill="#FFFFFF"/>
    <circle cx="114" cy="55" r="2" fill="#FFFFFF"/>

    <!-- Blush -->
    <ellipse cx="72" cy="68" rx="7" ry="6" fill="#FFB6C1" opacity="0.35"/>
    <ellipse cx="128" cy="68" rx="7" ry="6" fill="#FFB6C1" opacity="0.35"/>

    <!-- Antenna -->
    <path d="M 85 48 L 80 30" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 115 48 L 120 30" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="80" cy="28" r="3" fill="#000000"/>
    <circle cx="120" cy="28" r="3" fill="#000000"/>

    <!-- Mouth -->
    <path d="M 96 75 Q 100 80 104 75" stroke="#000000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Front legs -->
    <ellipse cx="70" cy="170" rx="10" ry="18" fill="#000000" opacity="0.8"/>
    <ellipse cx="100" cy="175" rx="9" ry="16" fill="#000000" opacity="0.8"/>
    <ellipse cx="130" cy="170" rx="10" ry="18" fill="#000000" opacity="0.8"/>

    <!-- Back legs -->
    <ellipse cx="60" cy="140" rx="8" ry="14" fill="#000000" opacity="0.7"/>
    <ellipse cx="140" cy="140" rx="8" ry="14" fill="#000000" opacity="0.7"/>
  </g>
</svg>
