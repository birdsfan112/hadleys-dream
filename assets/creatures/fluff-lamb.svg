<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="fl-wool" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F0F0"/>
    </radialGradient>
    <radialGradient id="fl-face" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#FFF5EE"/>
      <stop offset="100%" stop-color="#FFE4E1"/>
    </radialGradient>
    <filter id="fl-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes fl-float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
      }
      @keyframes fl-sway {
        0%, 100% { transform: rotateZ(-1deg); }
        50% { transform: rotateZ(1deg); }
      }
      .fl-creature { animation: fl-float 3s ease-in-out infinite; }
      .fl-wool-puff { animation: fl-sway 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <g class="fl-creature">
    <!-- Cloud/fluffy body -->
    <g class="fl-wool-puff">
      <circle cx="100" cy="120" r="50" fill="url(#fl-wool)" filter="url(#fl-shadow)"/>
      <circle cx="75" cy="105" r="35" fill="url(#fl-wool)" opacity="0.9"/>
      <circle cx="125" cy="105" r="35" fill="url(#fl-wool)" opacity="0.9"/>
      <circle cx="85" cy="75" r="30" fill="url(#fl-wool)" opacity="0.85"/>
      <circle cx="115" cy="75" r="30" fill="url(#fl-wool)" opacity="0.85"/>
    </g>

    <!-- Face area -->
    <circle cx="100" cy="65" r="32" fill="url(#fl-face)"/>

    <!-- Ears -->
    <circle cx="80" cy="35" r="18" fill="url(#fl-wool)" filter="url(#fl-shadow)"/>
    <circle cx="120" cy="35" r="18" fill="url(#fl-wool)" filter="url(#fl-shadow)"/>
    <circle cx="80" cy="38" r="10" fill="#FFE4E1" opacity="0.6"/>
    <circle cx="120" cy="38" r="10" fill="#FFE4E1" opacity="0.6"/>

    <!-- Eyes (big and sparkly) -->
    <circle cx="88" cy="60" r="8" fill="#FFFFFF"/>
    <circle cx="112" cy="60" r="8" fill="#FFFFFF"/>
    <circle cx="88" cy="60" r="5" fill="#FFB6C1"/>
    <circle cx="112" cy="60" r="5" fill="#FFB6C1"/>
    <circle cx="90" cy="57" r="2" fill="#FFFFFF"/>
    <circle cx="114" cy="57" r="2" fill="#FFFFFF"/>

    <!-- Blush (rosy cheeks) -->
    <ellipse cx="70" cy="70" rx="8" ry="7" fill="#FFB6C1" opacity="0.4"/>
    <ellipse cx="130" cy="70" rx="8" ry="7" fill="#FFB6C1" opacity="0.4"/>

    <!-- Nose -->
    <ellipse cx="100" cy="75" rx="5" ry="4" fill="#FFB6C1" opacity="0.7"/>

    <!-- Mouth (cute smile) -->
    <path d="M 95 82 Q 100 86 105 82" stroke="#FFB6C1" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Front left leg -->
    <ellipse cx="70" cy="160" rx="14" ry="22" fill="url(#fl-wool)"/>
    <ellipse cx="70" cy="180" rx="11" ry="12" fill="#E0E0E0"/>

    <!-- Front right leg -->
    <ellipse cx="130" cy="160" rx="14" ry="22" fill="url(#fl-wool)"/>
    <ellipse cx="130" cy="180" rx="11" ry="12" fill="#E0E0E0"/>

    <!-- Tail (fluffy pom-pom) -->
    <circle cx="55" cy="110" r="20" fill="url(#fl-wool)" opacity="0.85"/>
    <circle cx="50" cy="120" r="16" fill="url(#fl-wool)" opacity="0.8"/>

    <!-- Wool texture/highlights -->
    <circle cx="90" cy="100" r="3" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="110" cy="100" r="3" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="75" cy="130" r="2.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="125" cy="130" r="2.5" fill="#FFFFFF" opacity="0.4"/>

    <!-- Floating cloud puffs (atmospheric) -->
    <circle cx="30" cy="30" r="12" fill="url(#fl-wool)" opacity="0.5"/>
    <circle cx="170" cy="40" r="14" fill="url(#fl-wool)" opacity="0.5"/>
    <circle cx="25" cy="120" r="10" fill="url(#fl-wool)" opacity="0.4"/>
  </g>
</svg>
