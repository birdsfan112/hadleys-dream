<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="au-horn" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFD1DC"/>
      <stop offset="50%" stop-color="#C8A2C8"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="au-mane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB6C1"/>
      <stop offset="25%" stop-color="#C8A2C8"/>
      <stop offset="50%" stop-color="#ADD8E6"/>
      <stop offset="75%" stop-color="#98FB98"/>
      <stop offset="100%" stop-color="#FFB6C1"/>
    </linearGradient>
  </defs>
  <style>
    .body{fill:#FFD1DC;stroke:#C8A2C8;stroke-width:2}
    .eye{fill:#333} .shine{fill:#FFF}
    .blush{fill:#FF69B4;opacity:0.25}
  </style>
  <!-- Aurora tail -->
  <path d="M50 130 Q30 120 25 105" fill="none" stroke="#FFB6C1" stroke-width="3" stroke-linecap="round"/>
  <path d="M48 135 Q26 128 20 112" fill="none" stroke="#C8A2C8" stroke-width="3" stroke-linecap="round"/>
  <path d="M46 140 Q22 136 15 120" fill="none" stroke="#ADD8E6" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="72" y="148" width="12" height="28" rx="5" class="body"/>
  <rect x="92" y="150" width="12" height="26" rx="5" class="body"/>
  <rect x="112" y="148" width="12" height="28" rx="5" class="body"/>
  <rect x="130" y="150" width="12" height="26" rx="5" class="body"/>
  <!-- Hooves -->
  <ellipse cx="78" cy="178" rx="7" ry="4" fill="#C8A2C8"/>
  <ellipse cx="98" cy="178" rx="7" ry="4" fill="#C8A2C8"/>
  <ellipse cx="118" cy="178" rx="7" ry="4" fill="#C8A2C8"/>
  <ellipse cx="136" cy="178" rx="7" ry="4" fill="#C8A2C8"/>
  <!-- Body -->
  <ellipse cx="105" cy="130" rx="42" ry="28" class="body"/>
  <!-- Lighter belly -->
  <ellipse cx="105" cy="138" rx="30" ry="16" fill="#FFF0F5" opacity="0.5"/>
  <!-- Neck -->
  <ellipse cx="135" cy="100" rx="16" ry="28" class="body" transform="rotate(15 135 100)"/>
  <!-- Head -->
  <circle cx="148" cy="68" r="26" class="body"/>
  <!-- Mane -->
  <path d="M132 55 Q125 65 128 80 Q126 90 130 100" fill="none" stroke="url(#au-mane)" stroke-width="4" stroke-linecap="round"/>
  <path d="M136 50 Q128 62 132 76 Q130 88 134 98" fill="none" stroke="url(#au-mane)" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M140 48 Q132 58 135 72 Q132 84 137 95" fill="none" stroke="url(#au-mane)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M144 47 Q138 56 140 68" fill="none" stroke="url(#au-mane)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Horn -->
  <polygon points="155,45 148,20 161,45" fill="url(#au-horn)" stroke="#C8A2C8" stroke-width="1"/>
  <!-- Spiral line on horn -->
  <path d="M152 40 Q155 36 153 32 Q150 28 152 24" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.6"/>
  <!-- Ear -->
  <polygon points="138,48 132,32 145,42" fill="#FFD1DC" stroke="#C8A2C8" stroke-width="1.5"/>
  <!-- Eye (with star shine) -->
  <circle cx="155" cy="65" r="7" class="eye"/>
  <polygon points="153,61 154,63 152,63" fill="#FFF" opacity="0.9"/>
  <polygon points="153,63 155,62 155,64 153,63 151,62 151,64" fill="#FFF" opacity="0.9"/>
  <!-- Blush -->
  <ellipse cx="165" cy="75" rx="7" ry="4" class="blush"/>
  <!-- Mouth -->
  <path d="M160 78 Q164 82 168 78" stroke="#C8A2C8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Sparkles around horn -->
  <circle cx="140" cy="18" r="2" fill="#FFD700" opacity="0.7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="165" cy="25" r="1.5" fill="#C8A2C8" opacity="0.6">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="12" r="2" fill="#ADD8E6" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="35" r="1.5" fill="#FFB6C1" opacity="0.6">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="30" r="2" fill="#98FB98" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>