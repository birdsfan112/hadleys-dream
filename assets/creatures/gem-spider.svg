<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="gs-body-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9B7FD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6A4B8E;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="gs-gem-amethyst" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#E8D7FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9B7FD4;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6A4B8E;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="gs-gem-emerald" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#E0F8D7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7FD47F;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4B8E4B;stop-opacity:0.8" />
    </radialGradient>
    <radialGradient id="gs-gem-ruby" cx="35%" cy="35%" r="70%">
      <stop offset="0%" style="stop-color:#FFE0D7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D47F7F;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8E4B4B;stop-opacity:0.8" />
    </radialGradient>
    <filter id="gs-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="1" dy="1.5" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="gs-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
  </defs>
  <style>
    @keyframes gs-body-sway {
      0%, 100% { transform: rotateZ(-2deg); }
      50% { transform: rotateZ(2deg); }
    }
    @keyframes gs-gem-sparkle {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .gs-body { animation: gs-body-sway 2.5s ease-in-out infinite; }
    .gs-gem { animation: gs-gem-sparkle 1.8s ease-in-out infinite; }
  </style>

  <!-- Web strands with dewdrop jewels -->
  <line x1="60" y1="42" x2="45" y2="25" stroke="#9B7FD4" stroke-width="1.2" opacity="0.5"/>
  <circle cx="45" cy="25" r="3.5" fill="url(#gs-gem-emerald)" class="gs-gem" style="animation-delay: 0s" filter="url(#gs-glow)"/>

  <line x1="140" y1="42" x2="160" y2="22" stroke="#9B7FD4" stroke-width="1.2" opacity="0.5"/>
  <circle cx="160" cy="22" r="3.5" fill="url(#gs-gem-ruby)" class="gs-gem" style="animation-delay: 0.5s" filter="url(#gs-glow)"/>

  <line x1="100" y1="55" x2="100" y2="28" stroke="#9B7FD4" stroke-width="1.2" opacity="0.5"/>
  <circle cx="100" cy="28" r="4" fill="url(#gs-gem-amethyst)" class="gs-gem" style="animation-delay: 1s" filter="url(#gs-glow)"/>

  <!-- Main body -->
  <g class="gs-body">
    <!-- Round gem-like body (deep amethyst purple) -->
    <circle cx="100" cy="110" r="32" fill="url(#gs-body-grad)" filter="url(#gs-shadow)"/>

    <!-- Faceted gem texture on body -->
    <path d="M78 100 L100 85 L122 100" stroke="#6A4B8E" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M82 120 L100 108 L118 120" stroke="#6A4B8E" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M90 130 L100 125 L110 130" stroke="#6A4B8E" stroke-width="1.2" fill="none" opacity="0.3"/>

    <!-- Eyes (cute and sparkly - 6 total) -->
    <!-- Top row (4 small) -->
    <circle cx="84" cy="98" r="4" fill="#2C3E50"/>
    <circle cx="94" cy="95" r="4" fill="#2C3E50"/>
    <circle cx="106" cy="95" r="4" fill="#2C3E50"/>
    <circle cx="116" cy="98" r="4" fill="#2C3E50"/>

    <!-- Bottom row (2 larger main eyes) -->
    <circle cx="90" cy="110" r="5" fill="#2C3E50"/>
    <circle cx="110" cy="110" r="5" fill="#2C3E50"/>

    <!-- Eye shines -->
    <circle cx="83" cy="96" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="93" cy="93" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="105" cy="93" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="115" cy="96" r="1.5" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="88" cy="108" r="2" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="108" cy="108" r="2" fill="#FFFFFF" opacity="0.9"/>

    <!-- Blush (sparkly) -->
    <ellipse cx="75" cy="118" rx="10" ry="5" fill="#DDA0DD" opacity="0.25"/>
    <ellipse cx="125" cy="118" rx="10" ry="5" fill="#DDA0DD" opacity="0.25"/>

    <!-- Cute smile -->
    <path d="M94 125 Q100 131 106 125" stroke="#6A4B8E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Stylized legs (4 pairs, curved upward) -->
  <!-- Left side legs -->
  <path d="M70 90 Q48 68 35 50" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>
  <path d="M66 102 Q42 92 22 78" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>
  <path d="M66 118 Q42 128 22 145" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>
  <path d="M70 130 Q52 150 38 168" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>

  <!-- Right side legs -->
  <path d="M130 90 Q152 68 165 50" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>
  <path d="M134 102 Q158 92 178 78" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>
  <path d="M134 118 Q158 128 178 145" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>
  <path d="M130 130 Q148 150 162 168" stroke="#6A4B8E" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#gs-shadow)"/>

  <!-- Web fragment in background -->
  <g opacity="0.4">
    <line x1="25" y1="140" x2="50" y2="155" stroke="#9B7FD4" stroke-width="1"/>
    <line x1="50" y1="155" x2="70" y2="142" stroke="#9B7FD4" stroke-width="1"/>
    <line x1="25" y1="140" x2="40" y2="170" stroke="#9B7FD4" stroke-width="1"/>
    <circle cx="50" cy="155" r="1.5" fill="#E6D7FF"/>
  </g>
</svg>
