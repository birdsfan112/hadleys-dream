<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sfd-body-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sfd-eye-shine" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:0.3" />
    </radialGradient>
    <radialGradient id="sfd-tiara-grad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#E6E6FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:0.7" />
    </radialGradient>
    <filter id="sfd-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sfd-sparkle">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  <style>
    @keyframes sfd-spin {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(8deg); }
    }
    @keyframes sfd-arm-wave {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(15deg); }
      75% { transform: translateY(0px) rotate(-8deg); }
    }
    @keyframes sfd-sparkle-twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .sfd-body { animation: sfd-spin 3s ease-in-out infinite; }
    .sfd-arm-raised { animation: sfd-arm-wave 2s ease-in-out infinite; }
    .sfd-sparkle { animation: sfd-sparkle-twinkle 1.5s ease-in-out infinite; }
  </style>

  <!-- Shadow -->
  <ellipse cx="100" cy="175" rx="45" ry="8" fill="#000" opacity="0.1"/>

  <!-- Main starfish body -->
  <g class="sfd-body">
    <!-- Central body sphere -->
    <circle cx="100" cy="100" r="35" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)"/>

    <!-- Five arms with bumpy texture -->
    <!-- Top arm -->
    <ellipse cx="100" cy="35" rx="20" ry="28" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)"/>
    <!-- Top-right arm (raised in dance pose) -->
    <g class="sfd-arm-raised">
      <ellipse cx="150" cy="55" rx="22" ry="26" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)" transform="rotate(45 150 55)"/>
    </g>
    <!-- Right arm -->
    <ellipse cx="155" cy="105" rx="26" ry="20" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)" transform="rotate(-20 155 105)"/>
    <!-- Bottom-right arm -->
    <ellipse cx="135" cy="155" rx="22" ry="25" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)" transform="rotate(-50 135 155)"/>
    <!-- Left arm -->
    <ellipse cx="45" cy="105" rx="26" ry="20" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)" transform="rotate(20 45 105)"/>
    <!-- Bottom-left arm -->
    <ellipse cx="65" cy="155" rx="22" ry="25" fill="url(#sfd-body-grad)" filter="url(#sfd-shadow)" transform="rotate(50 65 155)"/>

    <!-- Bumpy texture dots on body and arms -->
    <circle cx="95" cy="75" r="2" fill="#FF8C00" opacity="0.5"/>
    <circle cx="120" cy="70" r="1.8" fill="#FF8C00" opacity="0.5"/>
    <circle cx="130" cy="85" r="1.8" fill="#FF8C00" opacity="0.4"/>
    <circle cx="140" cy="100" r="2" fill="#FF8C00" opacity="0.5"/>
    <circle cx="60" cy="85" r="1.8" fill="#FF8C00" opacity="0.4"/>
    <circle cx="70" cy="100" r="2" fill="#FF8C00" opacity="0.5"/>
    <circle cx="100" cy="115" r="1.8" fill="#FF8C00" opacity="0.4"/>

    <!-- Eyes with sparkle anime style -->
    <circle cx="85" cy="95" r="7" fill="#1A1A1A"/>
    <circle cx="115" cy="95" r="7" fill="#1A1A1A"/>
    <circle cx="83" cy="92" r="4.5" fill="url(#sfd-eye-shine)"/>
    <circle cx="113" cy="92" r="4.5" fill="url(#sfd-eye-shine)"/>
    <circle cx="86" cy="89" r="2" fill="#FFFFFF"/>
    <circle cx="116" cy="89" r="2" fill="#FFFFFF"/>

    <!-- Blush -->
    <ellipse cx="70" cy="105" rx="11" ry="7" fill="#FF69B4" opacity="0.25"/>
    <ellipse cx="130" cy="105" rx="11" ry="7" fill="#FF69B4" opacity="0.25"/>

    <!-- Happy mouth -->
    <path d="M93 112 Q100 118 107 112" stroke="#FF8C00" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tiara on top point with sparkles -->
  <g filter="url(#sfd-sparkle)">
    <!-- Tiara base -->
    <ellipse cx="100" cy="30" rx="18" ry="8" fill="url(#sfd-tiara-grad)"/>
    <!-- Center gem -->
    <circle cx="100" cy="28" r="4" fill="url(#sfd-tiara-grad)"/>
    <!-- Left gem -->
    <circle cx="88" cy="32" r="3" fill="url(#sfd-tiara-grad)"/>
    <!-- Right gem -->
    <circle cx="112" cy="32" r="3" fill="url(#sfd-tiara-grad)"/>
    <!-- Gem shines -->
    <circle cx="100" cy="26" r="1.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="88" cy="30" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="112" cy="30" r="1" fill="#FFFFFF" opacity="0.8"/>
  </g>

  <!-- Floating sparkle particles -->
  <circle cx="60" cy="50" r="2" fill="#FFD700" class="sfd-sparkle" style="animation-delay: 0s"/>
  <circle cx="140" cy="40" r="2" fill="#FFD700" class="sfd-sparkle" style="animation-delay: 0.5s"/>
  <circle cx="65" cy="135" r="1.5" fill="#FFD700" class="sfd-sparkle" style="animation-delay: 1s"/>
  <circle cx="135" cy="130" r="1.5" fill="#FFD700" class="sfd-sparkle" style="animation-delay: 0.3s"/>
</svg>
