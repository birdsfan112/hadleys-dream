<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <radialGradient id="afw-wing-ul" cx="0.3" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#F0E6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E6E6FA" stop-opacity="0.35"/>
    </radialGradient>
    <radialGradient id="afw-wing-ur" cx="0.7" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#F0E6FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E6E6FA" stop-opacity="0.35"/>
    </radialGradient>
    <radialGradient id="afw-wing-ll" cx="0.35" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#F0E6FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E6E6FA" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="afw-wing-lr" cx="0.65" cy="0.4" r="0.7">
      <stop offset="0%" stop-color="#F0E6FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#E6E6FA" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <style>
    .afw-upper-l{fill:url(#afw-wing-ul);stroke:#D8BFD8;stroke-width:1.5;stroke-linejoin:round}
    .afw-upper-r{fill:url(#afw-wing-ur);stroke:#D8BFD8;stroke-width:1.5;stroke-linejoin:round}
    .afw-lower-l{fill:url(#afw-wing-ll);stroke:#D8BFD8;stroke-width:1.2;stroke-linejoin:round}
    .afw-lower-r{fill:url(#afw-wing-lr);stroke:#D8BFD8;stroke-width:1.2;stroke-linejoin:round}
    .afw-vein{stroke:#D8BFD8;stroke-width:0.8;fill:none;stroke-linecap:round;opacity:0.6}
    .afw-sparkle{fill:#FFF;opacity:0.7}
  </style>
  <g id="back-layer">
    <!-- Upper left wing -->
    <path d="
      M86 158
      Q68 133 42 122
      Q28 118 25 132
      Q22 150 35 162
      Q48 174 65 178
      Q78 179 86 172
      Z
    " class="afw-upper-l"/>
    <!-- Upper right wing -->
    <path d="
      M114 158
      Q132 133 158 122
      Q172 118 175 132
      Q178 150 165 162
      Q152 174 135 178
      Q122 179 114 172
      Z
    " class="afw-upper-r"/>
    <!-- Lower left wing -->
    <path d="
      M84 174
      Q64 182 48 198
      Q38 209 42 221
      Q48 231 62 227
      Q76 221 84 208
      Q88 198 88 188
      Z
    " class="afw-lower-l"/>
    <!-- Lower right wing -->
    <path d="
      M116 174
      Q136 182 152 198
      Q162 209 158 221
      Q152 231 138 227
      Q124 221 116 208
      Q112 198 112 188
      Z
    " class="afw-lower-r"/>
    <!-- Upper left wing veins -->
    <path d="M84 160 Q65 148 40 135" class="afw-vein"/>
    <path d="M84 165 Q68 158 48 155" class="afw-vein"/>
    <path d="M84 169 Q72 168 58 172" class="afw-vein"/>
    <!-- Upper right wing veins -->
    <path d="M116 160 Q135 148 160 135" class="afw-vein"/>
    <path d="M116 165 Q132 158 152 155" class="afw-vein"/>
    <path d="M116 169 Q128 168 142 172" class="afw-vein"/>
    <!-- Lower left wing veins -->
    <path d="M84 180 Q68 192 52 208" class="afw-vein"/>
    <path d="M84 185 Q72 199 62 218" class="afw-vein"/>
    <!-- Lower right wing veins -->
    <path d="M116 180 Q132 192 148 208" class="afw-vein"/>
    <path d="M116 185 Q128 199 138 218" class="afw-vein"/>
    <!-- Sparkle dots scattered on wings -->
    <circle cx="50" cy="137" r="1.8" class="afw-sparkle"/>
    <circle cx="38" cy="152" r="1.2" class="afw-sparkle"/>
    <circle cx="60" cy="162" r="1.5" class="afw-sparkle"/>
    <circle cx="45" cy="170" r="1" class="afw-sparkle"/>
    <circle cx="70" cy="147" r="1.3" class="afw-sparkle"/>
    <circle cx="150" cy="137" r="1.8" class="afw-sparkle"/>
    <circle cx="162" cy="152" r="1.2" class="afw-sparkle"/>
    <circle cx="140" cy="162" r="1.5" class="afw-sparkle"/>
    <circle cx="155" cy="170" r="1" class="afw-sparkle"/>
    <circle cx="130" cy="147" r="1.3" class="afw-sparkle"/>
    <!-- Lower wing sparkles -->
    <circle cx="55" cy="202" r="1.3" class="afw-sparkle"/>
    <circle cx="65" cy="215" r="1" class="afw-sparkle"/>
    <circle cx="145" cy="202" r="1.3" class="afw-sparkle"/>
    <circle cx="135" cy="215" r="1" class="afw-sparkle"/>
    <!-- Wing root connection -->
    <ellipse cx="100" cy="168" rx="6" ry="12" fill="#E6E6FA" stroke="#D8BFD8" stroke-width="1" opacity="0.4"/>
  </g>
  <g id="clothing">
    <!-- empty front layer — wings are fully behind the body -->
  </g>
</svg>