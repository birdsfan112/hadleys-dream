<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="boots-leather" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B5522"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <linearGradient id="boots-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B3410"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
  </defs>
  <style>
    .bo-boot{fill:url(#boots-leather);stroke:#5A2D0E;stroke-width:1.8;stroke-linejoin:round}
    .bo-shade{fill:#6B3410;stroke:none}
    .bo-sole{fill:#3D1F08;stroke:#5A2D0E;stroke-width:1.5;stroke-linejoin:round}
    .bo-buckle{fill:#FFD700;stroke:#DAA520;stroke-width:1;stroke-linejoin:round}
    .bo-stitch{stroke:#A0682A;stroke-width:0.8;fill:none;stroke-linecap:round;stroke-dasharray:2.5 2}
  </style>
  <g id="clothing">
    <!-- Left boot sole -->
    <ellipse cx="84" cy="313" rx="20" ry="7" class="bo-sole"/>
    <!-- Left boot body -->
    <path d="
      M66 285
      Q64 288 64 295
      L64 306
      Q64 314 84 316
      Q104 314 104 306
      L104 295
      Q104 288 102 285
      Z
    " class="bo-boot"/>
    <!-- Left boot shaft (up to mid-calf) -->
    <path d="
      M68 286
      L66 285
      Q64 285 64 282
      L64 285
    " fill="none" stroke="#5A2D0E" stroke-width="0"/>
    <rect x="66" y="270" width="36" height="18" rx="4" fill="url(#boots-leather)" stroke="#5A2D0E" stroke-width="1.8"/>
    <!-- Left boot top cuff -->
    <path d="M66 270 Q84 266 102 270" fill="#9B5522" stroke="#5A2D0E" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Left boot shading -->
    <path d="
      M68 275
      Q66 285 66 300
      Q66 308 72 312
      L68 310
      Q64 306 64 300
      Q64 285 68 275
      Z
    " class="bo-shade" opacity="0.4"/>
    <!-- Left boot toe cap -->
    <path d="M68 306 Q76 300 84 298 Q92 300 100 306" fill="none" stroke="#5A2D0E" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Left boot stitching -->
    <path d="M84 272 L84 296" class="bo-stitch"/>
    <!-- Left boot buckle strap -->
    <rect x="70" y="278" width="28" height="5" rx="2" fill="#6B3410" stroke="#5A2D0E" stroke-width="1"/>
    <!-- Left boot buckle -->
    <rect x="80" y="276" width="8" height="9" rx="2" class="bo-buckle"/>
    <rect x="83" y="278" width="2" height="5" rx="0.5" fill="#DAA520"/>

    <!-- Right boot sole -->
    <ellipse cx="116" cy="313" rx="20" ry="7" class="bo-sole"/>
    <!-- Right boot body -->
    <path d="
      M98 285
      Q96 288 96 295
      L96 306
      Q96 314 116 316
      Q136 314 136 306
      L136 295
      Q136 288 134 285
      Z
    " class="bo-boot"/>
    <!-- Right boot shaft -->
    <rect x="98" y="270" width="36" height="18" rx="4" fill="url(#boots-leather)" stroke="#5A2D0E" stroke-width="1.8"/>
    <!-- Right boot top cuff -->
    <path d="M98 270 Q116 266 134 270" fill="#9B5522" stroke="#5A2D0E" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Right boot shading -->
    <path d="
      M132 275
      Q134 285 134 300
      Q134 308 128 312
      L132 310
      Q136 306 136 300
      Q136 285 132 275
      Z
    " class="bo-shade" opacity="0.4"/>
    <!-- Right boot toe cap -->
    <path d="M100 306 Q108 300 116 298 Q124 300 132 306" fill="none" stroke="#5A2D0E" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right boot stitching -->
    <path d="M116 272 L116 296" class="bo-stitch"/>
    <!-- Right boot buckle strap -->
    <rect x="102" y="278" width="28" height="5" rx="2" fill="#6B3410" stroke="#5A2D0E" stroke-width="1"/>
    <!-- Right boot buckle -->
    <rect x="112" y="276" width="8" height="9" rx="2" class="bo-buckle"/>
    <rect x="115" y="278" width="2" height="5" rx="0.5" fill="#DAA520"/>
  </g>
</svg>