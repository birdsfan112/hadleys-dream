<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="agt-body-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B3410"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#6B3410"/>
    </linearGradient>
    <linearGradient id="agt-body-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <radialGradient id="agt-hole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D2B48C"/>
      <stop offset="100%" stop-color="#704214"/>
    </radialGradient>
    <linearGradient id="agt-neck" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#704214"/>
      <stop offset="50%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#704214"/>
    </linearGradient>
  </defs>
  <style>
    .agt-body{fill:url(#agt-body-dark);stroke:#5C2410;stroke-width:1.5;stroke-linejoin:round}
    .agt-body-shine{fill:url(#agt-body-light);opacity:0.4;stroke:none}
    .agt-hole{fill:url(#agt-hole);stroke:#3D1F0A;stroke-width:1}
    .agt-neck{stroke:url(#agt-neck);stroke-width:3;fill:none;stroke-linecap:round}
    .agt-strings{stroke:#E8E8E8;stroke-width:0.7;fill:none;stroke-linecap:round;opacity:0.9}
    .agt-peg{fill:#704214;stroke:#5C2410;stroke-width:1}
  </style>
  <g id="clothing">
    <!-- Guitar neck extending up from body -->
    <path d="M110 160 L80 130" class="agt-neck"/>
    <!-- Guitar body (larger hourglass shape with pronounced waist) -->
    <path d="
      M105 155
      Q85 145 82 165
      Q78 200 105 235
      Q132 200 130 165
      Q127 145 105 155
      Z
    " class="agt-body"/>
    <!-- Body highlight/shading -->
    <ellipse cx="103" cy="190" rx="12" ry="22" class="agt-body-shine"/>
    <!-- Sound hole -->
    <circle cx="105" cy="190" r="7.5" class="agt-hole"/>
    <!-- Sound hole highlight -->
    <circle cx="105" cy="188" r="3" fill="#FFE4B5" opacity="0.5" stroke="none"/>
    <!-- Guitar strings (6 strings) -->
    <line x1="98" y1="165" x2="98" y2="235" class="agt-strings"/>
    <line x1="102" y1="160" x2="102" y2="235" class="agt-strings"/>
    <line x1="106" y1="160" x2="106" y2="235" class="agt-strings"/>
    <line x1="110" y1="160" x2="110" y2="235" class="agt-strings"/>
    <line x1="114" y1="165" x2="114" y2="230" class="agt-strings"/>
    <line x1="94" y1="170" x2="94" y2="228" class="agt-strings"/>
    <!-- Neck wood grain detail -->
    <line x1="82" y1="145" x2="78" y2="155" stroke="#704214" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="86" y1="138" x2="82" y2="150" stroke="#704214" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
    <line x1="90" y1="132" x2="86" y2="145" stroke="#704214" stroke-width="0.8" opacity="0.5" stroke-linecap="round"/>
    <!-- Tuning pegs at headstock -->
    <circle cx="75" cy="115" r="3.5" class="agt-peg"/>
    <circle cx="82" cy="110" r="3.5" class="agt-peg"/>
    <circle cx="87" cy="120" r="3.5" class="agt-peg"/>
    <circle cx="80" cy="105" r="3.5" class="agt-peg"/>
    <circle cx="88" cy="110" r="3.5" class="agt-peg"/>
    <circle cx="85" cy="125" r="3.5" class="agt-peg"/>
    <!-- Bridge area shading -->
    <rect x="102" y="218" width="6" height="12" fill="#704214" opacity="0.6" rx="1"/>
  </g>
</svg>