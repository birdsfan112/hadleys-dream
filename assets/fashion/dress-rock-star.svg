<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <style>
    .rs-main{fill:#333333;stroke:#1A1A1A;stroke-width:2;stroke-linejoin:round}
    .rs-shade{fill:#1A1A1A;stroke:none;opacity:0.5}
    .rs-strap{fill:#666666;stroke:#1A1A1A;stroke-width:2.2;stroke-linecap:round}
    .rs-stud{fill:#FFD700;stroke:#DAA520;stroke-width:0.8}
    .rs-chain{stroke:#C0C0C0;stroke-width:1.2;fill:none;stroke-linecap:round}
  </style>
  <defs>
    <linearGradient id="rs-bodice-grad" x1="0" y1="134" x2="0" y2="198">
      <stop offset="0%" stop-color="#4A4A4A"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
  </defs>
  <g id="clothing">
    <!-- Single right strap (asymmetric) -->
    <line x1="118" y1="118" x2="120" y2="140" class="rs-strap"/>

    <!-- Chain detail on strap -->
    <path d="M118 120 L120 125 M118 130 L120 135" class="rs-chain"/>

    <!-- Fitted asymmetric bodice -->
    <path d="M72 140 Q68 136 72 134 L128 134 Q132 136 128 140 L130 198 H70 Z" fill="url(#rs-bodice-grad)" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>

    <!-- Bodice shading (left side darker) -->
    <path d="M70 142 L76 142 L76 198 L70 198 Z" class="rs-shade"/>

    <!-- Waistline accent -->
    <line x1="70" y1="198" x2="130" y2="198" stroke="#1A1A1A" stroke-width="2.5"/>

    <!-- Solid base skirt (full coverage underneath) -->
    <path d="M70 198 Q68 220 66 250 Q70 278 80 288 L100 290 L120 288 Q130 278 134 250 Q132 220 130 198 Z" fill="#262626" stroke="none"/>

    <!-- Studded belt at waist -->
    <circle cx="78" cy="198" r="1.8" class="rs-stud"/>
    <circle cx="88" cy="198" r="1.8" class="rs-stud"/>
    <circle cx="100" cy="198" r="1.8" class="rs-stud"/>
    <circle cx="112" cy="198" r="1.8" class="rs-stud"/>
    <circle cx="122" cy="198" r="1.8" class="rs-stud"/>

    <!-- Studded decorations on bodice -->
    <circle cx="82" cy="160" r="1.5" class="rs-stud"/>
    <circle cx="100" cy="155" r="1.5" class="rs-stud"/>
    <circle cx="118" cy="165" r="1.5" class="rs-stud"/>
    <circle cx="90" cy="178" r="1.3" class="rs-stud"/>
    <circle cx="110" cy="180" r="1.3" class="rs-stud"/>

    <!-- Asymmetric skirt (shorter on left, longer on right) -->
    <path d="M70 198 Q68 215 66 245 Q70 275 80 285 L86 268 Q88 230 90 205 Z" class="rs-main"/>
    <path d="M90 205 L88 268 Q92 280 100 288 Q100 275 102 220 Z" class="rs-main"/>
    <path d="M102 220 Q104 275 100 288 Q108 280 112 268 L110 205 Z" class="rs-main"/>
    <path d="M110 205 Q112 230 114 268 L120 285 Q130 275 134 245 Q132 215 130 198 Z" class="rs-main"/>

    <!-- Lightning bolt decoration (left side) -->
    <path d="M78 220 L82 235 L80 235 L88 260 L84 260 L92 285" stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Jagged/frayed hem edges (left) -->
    <path d="M80 285 L78 290 L82 288 L80 292 L84 289" stroke="#FFD700" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Jagged/frayed hem edges (right) -->
    <path d="M120 285 L122 290 L118 288 L120 292 L116 289" stroke="#FFD700" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Skirt fold lines -->
    <path d="M80 210 Q76 250 74 280" stroke="#1A1A1A" stroke-width="0.9" fill="none" opacity="0.4"/>
    <path d="M120 210 Q124 250 126 280" stroke="#1A1A1A" stroke-width="0.9" fill="none" opacity="0.4"/>

    <!-- Skirt shading -->
    <path d="M70 198 Q68 215 66 245 Q70 270 76 282 Q73 235 76 210 Z" class="rs-shade"/>
    <path d="M130 198 Q132 215 134 245 Q130 270 124 282 Q127 235 124 210 Z" class="rs-shade"/>
  </g>
</svg>
