<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <style>
    .mp-main{fill:#87CEEB;stroke:#4169E1;stroke-width:2;stroke-linejoin:round}
    .mp-bump{fill:#4169E1;stroke:#2E4FA1;stroke-width:1}
    .mp-sparkle{fill:#FFFFFF;stroke:none;opacity:0.7}
    .mp-accent{fill:#ADD8E6;stroke:none;opacity:0.5}
  </style>
  <g id="clothing">
    <!-- Egg-shaped bodice -->
    <path d="M74 134 L126 134 Q132 140 132 160 L132 198 L68 198 L68 160 Q68 140 74 134 Z" class="mp-main"/>
    <!-- Color bump accents on shoulders -->
    <circle cx="72" cy="142" r="6" class="mp-bump"/>
    <circle cx="128" cy="142" r="6" class="mp-bump"/>
    <circle cx="80" cy="136" r="4" class="mp-bump"/>
    <circle cx="120" cy="136" r="4" class="mp-bump"/>
    <!-- Sparkle eyes design -->
    <circle cx="90" cy="160" r="5" fill="#FFF" stroke="#4169E1" stroke-width="1"/>
    <circle cx="110" cy="160" r="5" fill="#FFF" stroke="#4169E1" stroke-width="1"/>
    <path d="M88 160 L90 156 L92 160 L90 164 Z" fill="#4169E1"/>
    <path d="M108 160 L110 156 L112 160 L110 164 Z" fill="#4169E1"/>
    <!-- Round puffy skirt -->
    <ellipse cx="100" cy="250" rx="42" ry="55" class="mp-main"/>
    <!-- Connect bodice to skirt -->
    <rect x="68" y="195" width="64" height="12" class="mp-main" stroke="none"/>
    <!-- Color bumps on skirt -->
    <circle cx="70" cy="230" r="5" class="mp-bump"/>
    <circle cx="130" cy="235" r="5" class="mp-bump"/>
    <circle cx="82" cy="270" r="4" class="mp-bump"/>
    <circle cx="118" cy="275" r="4" class="mp-bump"/>
    <circle cx="100" cy="290" r="5" class="mp-bump"/>
    <!-- Sparkle highlights -->
    <circle cx="85" cy="220" r="2" class="mp-sparkle"/>
    <circle cx="115" cy="245" r="1.8" class="mp-sparkle"/>
    <circle cx="95" cy="260" r="2" class="mp-sparkle"/>
    <circle cx="105" cy="210" r="1.5" class="mp-sparkle"/>
  </g>
</svg>
