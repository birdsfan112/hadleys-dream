<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <radialGradient id="hfc-pink" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FF8DC7"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </radialGradient>
    <radialGradient id="hfc-gold" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
    <radialGradient id="hfc-blue" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#A8DEFF"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </radialGradient>
    <radialGradient id="hfc-red" cx="0.4" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#FF8A70"/>
      <stop offset="100%" stop-color="#FF6347"/>
    </radialGradient>
  </defs>
  <style>
    .hfc-stem{fill:none;stroke:#4CAF50;stroke-width:2.5;stroke-linecap:round}
    .hfc-leaf{fill:#66BB6A;stroke:#4CAF50;stroke-width:1}
    .hfc-petal-pink{fill:url(#hfc-pink);stroke:#E05A9E;stroke-width:1}
    .hfc-petal-gold{fill:url(#hfc-gold);stroke:#CCA600;stroke-width:1}
    .hfc-petal-blue{fill:url(#hfc-blue);stroke:#5E9EBD;stroke-width:1}
    .hfc-petal-red{fill:url(#hfc-red);stroke:#CC4F38;stroke-width:1}
    .hfc-center{fill:#FFF8DC;stroke:#E8C060;stroke-width:0.8}
  </style>
  <g id="clothing">
    <!-- Vine/stem curving across top of head -->
    <path d="M55 42 Q65 30 80 29 Q100 27 120 29 Q135 30 145 42"
          class="hfc-stem"/>
    <!-- Extra vine wisp on left -->
    <path d="M58 40 Q52 36 50 42" class="hfc-stem" stroke-width="1.8"/>
    <!-- Extra vine wisp on right -->
    <path d="M142 40 Q148 36 150 42" class="hfc-stem" stroke-width="1.8"/>

    <!-- Small leaves along vine -->
    <path d="M68 34 Q64 28 60 32 Q64 34 68 34 Z" class="hfc-leaf"/>
    <path d="M95 28 Q92 22 88 26 Q92 28 95 28 Z" class="hfc-leaf"/>
    <path d="M118 28 Q121 22 125 26 Q121 28 118 28 Z" class="hfc-leaf"/>
    <path d="M135 32 Q139 26 142 30 Q138 33 135 32 Z" class="hfc-leaf"/>

    <!-- Flower 1 (pink) - left side -->
    <g transform="translate(62, 35)">
      <ellipse cx="-5" cy="0" rx="4" ry="3" class="hfc-petal-pink"/>
      <ellipse cx="5" cy="0" rx="4" ry="3" class="hfc-petal-pink"/>
      <ellipse cx="0" cy="-5" rx="3" ry="4" class="hfc-petal-pink"/>
      <ellipse cx="0" cy="5" rx="3" ry="4" class="hfc-petal-pink"/>
      <ellipse cx="-4" cy="-3" rx="3.5" ry="2.5" class="hfc-petal-pink" transform="rotate(-40 -4 -3)"/>
      <circle cx="0" cy="0" r="3" class="hfc-center"/>
    </g>

    <!-- Flower 2 (gold) - left-center -->
    <g transform="translate(80, 29)">
      <ellipse cx="-4.5" cy="0" rx="3.5" ry="2.8" class="hfc-petal-gold"/>
      <ellipse cx="4.5" cy="0" rx="3.5" ry="2.8" class="hfc-petal-gold"/>
      <ellipse cx="0" cy="-4.5" rx="2.8" ry="3.5" class="hfc-petal-gold"/>
      <ellipse cx="0" cy="4.5" rx="2.8" ry="3.5" class="hfc-petal-gold"/>
      <ellipse cx="3.5" cy="-3" rx="3" ry="2.5" class="hfc-petal-gold" transform="rotate(35 3.5 -3)"/>
      <circle cx="0" cy="0" r="2.8" class="hfc-center"/>
    </g>

    <!-- Flower 3 (blue) - center -->
    <g transform="translate(100, 27)">
      <ellipse cx="-5" cy="0" rx="4.2" ry="3" class="hfc-petal-blue"/>
      <ellipse cx="5" cy="0" rx="4.2" ry="3" class="hfc-petal-blue"/>
      <ellipse cx="0" cy="-5" rx="3" ry="4.2" class="hfc-petal-blue"/>
      <ellipse cx="0" cy="5" rx="3" ry="4.2" class="hfc-petal-blue"/>
      <ellipse cx="-4" cy="-3.5" rx="3.5" ry="2.5" class="hfc-petal-blue" transform="rotate(-40 -4 -3.5)"/>
      <circle cx="0" cy="0" r="3" class="hfc-center"/>
    </g>

    <!-- Flower 4 (red) - right-center -->
    <g transform="translate(120, 29)">
      <ellipse cx="-4" cy="0" rx="3.5" ry="2.5" class="hfc-petal-red"/>
      <ellipse cx="4" cy="0" rx="3.5" ry="2.5" class="hfc-petal-red"/>
      <ellipse cx="0" cy="-4" rx="2.5" ry="3.5" class="hfc-petal-red"/>
      <ellipse cx="0" cy="4" rx="2.5" ry="3.5" class="hfc-petal-red"/>
      <ellipse cx="3" cy="3" rx="3" ry="2.5" class="hfc-petal-red" transform="rotate(40 3 3)"/>
      <circle cx="0" cy="0" r="2.5" class="hfc-center"/>
    </g>

    <!-- Flower 5 (pink) - right side -->
    <g transform="translate(138, 35)">
      <ellipse cx="-4.5" cy="0" rx="3.8" ry="2.8" class="hfc-petal-pink"/>
      <ellipse cx="4.5" cy="0" rx="3.8" ry="2.8" class="hfc-petal-pink"/>
      <ellipse cx="0" cy="-4.5" rx="2.8" ry="3.8" class="hfc-petal-pink"/>
      <ellipse cx="0" cy="4.5" rx="2.8" ry="3.8" class="hfc-petal-pink"/>
      <ellipse cx="-3" cy="-3" rx="3.2" ry="2.5" class="hfc-petal-pink" transform="rotate(-35 -3 -3)"/>
      <circle cx="0" cy="0" r="2.8" class="hfc-center"/>
    </g>

    <!-- Flower 6 (gold, small) - far left accent -->
    <g transform="translate(53, 42)">
      <ellipse cx="-3.5" cy="0" rx="3" ry="2" class="hfc-petal-gold"/>
      <ellipse cx="3.5" cy="0" rx="3" ry="2" class="hfc-petal-gold"/>
      <ellipse cx="0" cy="-3.5" rx="2" ry="3" class="hfc-petal-gold"/>
      <ellipse cx="0" cy="3.5" rx="2" ry="3" class="hfc-petal-gold"/>
      <circle cx="0" cy="0" r="2.2" class="hfc-center"/>
    </g>
  </g>
</svg>