<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="afb-vine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#32CD32"/>
      <stop offset="100%" stop-color="#1a6b1a"/>
    </linearGradient>
    <radialGradient id="afb-petal" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF85C1"/>
      <stop offset="100%" stop-color="#FF69B4"/>
    </radialGradient>
    <radialGradient id="afb-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE135"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </radialGradient>
  </defs>
  <style>
    .afb-vine{stroke:url(#afb-vine);stroke-width:3;fill:none;stroke-linecap:round}
    .afb-petal{fill:url(#afb-petal);stroke:#FF1493;stroke-width:0.8}
    .afb-center{fill:url(#afb-center);stroke:#DAA520;stroke-width:0.6}
    .afb-leaf{fill:#228B22;stroke:#1a6b1a;stroke-width:0.5}
  </style>
  <g id="clothing">
    <!-- Main vine -->
    <path d="M38 238 Q48 235 58 238" class="afb-vine"/>
    <!-- Flower 1 (left) -->
    <circle cx="45" cy="228" r="4" class="afb-petal"/>
    <circle cx="52" cy="232" r="4" class="afb-petal"/>
    <circle cx="48" cy="240" r="4" class="afb-petal"/>
    <circle cx="42" cy="240" r="4" class="afb-petal"/>
    <circle cx="40" cy="232" r="4" class="afb-petal"/>
    <circle cx="48" cy="232" r="3.5" class="afb-center"/>
    <!-- Flower 2 (center) -->
    <circle cx="100" cy="226" r="4" class="afb-petal"/>
    <circle cx="107" cy="230" r="4" class="afb-petal"/>
    <circle cx="103" cy="238" r="4" class="afb-petal"/>
    <circle cx="97" cy="238" r="4" class="afb-petal"/>
    <circle cx="96" cy="230" r="4" class="afb-petal"/>
    <circle cx="103" cy="230" r="3.5" class="afb-center"/>
    <!-- Flower 3 (right) -->
    <circle cx="150" cy="230" r="4" class="afb-petal"/>
    <circle cx="157" cy="234" r="4" class="afb-petal"/>
    <circle cx="153" cy="242" r="4" class="afb-petal"/>
    <circle cx="147" cy="242" r="4" class="afb-petal"/>
    <circle cx="148" cy="234" r="4" class="afb-petal"/>
    <circle cx="153" cy="234" r="3.5" class="afb-center"/>
    <!-- Leaves -->
    <ellipse cx="70" cy="232" rx="3" ry="6" class="afb-leaf" transform="rotate(45 70 232)"/>
    <ellipse cx="125" cy="228" rx="3" ry="6" class="afb-leaf" transform="rotate(-30 125 228)"/>
    <!-- Vine connectors -->
    <path d="M54 236 Q65 235 75 234" stroke="url(#afb-vine)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M109 238 Q120 237 135 236" stroke="url(#afb-vine)" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>
</svg>