<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="apw-handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE135"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <radialGradient id="apw-star" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFB6D9"/>
      <stop offset="70%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </radialGradient>
    <linearGradient id="apw-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="50%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#C71585"/>
    </linearGradient>
    <filter id="apw-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>
  <style>
    .apw-handle{stroke:url(#apw-handle);stroke-width:2.5;fill:none;stroke-linecap:round}
    .apw-star{fill:url(#apw-star);stroke:#DAA520;stroke-width:1.2;stroke-linejoin:round}
    .apw-inner-star{fill:#FFDDEE;opacity:0.5;stroke:none}
    .apw-gem{fill:#FFE135;stroke:#DAA520;stroke-width:0.8}
    .apw-sparkle{fill:#FFFF99;opacity:0.9}
    .apw-ribbon{fill:url(#apw-ribbon);stroke:#C71585;stroke-width:0.5}
  </style>
  <g id="clothing">
    <!-- Handle/stick - angled outward from body -->
    <path d="M158 250 L142 155" class="apw-handle"/>
    <!-- Star on top of wand (5-pointed) - repositioned -->
    <polygon points="140,140 145,127 152,130 144,137 147,150 140,145 133,150 136,137 128,130 135,127" class="apw-star"/>
    <!-- Inner star highlight -->
    <polygon points="140,138 144,129 150,132 144,137 146,148 140,143 134,148 136,137 130,132 136,129" class="apw-inner-star"/>
    <!-- Gem in star center -->
    <circle cx="140" cy="137" r="3.5" class="apw-gem" filter="url(#apw-glow)"/>
    <circle cx="141" cy="136" r="1.5" fill="#FFFF99" opacity="0.7"/>
    <!-- Ribbon streaming from below star -->
    <path d="
      M137 150
      Q130 160 133 175
      Q138 190 133 205
    " class="apw-ribbon"/>
    <!-- Second ribbon strand -->
    <path d="
      M143 150
      Q150 160 147 175
      Q142 190 147 205
    " class="apw-ribbon" opacity="0.8"/>
    <!-- Sparkle trail radiating from star tip -->
    <circle cx="140" cy="120" r="1.5" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="125" cy="123" r="1.2" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="155" cy="125" r="1.2" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="120" cy="140" r="1" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="160" cy="142" r="1" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="127" cy="150" r="1.3" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="153" cy="151" r="1.3" class="apw-sparkle" filter="url(#apw-glow)"/>
    <!-- Additional floating sparkles -->
    <circle cx="135" cy="130" r="0.9" class="apw-sparkle" opacity="0.6"/>
    <circle cx="145" cy="128" r="0.9" class="apw-sparkle" opacity="0.6"/>
    <!-- Star twinkle effect (smaller overlays) -->
    <polygon points="140,140 142,133 145,135 141,139 142,146 140,142 138,146 139,139 135,135 138,133" fill="#FFFF99" opacity="0.4" stroke="none"/>
  </g>
</svg>