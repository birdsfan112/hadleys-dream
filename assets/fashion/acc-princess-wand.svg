<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="apw-handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE135"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <radialGradient id="apw-star" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFB6D9"/>
      <stop offset="70%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </radialGradient>
    <linearGradient id="apw-ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="50%" stop-color="#FF1493"/>
      <stop offset="100%" stop-color="#C71585"/>
    </linearGradient>
    <filter id="apw-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>
  <style>
    .apw-handle{stroke:url(#apw-handle);stroke-width:2.5;fill:none;stroke-linecap:round}
    .apw-star{fill:url(#apw-star);stroke:#DAA520;stroke-width:1.2;stroke-linejoin:round}
    .apw-inner-star{fill:#FFDDEE;opacity:0.5;stroke:none}
    .apw-gem{fill:#FFE135;stroke:#DAA520;stroke-width:0.8}
    .apw-sparkle{fill:#FFFF99;opacity:0.9}
    .apw-ribbon{fill:url(#apw-ribbon);stroke:#C71585;stroke-width:0.5}
  </style>
  <g id="clothing">
    <!-- Handle/stick -->
    <path d="M156 240 L153 170" class="apw-handle"/>
    <!-- Star on top of wand (5-pointed) -->
    <polygon points="153,155 158,142 165,145 157,152 160,165 153,160 146,165 149,152 141,145 148,142" class="apw-star"/>
    <!-- Inner star highlight -->
    <polygon points="153,153 157,144 162,146 156,151 158,162 153,158 148,162 150,151 144,146 149,144" class="apw-inner-star"/>
    <!-- Gem in star center -->
    <circle cx="153" cy="152" r="3.5" class="apw-gem" filter="url(#apw-glow)"/>
    <circle cx="154" cy="151" r="1.5" fill="#FFFF99" opacity="0.7"/>
    <!-- Ribbon streaming from below star -->
    <path d="
      M150 165
      Q145 175 148 190
      Q152 205 147 220
    " class="apw-ribbon"/>
    <!-- Second ribbon strand -->
    <path d="
      M156 165
      Q161 175 158 190
      Q154 205 159 220
    " class="apw-ribbon" opacity="0.8"/>
    <!-- Sparkle trail radiating from star tip -->
    <circle cx="153" cy="135" r="1.5" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="140" cy="138" r="1.2" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="166" cy="140" r="1.2" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="135" cy="155" r="1" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="171" cy="157" r="1" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="142" cy="165" r="1.3" class="apw-sparkle" filter="url(#apw-glow)"/>
    <circle cx="164" cy="166" r="1.3" class="apw-sparkle" filter="url(#apw-glow)"/>
    <!-- Additional floating sparkles -->
    <circle cx="148" cy="145" r="0.9" class="apw-sparkle" opacity="0.6"/>
    <circle cx="158" cy="143" r="0.9" class="apw-sparkle" opacity="0.6"/>
    <!-- Star twinkle effect (smaller overlays) -->
    <polygon points="153,155 155,148 158,150 154,154 155,161 153,157 151,161 152,154 148,150 151,148" fill="#FFFF99" opacity="0.4" stroke="none"/>
  </g>
</svg>