<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="hsb-main" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="20%" stop-color="#A0522D"/>
      <stop offset="50%" stop-color="#CD853F"/>
      <stop offset="80%" stop-color="#A0522D"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <linearGradient id="hsb-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CD853F"/>
      <stop offset="100%" stop-color="#A0522D"/>
    </linearGradient>
  </defs>
  <style>
    .hsb-hair{fill:#A0522D;stroke:#8B4513;stroke-width:1.2}
    .hsb-hi{fill:#CD853F;opacity:0.6}
    .hsb-shade{fill:#8B4513;opacity:0.3}
  </style>

  <!-- Back layer: short back hair -->
  <g id="back-layer">
    <!-- Left side back hair -->
    <path d="M58 60 Q52 65 50 85 Q49 105 52 115 Q56 110 58 95 Q59 75 60 65 Z" class="hsb-hair"/>

    <!-- Center back hair fill -->
    <path d="M62 45 Q100 38 138 45 Q142 60 140 90 Q135 75 100 70 Q65 75 60 90 Q58 60 62 45 Z"
          fill="#A0522D" stroke="#8B4513" stroke-width="1"/>

    <!-- Right side back hair -->
    <path d="M142 60 Q148 65 150 85 Q151 105 148 115 Q144 110 142 95 Q141 75 140 65 Z" class="hsb-hair"/>

    <!-- Back hair strand texture -->
    <path d="M70 80 Q72 95 74 110" stroke="#CD853F" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
    <path d="M130 80 Q128 95 126 110" stroke="#CD853F" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  </g>

  <!-- Front layer: crown, solid bangs, side pieces -->
  <g id="clothing">
    <!-- Crown/top volume -->
    <path d="M56 75 Q54 42 68 28 Q82 16 100 14 Q118 16 132 28
             Q146 42 144 75 Q142 50 130 38 Q115 28 100 26
             Q85 28 70 38 Q58 50 56 75 Z"
          class="hsb-hair"/>

    <!-- SOLID FOREHEAD FILL — covers the entire forehead so no bald spot -->
    <path d="M58 68 Q58 50 70 40 Q85 30 100 28 Q115 30 130 40
             Q142 50 142 68 L142 78 Q130 72 100 70 Q70 72 58 78 Z"
          fill="#A0522D" stroke="none"/>

    <!-- Thick bangs — overlapping pieces covering forehead fully -->
    <path d="M58 62 Q66 48 80 50 Q74 58 68 68 Q62 76 58 78 Z" class="hsb-hair"/>
    <path d="M72 50 Q86 40 100 44 Q92 52 84 60 Q78 66 72 68 Z" class="hsb-hair"/>
    <path d="M92 43 Q106 38 118 44 Q112 52 104 58 Q98 64 92 64 Z" class="hsb-hair"/>
    <path d="M112 44 Q126 42 138 54 Q132 62 126 68 Q120 70 116 66 Z" class="hsb-hair"/>
    <!-- Extra bang fill to close any remaining gaps -->
    <path d="M62 60 Q80 52 100 48 Q120 52 138 60 Q138 70 130 72
             Q115 68 100 66 Q85 68 70 72 Q62 70 62 60 Z"
          fill="#A0522D" stroke="none"/>

    <!-- Left face-framing piece -->
    <path d="M56 75 Q53 65 54 50 Q54 70 52 90 Q51 108 56 118
             Q61 112 62 98 Q62 82 59 68 Z"
          class="hsb-hair"/>

    <!-- Right face-framing piece -->
    <path d="M144 75 Q147 65 146 50 Q146 70 148 90 Q149 108 144 118
             Q139 112 138 98 Q138 82 141 68 Z"
          class="hsb-hair"/>

    <!-- Chin-length flip on left -->
    <path d="M55 100 Q50 112 52 128 Q58 122 62 108 Z" class="hsb-hair"/>

    <!-- Chin-length flip on right -->
    <path d="M145 100 Q150 112 148 128 Q142 122 138 108 Z" class="hsb-hair"/>

    <!-- Top shine highlight -->
    <ellipse cx="92" cy="25" rx="16" ry="6" class="hsb-hi" transform="rotate(-12 92 25)"/>
    <ellipse cx="118" cy="24" rx="10" ry="4" class="hsb-hi" transform="rotate(8 118 24)"/>

    <!-- Side shine highlights -->
    <ellipse cx="60" cy="90" rx="4" ry="8" class="hsb-hi" transform="rotate(-10 60 90)"/>
    <ellipse cx="140" cy="90" rx="4" ry="8" class="hsb-hi" transform="rotate(10 140 90)"/>
  </g>
</svg>
