<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <style>
    .cg-main{fill:#FF6347;stroke:#CC4F39;stroke-width:2;stroke-linejoin:round}
    .cg-cloud{fill:#FFF8DC;stroke:#DDD;stroke-width:1;opacity:0.8}
    .cg-rainbow{stroke-width:2;fill:none;opacity:0.6}
    .cg-gold{fill:#FFD700;stroke:none}
  </style>
  <defs>
    <linearGradient id="cg-grad" x1="0" y1="198" x2="0" y2="290">
      <stop offset="0%" stop-color="#FF6347"/>
      <stop offset="100%" stop-color="#FFA07A"/>
    </linearGradient>
  </defs>
  <g id="clothing">
    <!-- Cloud-puff bodice -->
    <path d="M72 134 L128 134 L130 198 L70 198 Z" class="cg-main"/>
    <!-- Cloud puff accents at neckline -->
    <ellipse cx="82" cy="136" rx="10" ry="6" class="cg-cloud"/>
    <ellipse cx="100" cy="132" rx="12" ry="7" class="cg-cloud"/>
    <ellipse cx="118" cy="136" rx="10" ry="6" class="cg-cloud"/>
    <!-- Gentle eyes -->
    <circle cx="88" cy="162" r="4" fill="#FFF" stroke="#CC4F39" stroke-width="1"/>
    <circle cx="112" cy="162" r="4" fill="#FFF" stroke="#CC4F39" stroke-width="1"/>
    <circle cx="88" cy="162" r="2" fill="#333"/>
    <circle cx="112" cy="162" r="2" fill="#333"/>
    <path d="M94 174 Q100 180 106 174" stroke="#CC4F39" stroke-width="1.5" fill="none"/>
    <!-- Rainbow swirl on bodice -->
    <path d="M84 180 Q92 176 100 182 Q108 188 116 184" stroke="#FF6B6B" class="cg-rainbow"/>
    <path d="M86 185 Q94 181 100 187 Q108 193 114 189" stroke="#FFD700" class="cg-rainbow"/>
    <!-- Flowing cloud skirt -->
    <path d="M70 198 Q56 225 52 265 Q56 285 72 292 L100 294 L128 292 Q144 285 148 265 Q144 225 130 198 Z" fill="url(#cg-grad)" stroke="#CC4F39" stroke-width="2"/>
    <!-- Cloud puff hem -->
    <ellipse cx="64" cy="288" rx="14" ry="8" class="cg-cloud"/>
    <ellipse cx="82" cy="292" rx="12" ry="7" class="cg-cloud"/>
    <ellipse cx="100" cy="294" rx="14" ry="8" class="cg-cloud"/>
    <ellipse cx="118" cy="292" rx="12" ry="7" class="cg-cloud"/>
    <ellipse cx="136" cy="288" rx="14" ry="8" class="cg-cloud"/>
    <!-- Rainbow breeze streaks -->
    <path d="M68 230 Q82 225 96 230" stroke="#FF6B6B" class="cg-rainbow"/>
    <path d="M104 235 Q118 230 132 235" stroke="#FFB347" class="cg-rainbow"/>
    <path d="M72 255 Q86 250 100 255" stroke="#6BCB77" class="cg-rainbow"/>
    <path d="M100 260 Q114 255 128 260" stroke="#6B9FFF" class="cg-rainbow"/>
    <!-- Gold sparkles -->
    <circle cx="80" cy="215" r="1.5" class="cg-gold"/>
    <circle cx="120" cy="250" r="1.8" class="cg-gold"/>
    <circle cx="95" cy="270" r="1.2" class="cg-gold"/>
  </g>
</svg>
