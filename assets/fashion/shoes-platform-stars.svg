<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="ps-platform-sole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D5E8"/>
      <stop offset="100%" stop-color="#E0A8D0"/>
    </linearGradient>
    <linearGradient id="ps-shoe-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#DB5B9D"/>
    </linearGradient>
  </defs>
  <style>
    .ps-sole{fill:url(#ps-platform-sole);stroke:#DB5B9D;stroke-width:1.5;stroke-linejoin:round}
    .ps-body{fill:url(#ps-shoe-body);stroke:#C74A8C;stroke-width:1.8;stroke-linejoin:round}
    .ps-shade{fill:#DB5B9D;stroke:none;opacity:0.6}
    .ps-strap{fill:none;stroke:#DB5B9D;stroke-width:2;stroke-linecap:round}
    .ps-detail{fill:none;stroke:#FFB6D9;stroke-width:1;stroke-linecap:round}
  </style>
  <g id="clothing">
    <!-- Left platform sole (thick platform) -->
    <ellipse cx="84" cy="312" rx="22" ry="8" class="ps-sole"/>
    <!-- Left shoe body (chunky platform) -->
    <path d="M64 302 Q64 285 74 283 L94 283 Q104 285 104 302 Q104 312 84 316 Q64 312 64 302 Z" class="ps-body"/>
    <!-- Left shoe shading -->
    <path d="M70 302 Q70 290 78 287 L86 287 Q76 293 74 302 Q74 310 82 313 L70 310 Q68 307 70 302 Z" class="ps-shade"/>
    <!-- Left ankle strap -->
    <path d="M68 295 Q84 292 100 295" class="ps-strap"/>
    <!-- Left star on side -->
    <g transform="translate(62, 298)">
      <polygon points="0,-3.5 1,-1 3.5,-1 1.5,1 2.5,3.5 0,1.5 -2.5,3.5 -1.5,1 -3.5,-1 -1,-1" fill="#FFD700" stroke="#FFC700" stroke-width="0.5"/>
    </g>
    <!-- Left toe decorative line -->
    <path d="M66 306 Q76 298 84 297 Q92 298 102 306" class="ps-detail"/>
    <!-- Left sparkle accents -->
    <circle cx="75" cy="292" r="1.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="93" cy="291" r="1" fill="#FFB6D9" opacity="0.6"/>

    <!-- Right platform sole -->
    <ellipse cx="116" cy="312" rx="22" ry="8" class="ps-sole"/>
    <!-- Right shoe body -->
    <path d="M96 302 Q96 285 106 283 L126 283 Q136 285 136 302 Q136 312 116 316 Q96 312 96 302 Z" class="ps-body"/>
    <!-- Right shoe shading -->
    <path d="M130 302 Q130 290 122 287 L114 287 Q124 293 126 302 Q126 310 118 313 L130 310 Q132 307 130 302 Z" class="ps-shade"/>
    <!-- Right ankle strap -->
    <path d="M100 295 Q116 292 132 295" class="ps-strap"/>
    <!-- Right star on side -->
    <g transform="translate(138, 298)">
      <polygon points="0,-3.5 1,-1 3.5,-1 1.5,1 2.5,3.5 0,1.5 -2.5,3.5 -1.5,1 -3.5,-1 -1,-1" fill="#FFD700" stroke="#FFC700" stroke-width="0.5"/>
    </g>
    <!-- Right toe decorative line -->
    <path d="M98 306 Q108 298 116 297 Q124 298 134 306" class="ps-detail"/>
    <!-- Right sparkle accents -->
    <circle cx="125" cy="292" r="1.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="107" cy="291" r="1" fill="#FFB6D9" opacity="0.6"/>
  </g>
</svg>
