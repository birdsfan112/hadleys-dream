<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <style>
    .ov-main{fill:#5B8AD0;stroke:#3A5FA0;stroke-width:1.8;stroke-linejoin:round}
    .ov-shade{fill:#4169E1;stroke:none;opacity:0.35}
    .ov-strap{fill:#5B8AD0;stroke:#3A5FA0;stroke-width:2.5;stroke-linecap:round}
    .ov-buckle{fill:#DAA520;stroke:#8B7500;stroke-width:1}
    .ov-stitch{stroke:#7BA8E8;fill:none;stroke-width:0.8;stroke-linecap:round;stroke-dasharray:2 1.5}
  </style>
  <defs>
    <linearGradient id="ov-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B9FE5"/>
      <stop offset="100%" stop-color="#5B8AD0"/>
    </linearGradient>
  </defs>
  <g id="clothing">
    <!-- Left strap — from bib over left shoulder -->
    <path d="M78 140 Q74 132 72 124 Q70 118 72 116"
          fill="none" stroke="#5B8AD0" stroke-width="8" stroke-linecap="round"/>
    <path d="M78 140 Q74 132 72 124 Q70 118 72 116"
          fill="none" stroke="#3A5FA0" stroke-width="8" stroke-linecap="round" opacity="0.15"/>

    <!-- Right strap — from bib over right shoulder -->
    <path d="M122 140 Q126 132 128 124 Q130 118 128 116"
          fill="none" stroke="#5B8AD0" stroke-width="8" stroke-linecap="round"/>
    <path d="M122 140 Q126 132 128 124 Q130 118 128 116"
          fill="none" stroke="#3A5FA0" stroke-width="8" stroke-linecap="round" opacity="0.15"/>

    <!-- Left buckle -->
    <rect x="68" y="114" width="8" height="6" rx="1" class="ov-buckle"/>
    <rect x="70" y="116" width="4" height="2" rx="0.5" fill="#8B7500"/>

    <!-- Right buckle -->
    <rect x="124" y="114" width="8" height="6" rx="1" class="ov-buckle"/>
    <rect x="126" y="116" width="4" height="2" rx="0.5" fill="#8B7500"/>

    <!-- Bib front — wide enough to cover torso (x=72 to x=128) -->
    <path d="M72 140 Q70 138 72 134 L128 134 Q130 138 128 140
             L130 200 Q120 204 100 206 Q80 204 70 200 Z"
          fill="url(#ov-grad)" stroke="#3A5FA0" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Bib side shading -->
    <path d="M72 140 L78 140 L78 200 Q76 202 72 200 Z" class="ov-shade"/>
    <path d="M128 140 L122 140 L122 200 Q124 202 128 200 Z" class="ov-shade"/>

    <!-- Front pocket -->
    <path d="M86 160 L114 160 L114 190 Q100 194 86 190 Z"
          fill="#6B9FE5" stroke="#3A5FA0" stroke-width="1.2" stroke-linejoin="round"/>
    <!-- Pocket stitching -->
    <path d="M88 162 L112 162" class="ov-stitch"/>
    <path d="M87 170 L113 170" class="ov-stitch"/>
    <path d="M87 180 L113 180" class="ov-stitch"/>
    <path d="M100 160 L100 192" class="ov-stitch"/>

    <!-- Left pant leg — full width to cover avatar leg -->
    <path d="M70 200 Q66 210 64 230 Q62 255 64 280
             Q66 290 78 296 L96 296 Q100 292 100 280
             L100 210 Q96 204 90 202 Z"
          class="ov-main"/>
    <!-- Left leg inner seam -->
    <path d="M96 215 L96 290" stroke="#3A5FA0" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Left leg shading -->
    <path d="M70 205 Q66 220 64 250 Q64 275 68 290
             Q72 280 72 250 Q72 225 74 208 Z" class="ov-shade"/>
    <!-- Left knee fade -->
    <ellipse cx="82" cy="260" rx="10" ry="6" fill="#6B9FE5" opacity="0.3"/>

    <!-- Right pant leg — full width to cover avatar leg -->
    <path d="M100 210 L100 280 Q100 292 104 296 L122 296
             Q134 290 136 280 Q138 255 136 230 Q134 210 130 200
             Q120 204 110 202 Z"
          class="ov-main"/>
    <!-- Right leg inner seam -->
    <path d="M104 215 L104 290" stroke="#3A5FA0" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Right leg shading -->
    <path d="M130 205 Q134 220 136 250 Q136 275 132 290
             Q128 280 128 250 Q128 225 126 208 Z" class="ov-shade"/>
    <!-- Right knee fade -->
    <ellipse cx="118" cy="260" rx="10" ry="6" fill="#6B9FE5" opacity="0.3"/>

    <!-- Center crotch seam -->
    <path d="M100 206 L100 220" stroke="#3A5FA0" stroke-width="1.2" fill="none"/>

    <!-- Side buttons -->
    <circle cx="68" cy="220" r="1.8" class="ov-buckle"/>
    <circle cx="68" cy="240" r="1.8" class="ov-buckle"/>
    <circle cx="132" cy="220" r="1.8" class="ov-buckle"/>
    <circle cx="132" cy="240" r="1.8" class="ov-buckle"/>

    <!-- Leg hems -->
    <path d="M64 290 Q78 298 100 296" fill="none" stroke="#3A5FA0" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M136 290 Q122 298 100 296" fill="none" stroke="#3A5FA0" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
