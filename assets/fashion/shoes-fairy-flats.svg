<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="ff-sole" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B5E8B5"/>
      <stop offset="100%" stop-color="#9FD89F"/>
    </linearGradient>
    <linearGradient id="ff-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#98FB98"/>
      <stop offset="100%" stop-color="#7CCD7C"/>
    </linearGradient>
    <linearGradient id="ff-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0F0D0"/>
    </linearGradient>
  </defs>
  <style>
    .ff-sole{fill:url(#ff-sole);stroke:#7CCD7C;stroke-width:1.3;stroke-linejoin:round}
    .ff-body{fill:url(#ff-body);stroke:#6BAF6B;stroke-width:1.6;stroke-linejoin:round}
    .ff-shade{fill:#7CCD7C;stroke:none;opacity:0.5}
    .ff-bow{fill:#FFE4E1;stroke:#FFB6D9;stroke-width:1}
    .ff-ribbon{fill:none;stroke:#FFB6D9;stroke-width:1.5;stroke-linecap:round}
    .ff-wing{fill:#D0F0FF;stroke:#A8D8FF;stroke-width:0.8}
    .ff-shimmer{fill:none;stroke:#FFFFFF;stroke-width:0.8;stroke-linecap:round;opacity:0.7}
  </style>
  <g id="clothing">
    <!-- Left ballet flat sole (thin, delicate) -->
    <ellipse cx="84" cy="312" rx="18" ry="4.5" class="ff-sole"/>
    <!-- Left ballet flat body (pointed toe, low profile) -->
    <path d="M70 305 Q70 298 76 296 L92 296 Q98 298 98 305 Q98 310 84 312 Q70 310 70 305 Z" class="ff-body"/>
    <!-- Left flat shading -->
    <path d="M74 305 Q74 300 80 298 L88 298 Q82 301 81 305 Q81 309 87 310 L74 309 Q73 308 74 305 Z" class="ff-shade"/>
    <!-- Left pointed toe (extra thin tip) -->
    <path d="M70 305 Q68 302 66 300" fill="none" stroke="#7CCD7C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Left bow on top -->
    <g transform="translate(84, 295)">
      <ellipse cx="-5" cy="0" rx="3.5" ry="4" class="ff-bow"/>
      <ellipse cx="5" cy="0" rx="3.5" ry="4" class="ff-bow"/>
      <ellipse cx="0" cy="0" rx="2" ry="2.5" fill="#FFB6D9"/>
    </g>
    <!-- Left ribbon trailing from bow -->
    <path d="M81 295 Q79 293 77 295" class="ff-ribbon"/>
    <path d="M87 295 Q89 293 91 295" class="ff-ribbon"/>
    <!-- Left wing decoration -->
    <g transform="translate(68, 300)">
      <ellipse cx="0" cy="0" rx="3" ry="4.5" class="ff-wing"/>
      <path d="M-1.5 -2 Q0 -4 1.5 -2" fill="none" stroke="#A8D8FF" stroke-width="0.8" stroke-linecap="round"/>
    </g>
    <g transform="translate(100, 300)">
      <ellipse cx="0" cy="0" rx="3" ry="4.5" class="ff-wing"/>
      <path d="M-1.5 -2 Q0 -4 1.5 -2" fill="none" stroke="#A8D8FF" stroke-width="0.8" stroke-linecap="round"/>
    </g>
    <!-- Left shimmer highlights -->
    <path d="M72 297 Q76 295 80 297" class="ff-shimmer"/>
    <path d="M88 297 Q92 295 96 297" class="ff-shimmer"/>

    <!-- Right ballet flat sole -->
    <ellipse cx="116" cy="312" rx="18" ry="4.5" class="ff-sole"/>
    <!-- Right ballet flat body -->
    <path d="M102 305 Q102 298 108 296 L124 296 Q130 298 130 305 Q130 310 116 312 Q102 310 102 305 Z" class="ff-body"/>
    <!-- Right flat shading -->
    <path d="M126 305 Q126 300 120 298 L112 298 Q118 301 119 305 Q119 309 113 310 L126 309 Q127 308 126 305 Z" class="ff-shade"/>
    <!-- Right pointed toe -->
    <path d="M130 305 Q132 302 134 300" fill="none" stroke="#7CCD7C" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <!-- Right bow on top -->
    <g transform="translate(116, 295)">
      <ellipse cx="-5" cy="0" rx="3.5" ry="4" class="ff-bow"/>
      <ellipse cx="5" cy="0" rx="3.5" ry="4" class="ff-bow"/>
      <ellipse cx="0" cy="0" rx="2" ry="2.5" fill="#FFB6D9"/>
    </g>
    <!-- Right ribbon trailing from bow -->
    <path d="M113 295 Q111 293 109 295" class="ff-ribbon"/>
    <path d="M119 295 Q121 293 123 295" class="ff-ribbon"/>
    <!-- Right wing decoration -->
    <g transform="translate(100, 300)">
      <ellipse cx="0" cy="0" rx="3" ry="4.5" class="ff-wing"/>
      <path d="M-1.5 -2 Q0 -4 1.5 -2" fill="none" stroke="#A8D8FF" stroke-width="0.8" stroke-linecap="round"/>
    </g>
    <g transform="translate(132, 300)">
      <ellipse cx="0" cy="0" rx="3" ry="4.5" class="ff-wing"/>
      <path d="M-1.5 -2 Q0 -4 1.5 -2" fill="none" stroke="#A8D8FF" stroke-width="0.8" stroke-linecap="round"/>
    </g>
    <!-- Right shimmer highlights -->
    <path d="M104 297 Q108 295 112 297" class="ff-shimmer"/>
    <path d="M120 297 Q124 295 128 297" class="ff-shimmer"/>
  </g>
</svg>
