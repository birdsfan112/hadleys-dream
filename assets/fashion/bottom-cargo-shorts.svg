<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <linearGradient id="cargo-khaki" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#808000"/>
      <stop offset="100%" stop-color="#6B6B00"/>
    </linearGradient>
    <linearGradient id="cargo-shade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B6B00"/>
      <stop offset="50%" stop-color="#8B8B00"/>
      <stop offset="100%" stop-color="#6B6B00"/>
    </linearGradient>
    <linearGradient id="cargo-pocket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#696900"/>
      <stop offset="100%" stop-color="#555500"/>
    </linearGradient>
  </defs>
  <g id="clothing">
    <!-- Waistband -->
    <rect x="68" y="222" width="64" height="11" rx="4" fill="#555500" stroke="#3D3D00" stroke-width="1.5"/>
    <!-- Belt detail -->
    <rect x="68" y="232" width="64" height="4" fill="#696900" opacity="0.6"/>
    <!-- Belt loop on left -->
    <rect x="75" y="232" width="4" height="8" fill="#555500" stroke="#3D3D00" stroke-width="0.7" rx="1"/>
    <!-- Belt loop on right -->
    <rect x="121" y="232" width="4" height="8" fill="#555500" stroke="#3D3D00" stroke-width="0.7" rx="1"/>

    <!-- Left short leg -->
    <path d="M70 236 L68 260 Q68 265 75 265 L98 265 Q100 265 100 260 L100 236 Z"
          fill="url(#cargo-khaki)" stroke="#3D3D00" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- Left leg shading -->
    <path d="M94 242 L94 262" stroke="#555500" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Left hem fold -->
    <path d="M70 260 Q75 263 85 261 Q95 262 100 260" stroke="#3D3D00" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Left cargo pocket main -->
    <rect x="65" y="242" width="14" height="16" rx="2" fill="url(#cargo-pocket)" stroke="#3D3D00" stroke-width="1"/>
    <!-- Left pocket flap -->
    <rect x="66" y="241" width="12" height="6" rx="1.5" fill="#696900" stroke="#3D3D00" stroke-width="0.8"/>
    <!-- Left pocket flap button -->
    <circle cx="72" cy="246" r="1.5" fill="#8B7500" stroke="#555500" stroke-width="0.5"/>
    <!-- Left pocket stitching -->
    <path d="M66 246 L78 246" stroke="#8B7500" stroke-width="0.6" fill="none" stroke-dasharray="1.5 1"/>
    <!-- Left pocket detail line -->
    <path d="M67 250 L77 250" stroke="#555500" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Right short leg -->
    <path d="M100 236 L100 260 Q100 265 102 265 L132 265 Q130 265 130 260 L130 236 Z"
          fill="url(#cargo-khaki)" stroke="#3D3D00" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- Right leg shading -->
    <path d="M106 242 L106 262" stroke="#555500" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- Right hem fold -->
    <path d="M100 260 Q105 262 115 261 Q125 263 130 260" stroke="#3D3D00" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Right cargo pocket main -->
    <rect x="121" y="242" width="14" height="16" rx="2" fill="url(#cargo-pocket)" stroke="#3D3D00" stroke-width="1"/>
    <!-- Right pocket flap -->
    <rect x="122" y="241" width="12" height="6" rx="1.5" fill="#696900" stroke="#3D3D00" stroke-width="0.8"/>
    <!-- Right pocket flap button -->
    <circle cx="128" cy="246" r="1.5" fill="#8B7500" stroke="#555500" stroke-width="0.5"/>
    <!-- Right pocket stitching -->
    <path d="M122 246 L134 246" stroke="#8B7500" stroke-width="0.6" fill="none" stroke-dasharray="1.5 1"/>
    <!-- Right pocket detail line -->
    <path d="M123 250 L133 250" stroke="#555500" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Center seam -->
    <path d="M100 236 L100 250" stroke="#3D3D00" stroke-width="1" fill="none"/>
    <!-- Crotch stitching -->
    <path d="M98 237 L98 245" stroke="#8B7500" stroke-width="0.6" fill="none" opacity="0.3" stroke-dasharray="1.5 1"/>
  </g>
</svg>
