<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <defs>
    <radialGradient id="hb-body" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#E8B8E8"/>
      <stop offset="100%" stop-color="#DDA0DD"/>
    </radialGradient>
    <radialGradient id="hb-pom" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#F0D4F0"/>
      <stop offset="100%" stop-color="#E8C0E8"/>
    </radialGradient>
  </defs>
  <style>
    .hb-main{fill:url(#hb-body);stroke:#B077B0;stroke-width:1.8;stroke-linejoin:round}
    .hb-knit{stroke:#C88CC8;stroke-width:1.2;fill:none;stroke-linecap:round}
    .hb-band{fill:#C88CC8;stroke:#B077B0;stroke-width:1.5}
    .hb-shade{fill:#C88CC8;opacity:0.3;stroke:none}
  </style>
  <g id="clothing">
    <!-- Main beanie shape - slightly slouchy -->
    <path d="M56 55 Q55 44 60 35 Q68 22 82 17 Q92 14 100 13
             Q108 14 118 17 Q132 22 140 35 Q145 44 144 55
             Q146 48 148 38 Q146 22 138 14 Q128 5 112 2
             Q105 1 100 1 Q95 1 88 2 Q72 5 62 14
             Q54 22 52 38 Q50 48 52 55
             Z"
          class="hb-main"/>
    <!-- Slouchy top part bulging slightly -->
    <path d="M62 14 Q70 8 82 4 Q92 1 100 1 Q108 1 118 4
             Q130 8 138 14 Q135 10 126 5
             Q114 -2 100 -3 Q86 -2 74 5 Q65 10 62 14 Z"
          class="hb-main"/>

    <!-- Main beanie body covering head top -->
    <path d="M52 55 Q52 38 62 26 Q72 16 86 12 Q100 10 114 12
             Q128 16 138 26 Q148 38 148 55
             L146 56 Q142 50 140 48
             Q132 42 120 40 Q110 39 100 39
             Q90 39 80 40 Q68 42 60 48
             Q58 50 54 56 Z"
          class="hb-main"/>

    <!-- Ribbed band at bottom -->
    <path d="M54 48 Q54 42 58 40 Q68 36 80 35 Q90 34 100 34
             Q110 34 120 35 Q132 36 142 40 Q146 42 146 48
             Q146 56 142 58 Q132 62 120 63 Q110 64 100 64
             Q90 64 80 63 Q68 62 58 58 Q54 56 54 48 Z"
          class="hb-band"/>
    <!-- Band ribbing lines -->
    <path d="M62 42 Q62 50 62 56" class="hb-knit" stroke-width="0.8"/>
    <path d="M70 39 Q70 48 70 57" class="hb-knit" stroke-width="0.8"/>
    <path d="M78 37 Q78 47 78 57" class="hb-knit" stroke-width="0.8"/>
    <path d="M86 36 Q86 46 86 56" class="hb-knit" stroke-width="0.8"/>
    <path d="M94 35 Q94 46 94 56" class="hb-knit" stroke-width="0.8"/>
    <path d="M102 35 Q102 46 102 56" class="hb-knit" stroke-width="0.8"/>
    <path d="M110 35 Q110 46 110 56" class="hb-knit" stroke-width="0.8"/>
    <path d="M118 36 Q118 46 118 56" class="hb-knit" stroke-width="0.8"/>
    <path d="M126 37 Q126 47 126 57" class="hb-knit" stroke-width="0.8"/>
    <path d="M134 39 Q134 48 134 57" class="hb-knit" stroke-width="0.8"/>

    <!-- Horizontal knit texture lines on main body -->
    <path d="M60 30 Q80 27 100 26 Q120 27 140 30" class="hb-knit"/>
    <path d="M56 38 Q78 34 100 33 Q122 34 144 38" class="hb-knit"/>
    <path d="M65 22 Q82 18 100 17 Q118 18 135 22" class="hb-knit"/>
    <path d="M72 14 Q86 10 100 9 Q114 10 128 14" class="hb-knit"/>

    <!-- Side shading -->
    <path d="M54 48 Q55 40 60 34 Q66 38 60 48 Q56 56 58 58
             Q55 55 54 48 Z" class="hb-shade"/>

    <!-- Pompom on top -->
    <circle cx="100" cy="0" r="10" fill="url(#hb-pom)" stroke="#B077B0" stroke-width="1.5"/>
    <!-- Pompom fluffy texture -->
    <circle cx="95" cy="-3" r="4.5" fill="#E8C0E8" stroke="#C88CC8" stroke-width="0.6"/>
    <circle cx="105" cy="-3" r="4.5" fill="#E8C0E8" stroke="#C88CC8" stroke-width="0.6"/>
    <circle cx="100" cy="-6" r="4" fill="#F0D4F0" stroke="#C88CC8" stroke-width="0.6"/>
    <circle cx="97" cy="2" r="3.5" fill="#E8C0E8" stroke="#C88CC8" stroke-width="0.6"/>
    <circle cx="103" cy="2" r="3.5" fill="#E8C0E8" stroke="#C88CC8" stroke-width="0.6"/>
    <circle cx="100" cy="0" r="3" fill="#F0D4F0" stroke="#C88CC8" stroke-width="0.5"/>

    <!-- Highlight sheen on beanie -->
    <ellipse cx="88" cy="22" rx="12" ry="4" fill="#F0D4F0" opacity="0.4" transform="rotate(-8 88 22)"/>
  </g>
</svg>