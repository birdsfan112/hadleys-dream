<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 340">
  <style>
    .pd-main{fill:#FF69B4;stroke:#FF3390;stroke-width:2;stroke-linejoin:round}
    .pd-shade{fill:#FF4DA0;stroke:none}
    .pd-sleeve{fill:#FF69B4;stroke:#FF3390;stroke-width:1.8}
    .pd-bow{fill:#FF4DA0;stroke:#FF3390;stroke-width:1.2}
    .pd-bow-knot{fill:#FF3390;stroke:none}
    .pd-sparkle{fill:#FFF;stroke:none;opacity:0.7}
  </style>
  <g id="clothing">
    <!-- Puffy sleeves -->
    <ellipse cx="56" cy="146" rx="18" ry="14" class="pd-sleeve"/>
    <ellipse cx="144" cy="146" rx="18" ry="14" class="pd-sleeve"/>
    <!-- Sleeve shading -->
    <ellipse cx="53" cy="150" rx="10" ry="8" class="pd-shade" opacity="0.4"/>
    <ellipse cx="147" cy="150" rx="10" ry="8" class="pd-shade" opacity="0.4"/>
    <!-- Sleeve puff lines -->
    <path d="M46 140 Q52 144 46 152" stroke="#FF3390" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M154 140 Q148 144 154 152" stroke="#FF3390" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- Bodice -->
    <path d="M70 134 L130 134 Q136 135 136 140 L136 198 L64 198 Q64 140 68 134 Z" class="pd-main"/>
    <!-- Bodice neckline curve -->
    <path d="M70 134 Q100 142 130 134" stroke="#FF3390" stroke-width="2" fill="none"/>
    <!-- Bodice shading -->
    <path d="M64 172 L76 172 L76 198 L64 198 Z" class="pd-shade" opacity="0.3"/>
    <path d="M124 172 L136 172 L136 198 L124 198 Z" class="pd-shade" opacity="0.3"/>

    <!-- Bow at center bodice -->
    <path d="M100 162 Q90 156 88 160 Q90 164 100 162" class="pd-bow"/>
    <path d="M100 162 Q110 156 112 160 Q110 164 100 162" class="pd-bow"/>
    <circle cx="100" cy="162" r="2.5" class="pd-bow-knot"/>
    <!-- Bow tails -->
    <path d="M100 164 Q97 172 95 176" stroke="#FF3390" stroke-width="1.2" fill="none"/>
    <path d="M100 164 Q103 172 105 176" stroke="#FF3390" stroke-width="1.2" fill="none"/>

    <!-- Waistline -->
    <line x1="64" y1="198" x2="136" y2="198" stroke="#FF3390" stroke-width="2.5"/>

    <!-- Full skirt -->
    <path d="M64 198 Q54 208 44 270 Q50 285 100 288 Q150 285 156 270 Q146 208 136 198 Z" class="pd-main"/>
    <!-- Skirt volume folds -->
    <path d="M80 201 Q74 240 64 278" stroke="#FF3390" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M120 201 Q126 240 136 278" stroke="#FF3390" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M92 199 Q88 245 86 282" stroke="#FF3390" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M108 199 Q112 245 114 282" stroke="#FF3390" stroke-width="0.8" fill="none" opacity="0.3"/>

    <!-- Skirt shading -->
    <path d="M64 198 Q54 208 44 270 Q48 278 58 282 Q66 220 76 200 Z" class="pd-shade" opacity="0.35"/>
    <path d="M136 198 Q146 208 156 270 Q152 278 142 282 Q134 220 124 200 Z" class="pd-shade" opacity="0.35"/>

    <!-- Sparkle dots scattered on skirt -->
    <circle cx="72" cy="225" r="1.5" class="pd-sparkle"/>
    <circle cx="90" cy="245" r="1.2" class="pd-sparkle"/>
    <circle cx="115" cy="230" r="1.8" class="pd-sparkle"/>
    <circle cx="128" cy="255" r="1.3" class="pd-sparkle"/>
    <circle cx="80" cy="260" r="1.6" class="pd-sparkle"/>
    <circle cx="105" cy="268" r="1.4" class="pd-sparkle"/>
    <circle cx="60" cy="250" r="1.1" class="pd-sparkle"/>
    <circle cx="138" cy="240" r="1.2" class="pd-sparkle"/>
    <circle cx="95" cy="215" r="1.0" class="pd-sparkle"/>
    <circle cx="120" cy="275" r="1.5" class="pd-sparkle"/>

    <!-- Hem accent -->
    <path d="M44 270 Q50 285 100 288 Q150 285 156 270" stroke="#FF3390" stroke-width="2" fill="none"/>
  </g>
</svg>