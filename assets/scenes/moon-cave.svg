<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="mc-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d2a"/>
      <stop offset="45%" stop-color="#1a1a3e"/>
      <stop offset="80%" stop-color="#2d2d6b"/>
      <stop offset="100%" stop-color="#4a4a8a"/>
    </linearGradient>
    <radialGradient id="mc-moon" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFFACD"/>
      <stop offset="70%" stop-color="#F0F8FF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFF8DC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mc-cave-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e48"/>
      <stop offset="100%" stop-color="#0d0d2a"/>
    </linearGradient>
    <radialGradient id="mc-pool" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#5a7aaa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a4e" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="mc-crystal-glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B0C4DE"/>
      <stop offset="50%" stop-color="#6495ED"/>
      <stop offset="100%" stop-color="#4169E1"/>
    </linearGradient>
    <linearGradient id="mc-crystal-glow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9370DB"/>
      <stop offset="50%" stop-color="#8A5BB8"/>
      <stop offset="100%" stop-color="#6A4C93"/>
    </linearGradient>
    <filter id="mc-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="mc-glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <g id="bg-layer">
    <!-- Cave ceiling background -->
    <rect width="800" height="600" fill="url(#mc-sky)"/>

    <!-- Cave ceiling opening with moonlight -->
    <path d="M250 0 Q280 50 320 70 Q380 90 400 85 Q420 90 480 70 Q520 50 550 0 Z" fill="#0a0a22" opacity="0.95"/>

    <!-- Moon in cave opening -->
    <circle cx="400" cy="40" r="32" fill="url(#mc-moon)" opacity="0.9"/>
    <circle cx="400" cy="40" r="18" fill="#FFFACD" opacity="0.92"/>
    <circle cx="412" cy="35" r="14" fill="#0a0a22" opacity="0.8"/>

    <!-- Moonlight rays entering cave -->
    <g opacity="0.15" fill="#87CEEB">
      <polygon points="350,90 370,300 390,90"/>
      <polygon points="410,90 430,300 410,90"/>
      <polygon points="470,90 490,300 510,90"/>
    </g>

    <!-- Stalactites from ceiling -->
    <g fill="#151540" opacity="0.95">
      <path d="M20 0 L20 75 Q40 95 60 55 Q75 100 100 45 Q120 90 150 35 Q170 75 200 0 Z"/>
      <path d="M200 0 L200 50 Q225 85 255 30 Q275 70 305 0 Z"/>
      <path d="M500 0 L500 60 Q530 100 560 45 Q580 85 610 30 Q640 75 670 0 Z"/>
      <path d="M670 0 L670 70 Q695 110 720 50 Q745 95 770 35 Q795 65 800 0 Z"/>
    </g>

    <!-- Cave walls texture -->
    <path d="M0 70 Q0 200 20 350 Q30 450 0 600 L0 0 Z" fill="#0a0a22" opacity="0.9"/>
    <path d="M800 70 Q800 200 780 350 Q770 450 800 600 L800 0 Z" fill="#0a0a22" opacity="0.9"/>
  </g>

  <!-- Middle Layer -->
  <g id="mid-layer">
    <!-- Large crystal pillars with faceted design -->
    <g filter="url(#mc-glow)">
      <!-- Crystal pillar 1 (left, blue) -->
      <polygon points="150,550 140,380 170,380 160,550" fill="url(#mc-crystal-glow1)" opacity="0.8"/>
      <polygon points="140,380 150,370 160,380 150,390" fill="#E0E8F0" opacity="0.7"/>
      <polygon points="160,550 170,560 160,570" fill="#7B68EE" opacity="0.5"/>
      <line x1="155" y1="380" x2="155" y2="550" stroke="#4169E1" stroke-width="1" opacity="0.5"/>

      <!-- Crystal pillar 2 (center-left, teal) -->
      <polygon points="320,555 310,420 340,420 330,555" fill="#20B2AA" opacity="0.75"/>
      <polygon points="310,420 320,408 330,420 320,432" fill="#48D1CC" opacity="0.8"/>
      <polygon points="325,555 335,568 325,575" fill="#008B8B" opacity="0.5"/>
      <line x1="325" y1="420" x2="325" y2="555" stroke="#1E90FF" stroke-width="1" opacity="0.4"/>

      <!-- Crystal pillar 3 (center-right, purple) -->
      <polygon points="480,560 470,390 510,390 500,560" fill="url(#mc-crystal-glow2)" opacity="0.8"/>
      <polygon points="470,390 480,375 500,390 490,405" fill="#B0C4DE" opacity="0.6"/>
      <polygon points="495,560 510,575 500,580" fill="#6A3E8B" opacity="0.5"/>
      <line x1="490" y1="390" x2="490" y2="560" stroke="#9370DB" stroke-width="1" opacity="0.5"/>

      <!-- Crystal pillar 4 (right, blue) -->
      <polygon points="640,555 630,410 660,410 650,555" fill="url(#mc-crystal-glow1)" opacity="0.8"/>
      <polygon points="630,410 640,398 650,410 640,422" fill="#E0E8F0" opacity="0.7"/>
      <polygon points="650,555 660,565 650,570" fill="#7B68EE" opacity="0.5"/>
      <line x1="645" y1="410" x2="645" y2="555" stroke="#4169E1" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Glowing crystal clusters on cave walls -->
    <g filter="url(#mc-glow)">
      <!-- Left wall crystals -->
      <polygon points="60,200 45,160 70,150 85,185" fill="#B0C4DE" opacity="0.65">
        <animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.5s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="30,310 15,275 40,265 55,295" fill="#E0E8F0" opacity="0.7">
        <animate attributeName="opacity" values="0.55;0.9;0.55" dur="1.8s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="80,400 65,360 95,350 110,390" fill="#9370DB" opacity="0.6">
        <animate attributeName="opacity" values="0.45;0.85;0.45" dur="2.2s" repeatCount="indefinite"/>
      </polygon>

      <!-- Right wall crystals -->
      <polygon points="750,220 735,180 765,170 780,210" fill="#C8D8E8" opacity="0.7">
        <animate attributeName="opacity" values="0.55;0.95;0.55" dur="2s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="720,330 705,295 735,285 750,320" fill="#B0C4DE" opacity="0.6">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.6s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="760,440 745,410 775,395 790,425" fill="#E0E8F0" opacity="0.65">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.8s" repeatCount="indefinite"/>
      </polygon>
    </g>

    <!-- Underground pool with reflections -->
    <ellipse cx="500" cy="520" rx="130" ry="40" fill="url(#mc-pool)" opacity="0.85"/>
    <!-- Pool shimmer highlight -->
    <ellipse cx="480" cy="515" rx="40" ry="8" fill="#7BAFD4" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="540" cy="525" rx="25" ry="6" fill="#6495ED" opacity="0.3">
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.7s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Moonstone pebbles (small glowing circles) -->
    <g filter="url(#mc-glow-sm)" fill="#B0C4DE" opacity="0.7">
      <circle cx="100" cy="500" r="3">
        <animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="220" cy="510" r="2.5">
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="380" cy="515" r="3">
        <animate attributeName="opacity" values="0.4;0.85;0.4" dur="2.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="620" cy="505" r="2.5">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="730" cy="520" r="3">
        <animate attributeName="opacity" values="0.6;0.95;0.6" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Luminescent moss patches -->
    <g filter="url(#mc-glow-sm)" opacity="0.6">
      <ellipse cx="200" cy="480" rx="35" ry="18" fill="#20B2AA"/>
      <ellipse cx="600" cy="490" rx="40" ry="20" fill="#20B2AA"/>
      <ellipse cx="380" cy="450" rx="30" ry="15" fill="#3CB371"/>
    </g>
  </g>

  <!-- Foreground Layer -->
  <g id="fg-layer">
    <!-- Cave floor -->
    <path d="M0 480 Q100 460 200 475 Q300 465 400 470 Q500 460 600 475 Q700 465 800 480 L800 600 L0 600 Z" fill="url(#mc-cave-floor)"/>

    <!-- Winding path through crystals -->
    <path d="M350 600 Q340 540 380 490 Q420 450 400 400 Q380 360 420 320 Q440 300 420 280" fill="none" stroke="#3a3a7a" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
    <path d="M350 600 Q340 540 380 490 Q420 450 400 400 Q380 360 420 320 Q440 300 420 280" fill="none" stroke="#4a5a8a" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

    <!-- Crystal shards on floor -->
    <g opacity="0.65" stroke="#B0C4DE" stroke-width="1">
      <polygon points="150,530 160,520 170,535" fill="#87CEEB" opacity="0.5"/>
      <polygon points="250,550 265,540 280,555" fill="#9370DB" opacity="0.5"/>
      <polygon points="500,545 515,530 530,548" fill="#6495ED" opacity="0.5"/>
      <polygon points="650,540 665,525 680,540" fill="#87CEEB" opacity="0.5"/>
      <polygon points="400,560 415,550 425,565" fill="#20B2AA" opacity="0.5"/>
    </g>

    <!-- Bioluminescent mushrooms glowing -->
    <g filter="url(#mc-glow-sm)">
      <!-- Mushroom cluster 1 -->
      <rect x="145" y="485" width="5" height="15" rx="2" fill="#1a6a5a"/>
      <ellipse cx="147" cy="485" rx="11" ry="8" fill="#20B2AA" opacity="0.8">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Mushroom cluster 2 -->
      <rect x="230" y="495" width="4" height="12" rx="2" fill="#1a6a5a"/>
      <ellipse cx="232" cy="495" rx="9" ry="7" fill="#9370DB" opacity="0.75">
        <animate attributeName="opacity" values="0.55;0.95;0.55" dur="2.1s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Mushroom cluster 3 -->
      <rect x="370" y="475" width="5" height="14" rx="2" fill="#1a6a5a"/>
      <ellipse cx="372" cy="475" rx="11" ry="8" fill="#20B2AA" opacity="0.8">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Mushroom cluster 4 -->
      <rect x="550" y="490" width="4" height="12" rx="2" fill="#1a6a5a"/>
      <ellipse cx="552" cy="490" rx="9" ry="7" fill="#3CB371" opacity="0.75">
        <animate attributeName="opacity" values="0.55;0.95;0.55" dur="2s" repeatCount="indefinite"/>
      </ellipse>

      <!-- Mushroom cluster 5 -->
      <rect x="700" y="485" width="3" height="10" rx="1" fill="#1a6a5a"/>
      <ellipse cx="701" cy="485" rx="7" ry="6" fill="#20B2AA" opacity="0.7">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.2s" repeatCount="indefinite"/>
      </ellipse>
    </g>

    <!-- Dripping stalactites with water drops -->
    <g opacity="0.5" stroke="#87CEEB" stroke-width="2" fill="none">
      <line x1="100" y1="200" x2="100" y2="480"/>
      <line x1="400" y1="150" x2="400" y2="480"/>
      <line x1="700" y1="180" x2="700" y2="480"/>
    </g>
    <g opacity="0.6" fill="#87CEEB">
      <circle cx="100" cy="470" r="3">
        <animate attributeName="cy" values="480;520;480" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="400" cy="470" r="2.5">
        <animate attributeName="cy" values="480;525;480" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="470" r="3">
        <animate attributeName="cy" values="480;520;480" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Small glowing water pool in foreground -->
    <ellipse cx="250" cy="545" rx="45" ry="18" fill="url(#mc-pool)" opacity="0.7"/>
    <ellipse cx="240" cy="542" rx="18" ry="6" fill="#7BAFD4" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Luminescent moss patches on foreground -->
    <g opacity="0.65" filter="url(#mc-glow-sm)">
      <ellipse cx="180" cy="520" rx="28" ry="14" fill="#20B2AA"/>
      <ellipse cx="520" cy="530" rx="32" ry="16" fill="#3CB371"/>
      <ellipse cx="680" cy="510" rx="25" ry="12" fill="#20B2AA"/>
    </g>

    <!-- Foreground sparkle particles -->
    <g fill="#B0C4DE" opacity="0.8">
      <circle cx="200" cy="320" r="2">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="400" cy="350" r="2.5">
        <animate attributeName="opacity" values="0.4;0.95;0.4" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="300" r="2">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="450" r="2">
        <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="550" cy="420" r="2.5">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="350" cy="500" r="2">
        <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.9s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
