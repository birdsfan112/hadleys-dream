<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sf-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="40%" stop-color="#b8e8d4"/>
      <stop offset="100%" stop-color="#a8e6cf"/>
    </linearGradient>
    <radialGradient id="sf-sun" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFFACD"/>
      <stop offset="60%" stop-color="#FFE4B5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sf-hill-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ed9a0"/>
      <stop offset="100%" stop-color="#5ebf82"/>
    </linearGradient>
    <linearGradient id="sf-hill-main1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bc48d"/>
      <stop offset="100%" stop-color="#4da872"/>
    </linearGradient>
    <linearGradient id="sf-hill-main2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78d98a"/>
      <stop offset="100%" stop-color="#5ebf7a"/>
    </linearGradient>
    <radialGradient id="sf-tree-canopy" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#5ebf82"/>
      <stop offset="70%" stop-color="#45b874"/>
      <stop offset="100%" stop-color="#3eaa6a"/>
    </radialGradient>
    <filter id="sf-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sf-soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <g id="bg-layer">
    <!-- Sky -->
    <rect width="800" height="600" fill="url(#sf-sky)"/>

    <!-- Sun with rays -->
    <g opacity="0.7">
      <line x1="650" y1="50" x2="650" y2="10" stroke="#FFE4B5" stroke-width="3" opacity="0.5"/>
      <line x1="690" y1="70" x2="710" y2="50" stroke="#FFE4B5" stroke-width="3" opacity="0.5"/>
      <line x1="610" y1="70" x2="590" y2="50" stroke="#FFE4B5" stroke-width="3" opacity="0.5"/>
      <line x1="700" y1="30" x2="730" y2="30" stroke="#FFE4B5" stroke-width="3" opacity="0.5"/>
      <line x1="600" y1="30" x2="570" y2="30" stroke="#FFE4B5" stroke-width="3" opacity="0.5"/>
    </g>
    <circle cx="650" cy="80" r="55" fill="url(#sf-sun)"/>
    <circle cx="650" cy="80" r="25" fill="#FFFACD" opacity="0.95"/>

    <!-- Clouds with varied opacity -->
    <g opacity="0.65" fill="white">
      <ellipse cx="150" cy="75" rx="65" ry="28"/>
      <ellipse cx="190" cy="65" rx="45" ry="22"/>
      <ellipse cx="115" cy="70" rx="40" ry="20"/>
    </g>
    <g opacity="0.5" fill="white">
      <ellipse cx="500" cy="110" rx="55" ry="24"/>
      <ellipse cx="545" cy="100" rx="40" ry="20"/>
    </g>

    <!-- Distant purple mountain silhouettes -->
    <ellipse cx="250" cy="330" rx="320" ry="110" fill="#9370DB" opacity="0.35"/>
    <ellipse cx="550" cy="320" rx="300" ry="105" fill="#8A5BB8" opacity="0.3"/>

    <!-- Far distant hills -->
    <ellipse cx="200" cy="380" rx="300" ry="120" fill="#7ed9a0" opacity="0.5"/>
    <ellipse cx="600" cy="400" rx="350" ry="130" fill="#7ed9a0" opacity="0.45"/>
  </g>

  <!-- Middle Layer -->
  <g id="mid-layer">
    <!-- Main hills with texture -->
    <ellipse cx="400" cy="480" rx="500" ry="180" fill="url(#sf-hill-main1)"/>
    <ellipse cx="100" cy="500" rx="250" ry="150" fill="url(#sf-hill-main2)"/>
    <ellipse cx="700" cy="490" rx="280" ry="160" fill="url(#sf-hill-main2)"/>

    <!-- Stream/creek with shimmer -->
    <path d="M380 600 Q350 520 400 460 Q450 400 380 340" fill="none" stroke="#87CEEB" stroke-width="20" stroke-linecap="round" opacity="0.6"/>
    <path d="M380 600 Q350 520 400 460 Q450 400 380 340" fill="none" stroke="#b8e8d4" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <path d="M380 600 Q350 520 400 460 Q450 400 380 340" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

    <!-- Back tree cluster left -->
    <g opacity="0.8">
      <rect x="60" y="300" width="16" height="80" rx="4" fill="#8B6F47"/>
      <circle cx="68" cy="280" r="42" fill="url(#sf-tree-canopy)"/>
      <circle cx="48" cy="295" r="30" fill="#3eaa6a"/>
      <circle cx="88" cy="295" r="30" fill="#3eaa6a"/>
      <circle cx="68" cy="258" r="25" fill="#5ebf82"/>
    </g>

    <!-- Back tree cluster right -->
    <g opacity="0.8">
      <rect x="690" y="310" width="16" height="75" rx="4" fill="#8B6F47"/>
      <circle cx="698" cy="290" r="40" fill="url(#sf-tree-canopy)"/>
      <circle cx="680" cy="305" r="28" fill="#3eaa6a"/>
      <circle cx="716" cy="305" r="28" fill="#3eaa6a"/>
      <circle cx="698" cy="260" r="23" fill="#5ebf82"/>
    </g>

    <!-- Main left tree with fairy lights -->
    <rect x="45" y="340" width="22" height="130" rx="6" fill="#7a5c3a"/>
    <circle cx="56" cy="305" r="55" fill="url(#sf-tree-canopy)"/>
    <circle cx="35" cy="325" r="40" fill="#3eaa6a"/>
    <circle cx="77" cy="325" r="40" fill="#34935c"/>
    <circle cx="56" cy="285" r="35" fill="#5ebf82"/>
    <circle cx="56" cy="265" r="25" fill="#45b874"/>
    <!-- Fairy lights on left tree -->
    <g filter="url(#sf-glow)" fill="#FFD700" opacity="0.8">
      <circle cx="40" cy="300" r="3.5"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="310" r="3"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="50" cy="330" r="3.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
      <circle cx="65" cy="345" r="3"><animate attributeName="opacity" values="0.6;0.95;0.6" dur="1.6s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Main right tree -->
    <rect x="695" y="350" width="20" height="125" rx="6" fill="#7a5c3a"/>
    <circle cx="705" cy="315" r="52" fill="url(#sf-tree-canopy)"/>
    <circle cx="682" cy="335" r="36" fill="#34935c"/>
    <circle cx="728" cy="335" r="36" fill="#34935c"/>
    <circle cx="705" cy="295" r="32" fill="#5ebf82"/>
    <!-- Fairy lights on right tree -->
    <g filter="url(#sf-glow)" fill="#FFD700" opacity="0.75">
      <circle cx="690" cy="310" r="3"><animate attributeName="opacity" values="0.4;0.95;0.4" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="720" cy="320" r="3.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="345" r="3"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Middle tree -->
    <rect x="385" y="315" width="18" height="95" rx="5" fill="#8B6F47"/>
    <circle cx="394" cy="285" r="48" fill="url(#sf-tree-canopy)"/>
    <circle cx="368" cy="300" r="35" fill="#3eaa6a"/>
    <circle cx="420" cy="300" r="35" fill="#3eaa6a"/>
    <circle cx="394" cy="265" r="28" fill="#45b874"/>

    <!-- Ferns cluster -->
    <g fill="#5ebf82" opacity="0.7">
      <path d="M250 420 L245 410 L248 420 L240 415 L250 420"/>
      <path d="M260 425 L254 412 L258 425 L250 418 L260 425"/>
    </g>
  </g>

  <!-- Foreground Layer -->
  <g id="fg-layer">
    <!-- Ground -->
    <rect x="0" y="470" width="800" height="130" fill="#4da872"/>

    <!-- Mossy stepping stones along stream -->
    <ellipse cx="385" cy="560" rx="14" ry="6" fill="#5ebf82" opacity="0.5"/>
    <ellipse cx="370" cy="520" rx="12" ry="5" fill="#4da872" opacity="0.45"/>
    <ellipse cx="395" cy="480" rx="13" ry="5.5" fill="#5ebf82" opacity="0.4"/>
    <ellipse cx="410" cy="440" rx="11" ry="5" fill="#4da872" opacity="0.35"/>

    <!-- Wildflowers scattered throughout -->
    <g>
      <!-- Pink flowers -->
      <circle cx="140" cy="520" r="7" fill="#FF69B4"/><circle cx="140" cy="520" r="3" fill="#FFD700"/>
      <circle cx="450" cy="535" r="6" fill="#FF1493"/><circle cx="450" cy="535" r="2.5" fill="#FFE4B5"/>
      <circle cx="120" cy="545" r="7" fill="#FFB6C1"/><circle cx="120" cy="545" r="3" fill="#FFD700"/>

      <!-- Purple flowers -->
      <circle cx="250" cy="530" r="6" fill="#DDA0DD"/><circle cx="250" cy="530" r="2.5" fill="#FFE4B5"/>
      <circle cx="580" cy="520" r="7" fill="#9370DB"/><circle cx="580" cy="520" r="3" fill="#FFE4B5"/>

      <!-- Red flowers -->
      <circle cx="480" cy="525" r="7" fill="#FF6347"/><circle cx="480" cy="525" r="3" fill="#FFD700"/>
      <circle cx="680" cy="540" r="6" fill="#DC143C"/><circle cx="680" cy="540" r="2.5" fill="#FFE4B5"/>

      <!-- Blue flowers -->
      <circle cx="620" cy="535" r="6" fill="#87CEEB"/><circle cx="620" cy="535" r="2" fill="#FFF"/>
      <circle cx="340" cy="540" r="6" fill="#6495ED"/><circle cx="340" cy="540" r="2.5" fill="#FFD700"/>

      <!-- Yellow flowers -->
      <circle cx="550" cy="515" r="5" fill="#FFD700"/><circle cx="550" cy="515" r="2" fill="#FFF"/>
      <circle cx="300" cy="550" r="6" fill="#FFEE00"/><circle cx="300" cy="550" r="2.5" fill="#FFF"/>
    </g>

    <!-- Spotted mushrooms in groups -->
    <g>
      <!-- Cluster 1 left -->
      <rect x="165" y="480" width="9" height="20" rx="3" fill="#f0e0c0"/>
      <ellipse cx="169.5" cy="480" rx="18" ry="12" fill="#FF6347"/>
      <circle cx="162" cy="476" r="4" fill="white" opacity="0.8"/>
      <circle cx="177" cy="474" r="3" fill="white" opacity="0.8"/>
      <circle cx="170" cy="483" r="3" fill="white" opacity="0.8"/>

      <!-- Cluster 1b -->
      <rect x="195" y="495" width="7" height="16" rx="2" fill="#f0e0c0"/>
      <ellipse cx="198" cy="495" rx="14" ry="10" fill="#FF69B4"/>
      <circle cx="192" cy="493" r="2.5" fill="white" opacity="0.7"/>
      <circle cx="204" cy="492" r="2" fill="white" opacity="0.7"/>

      <!-- Cluster 2 right -->
      <rect x="580" y="495" width="8" height="18" rx="2" fill="#f0e0c0"/>
      <ellipse cx="584" cy="495" rx="16" ry="11" fill="#FF69B4"/>
      <circle cx="577" cy="493" r="3" fill="white" opacity="0.8"/>
      <circle cx="591" cy="492" r="2.5" fill="white" opacity="0.8"/>

      <!-- Cluster 2b -->
      <rect x="610" y="510" width="6" height="14" rx="2" fill="#f0e0c0"/>
      <ellipse cx="613" cy="510" rx="12" ry="9" fill="#DDA0DD"/>
      <circle cx="608" cy="508" r="2" fill="white" opacity="0.7"/>
      <circle cx="618" cy="507" r="1.5" fill="white" opacity="0.7"/>

      <!-- Cluster 3 center -->
      <rect x="305" y="500" width="6" height="12" rx="2" fill="#f0e0c0"/>
      <ellipse cx="308" cy="500" rx="11" ry="8" fill="#DDA0DD"/>
      <circle cx="303" cy="498" r="2" fill="white" opacity="0.7"/>
      <circle cx="313" cy="497" r="1.5" fill="white" opacity="0.7"/>
    </g>

    <!-- Grass tufts along path edge -->
    <g fill="#5ebf82" opacity="0.8">
      <path d="M320 470 L325 450 L330 470"/>
      <path d="M330 470 L336 448 L342 470"/>
      <path d="M500 465 L506 443 L512 465"/>
      <path d="M510 465 L517 441 L524 465"/>
    </g>

    <!-- Fallen leaves scattered -->
    <g opacity="0.6" fill="#FF6347">
      <ellipse cx="200" cy="510" rx="5" ry="3" transform="rotate(25 200 510)"/>
      <ellipse cx="520" cy="528" rx="4.5" ry="2.8" transform="rotate(-15 520 528)"/>
      <ellipse cx="380" cy="545" rx="5" ry="3" transform="rotate(45 380 545)"/>
    </g>
    <g opacity="0.5" fill="#FF8C00">
      <ellipse cx="150" cy="535" rx="4.5" ry="2.8" transform="rotate(60 150 535)"/>
      <ellipse cx="600" cy="510" rx="5" ry="3" transform="rotate(-30 600 510)"/>
    </g>

    <!-- Firefly particles with animated glow -->
    <g filter="url(#sf-soft-glow)" fill="#FFD700" opacity="0.85">
      <circle cx="120" cy="350" r="2.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="280" cy="380" r="2"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="450" cy="320" r="2.5"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="620" cy="360" r="2"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.9s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="450" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="680" cy="420" r="2.5"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="350" cy="430" r="2"><animate attributeName="opacity" values="0.15;0.95;0.15" dur="2.5s" repeatCount="indefinite"/></circle>
    </g>
  </g>
</svg>
