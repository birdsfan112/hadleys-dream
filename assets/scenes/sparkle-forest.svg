<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#b8e8d4"/>
      <stop offset="100%" stop-color="#a8e6cf"/>
    </linearGradient>
    <linearGradient id="hill1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bc48d"/>
      <stop offset="100%" stop-color="#4da872"/>
    </linearGradient>
    <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#88d8a8"/>
      <stop offset="100%" stop-color="#5ebf82"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Sun -->
  <circle cx="650" cy="80" r="60" fill="url(#sun)"/>
  <circle cx="650" cy="80" r="28" fill="#FFF8DC" opacity="0.9"/>

  <!-- Clouds -->
  <g opacity="0.7" fill="white">
    <ellipse cx="150" cy="80" rx="60" ry="25"/>
    <ellipse cx="190" cy="70" rx="40" ry="20"/>
    <ellipse cx="120" cy="75" rx="35" ry="18"/>
    <ellipse cx="500" cy="110" rx="50" ry="22"/>
    <ellipse cx="540" cy="100" rx="35" ry="18"/>
  </g>

  <!-- Far hills -->
  <ellipse cx="200" cy="380" rx="300" ry="120" fill="#7ed9a0" opacity="0.6"/>
  <ellipse cx="600" cy="400" rx="350" ry="130" fill="#7ed9a0" opacity="0.5"/>

  <!-- Main hills -->
  <ellipse cx="400" cy="480" rx="500" ry="180" fill="url(#hill1)"/>
  <ellipse cx="100" cy="500" rx="250" ry="150" fill="url(#hill2)"/>
  <ellipse cx="700" cy="490" rx="280" ry="160" fill="url(#hill2)"/>

  <!-- Ground -->
  <rect x="0" y="500" width="800" height="100" fill="#4da872"/>

  <!-- Winding path -->
  <path d="M380 600 Q350 520 400 460 Q450 400 380 340" fill="none" stroke="#c8a96e" stroke-width="28" stroke-linecap="round" opacity="0.6"/>
  <path d="M380 600 Q350 520 400 460 Q450 400 380 340" fill="none" stroke="#d4b87a" stroke-width="18" stroke-linecap="round" opacity="0.4"/>

  <!-- Back trees -->
  <g opacity="0.7">
    <rect x="80" y="280" width="14" height="70" rx="4" fill="#8B6F47"/>
    <circle cx="87" cy="265" r="35" fill="#5ebf82"/>
    <circle cx="70" cy="275" r="25" fill="#4da872"/>
    <circle cx="104" cy="275" r="25" fill="#4da872"/>

    <rect x="680" y="290" width="14" height="65" rx="4" fill="#8B6F47"/>
    <circle cx="687" cy="275" r="32" fill="#5ebf82"/>
    <circle cx="670" cy="285" r="23" fill="#4da872"/>
    <circle cx="704" cy="285" r="23" fill="#4da872"/>
  </g>

  <!-- Left big tree -->
  <rect x="50" y="340" width="20" height="120" rx="6" fill="#7a5c3a"/>
  <circle cx="60" cy="310" r="50" fill="#3eaa6a"/>
  <circle cx="35" cy="325" r="35" fill="#34935c"/>
  <circle cx="85" cy="325" r="35" fill="#34935c"/>
  <circle cx="60" cy="295" r="30" fill="#45b874"/>

  <!-- Right big tree -->
  <rect x="700" y="350" width="18" height="110" rx="5" fill="#7a5c3a"/>
  <circle cx="709" cy="320" r="46" fill="#3eaa6a"/>
  <circle cx="685" cy="335" r="32" fill="#34935c"/>
  <circle cx="733" cy="335" r="32" fill="#34935c"/>
  <circle cx="709" cy="305" r="28" fill="#45b874"/>

  <!-- Middle tree -->
  <rect x="390" y="310" width="16" height="90" rx="5" fill="#8B6F47"/>
  <circle cx="398" cy="285" r="42" fill="#45b874"/>
  <circle cx="375" cy="298" r="30" fill="#3eaa6a"/>
  <circle cx="420" cy="298" r="30" fill="#3eaa6a"/>

  <!-- Mushrooms -->
  <g>
    <!-- Left mushroom -->
    <rect x="170" y="470" width="8" height="18" rx="3" fill="#f0e0c0"/>
    <ellipse cx="174" cy="470" rx="16" ry="10" fill="#FF6347"/>
    <circle cx="168" cy="467" r="3" fill="white" opacity="0.8"/>
    <circle cx="180" cy="465" r="2" fill="white" opacity="0.8"/>
    <circle cx="174" cy="472" r="2.5" fill="white" opacity="0.8"/>

    <!-- Right mushroom -->
    <rect x="580" y="480" width="6" height="14" rx="2" fill="#f0e0c0"/>
    <ellipse cx="583" cy="480" rx="13" ry="8" fill="#FF69B4"/>
    <circle cx="577" cy="478" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="589" cy="477" r="2" fill="white" opacity="0.8"/>

    <!-- Small mushroom -->
    <rect x="305" y="490" width="5" height="10" rx="2" fill="#f0e0c0"/>
    <ellipse cx="307" cy="490" rx="10" ry="7" fill="#DDA0DD"/>
    <circle cx="303" cy="488" r="2" fill="white" opacity="0.7"/>
    <circle cx="312" cy="487" r="1.5" fill="white" opacity="0.7"/>
  </g>

  <!-- Flowers -->
  <g>
    <circle cx="140" cy="510" r="6" fill="#FF69B4"/><circle cx="140" cy="510" r="2.5" fill="#FFD700"/>
    <circle cx="250" cy="520" r="5" fill="#DDA0DD"/><circle cx="250" cy="520" r="2" fill="#FFE4B5"/>
    <circle cx="480" cy="515" r="6" fill="#FF6347"/><circle cx="480" cy="515" r="2.5" fill="#FFD700"/>
    <circle cx="620" cy="525" r="5" fill="#87CEEB"/><circle cx="620" cy="525" r="2" fill="#FFF"/>
    <circle cx="340" cy="530" r="5" fill="#FFB6C1"/><circle cx="340" cy="530" r="2" fill="#FFD700"/>
    <circle cx="550" cy="505" r="4" fill="#98FB98"/><circle cx="550" cy="505" r="1.5" fill="#FFE4B5"/>
  </g>

  <!-- Sparkle particles -->
  <g filter="url(#glow)" fill="#FFD700" opacity="0.8">
    <circle cx="120" cy="300" r="2.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="350" r="2">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="280" r="2.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="320" r="2">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="400" r="2">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="430" r="2.5">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="520" cy="380" r="2">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="400" r="2.5">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sparkle stars -->
  <g fill="white" opacity="0.6">
    <polygon points="200,250 203,258 211,258 205,263 207,271 200,266 193,271 195,263 189,258 197,258">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="550,270 552,276 558,276 553,280 555,286 550,282 545,286 547,280 542,276 548,276">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="380,220 382,226 388,226 383,230 385,236 380,232 375,236 377,230 372,226 378,226">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>