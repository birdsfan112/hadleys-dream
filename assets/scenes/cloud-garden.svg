<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="cg-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5f5"/>
      <stop offset="50%" stop-color="#f0e0ff"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="cg-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90d4a0"/>
      <stop offset="100%" stop-color="#6abf7b"/>
    </linearGradient>
    <radialGradient id="cg-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#f0e0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="600" fill="url(#cg-sky)"/>

  <!-- Distant tiny stars -->
  <g fill="white" opacity="0.3">
    <circle cx="120" cy="40" r="1.5"/>
    <circle cx="310" cy="65" r="1"/>
    <circle cx="480" cy="30" r="1.5"/>
    <circle cx="650" cy="55" r="1"/>
    <circle cx="730" cy="25" r="1.5"/>
    <circle cx="200" cy="90" r="1"/>
    <circle cx="560" cy="80" r="1"/>
  </g>

  <!-- Far clouds -->
  <g fill="white" opacity="0.4">
    <ellipse cx="100" cy="100" rx="55" ry="20"/>
    <ellipse cx="140" cy="92" rx="40" ry="16"/>
    <ellipse cx="70" cy="95" rx="35" ry="15"/>
    <ellipse cx="600" cy="120" rx="50" ry="18"/>
    <ellipse cx="640" cy="112" rx="38" ry="15"/>
    <ellipse cx="570" cy="115" rx="32" ry="14"/>
  </g>

  <!-- Rainbow arc -->
  <g fill="none" stroke-width="4" opacity="0.4">
    <path d="M150 280 Q400 40 650 280" stroke="#FFB3B3"/>
    <path d="M158 280 Q400 50 642 280" stroke="#FFD9A3"/>
    <path d="M166 280 Q400 60 634 280" stroke="#FFFFB3"/>
    <path d="M174 280 Q400 70 626 280" stroke="#B3FFB3"/>
    <path d="M182 280 Q400 80 618 280" stroke="#B3D9FF"/>
    <path d="M190 280 Q400 90 610 280" stroke="#B3B3FF"/>
    <path d="M198 280 Q400 100 602 280" stroke="#E0B3FF"/>
  </g>

  <!-- Floating island left -->
  <g>
    <!-- Cloud base -->
    <ellipse cx="200" cy="340" rx="80" ry="25" fill="white" opacity="0.85"/>
    <ellipse cx="160" cy="345" rx="45" ry="18" fill="white" opacity="0.75"/>
    <ellipse cx="245" cy="345" rx="50" ry="20" fill="white" opacity="0.75"/>
    <!-- Grass top -->
    <rect x="135" y="318" width="130" height="22" rx="8" fill="url(#cg-grass)"/>
    <!-- Flowers -->
    <line x1="160" y1="318" x2="160" y2="302" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="160" cy="300" r="5" fill="#FF69B4"/>
    <circle cx="160" cy="300" r="2" fill="#FFD700"/>
    <line x1="200" y1="318" x2="200" y2="306" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="200" cy="304" r="4" fill="#DDA0DD"/>
    <circle cx="200" cy="304" r="1.5" fill="#FFE4B5"/>
    <line x1="240" y1="318" x2="240" y2="300" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="240" cy="298" r="5" fill="#FFD700"/>
    <circle cx="240" cy="298" r="2" fill="#FFF"/>
  </g>

  <!-- Floating island right -->
  <g>
    <ellipse cx="600" cy="290" rx="70" ry="22" fill="white" opacity="0.85"/>
    <ellipse cx="560" cy="295" rx="40" ry="16" fill="white" opacity="0.75"/>
    <ellipse cx="640" cy="295" rx="45" ry="18" fill="white" opacity="0.75"/>
    <rect x="545" y="270" width="110" height="20" rx="7" fill="url(#cg-grass)"/>
    <line x1="570" y1="270" x2="570" y2="256" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="570" cy="254" r="4" fill="#FFB7C5"/>
    <circle cx="570" cy="254" r="1.5" fill="#FFF"/>
    <line x1="610" y1="270" x2="610" y2="252" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="610" cy="250" r="5" fill="#9370DB"/>
    <circle cx="610" cy="250" r="2" fill="#FFE4B5"/>
    <line x1="640" y1="270" x2="640" y2="258" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="640" cy="256" r="4" fill="#FF91A4"/>
    <circle cx="640" cy="256" r="1.5" fill="#FFD700"/>
  </g>

  <!-- Small floating island center -->
  <g>
    <ellipse cx="400" cy="220" rx="50" ry="16" fill="white" opacity="0.8"/>
    <ellipse cx="370" cy="224" rx="30" ry="12" fill="white" opacity="0.7"/>
    <ellipse cx="432" cy="223" rx="32" ry="13" fill="white" opacity="0.7"/>
    <rect x="362" y="206" width="76" height="14" rx="5" fill="url(#cg-grass)"/>
    <line x1="390" y1="206" x2="390" y2="194" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="390" cy="192" r="4" fill="#E6E6FA"/>
    <circle cx="390" cy="192" r="1.5" fill="#FFD700"/>
    <line x1="415" y1="206" x2="415" y2="192" stroke="#5a9e6a" stroke-width="2"/>
    <circle cx="415" cy="190" r="5" fill="#FFB6C1"/>
    <circle cx="415" cy="190" r="2" fill="#FFF"/>
  </g>

  <!-- Vine tendrils -->
  <path d="M170 340 Q160 380 175 410" fill="none" stroke="#6abf7b" stroke-width="2" opacity="0.6"/>
  <path d="M230 345 Q240 390 225 420" fill="none" stroke="#6abf7b" stroke-width="2" opacity="0.5"/>
  <path d="M570 295 Q560 330 575 355" fill="none" stroke="#6abf7b" stroke-width="2" opacity="0.6"/>
  <path d="M635 295 Q645 335 630 360" fill="none" stroke="#6abf7b" stroke-width="2" opacity="0.5"/>

  <!-- Foreground cloud platform -->
  <g fill="white">
    <ellipse cx="400" cy="520" rx="250" ry="50" opacity="0.9"/>
    <ellipse cx="250" cy="530" rx="150" ry="40" opacity="0.8"/>
    <ellipse cx="550" cy="530" rx="160" ry="42" opacity="0.8"/>
    <ellipse cx="150" cy="545" rx="120" ry="35" opacity="0.7"/>
    <ellipse cx="650" cy="545" rx="130" ry="36" opacity="0.7"/>
    <rect x="0" y="550" width="800" height="50" fill="white" opacity="0.95"/>
  </g>

  <!-- Animated sparkle particles -->
  <circle cx="180" cy="310" r="2.5" fill="#FFD700" opacity="0.8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="260" r="2" fill="#DDA0DD" opacity="0.6">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="200" r="2.5" fill="#FFB7C5" opacity="0.7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="450" r="2" fill="#E6E6FA" opacity="0.5">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="480" r="2.5" fill="#FFD700" opacity="0.6">
    <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="380" r="2" fill="#9370DB" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="350" r="2" fill="#FFB6C1" opacity="0.5">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="350" r="2.5" fill="#E0B3FF" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.3s" repeatCount="indefinite"/>
  </circle>
</svg>