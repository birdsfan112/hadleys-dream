<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <!-- Gradients -->
    <linearGradient id="cg-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9B7DC8"/>
      <stop offset="35%" stop-color="#C4A6E0"/>
      <stop offset="70%" stop-color="#D8C0F0"/>
      <stop offset="100%" stop-color="#E8D5F5"/>
    </linearGradient>
    <radialGradient id="cg-sun" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FFC700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FFB700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cg-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90d4a0"/>
      <stop offset="100%" stop-color="#6abf7b"/>
    </linearGradient>
    <linearGradient id="cg-cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0E5FF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0D0F5" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="cg-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cg-soft-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <g id="bg-layer">
    <!-- Sky gradient -->
    <rect width="800" height="600" fill="url(#cg-sky)"/>

    <!-- Sun with glow -->
    <g opacity="0.7">
      <circle cx="700" cy="120" r="50" fill="#FFD700" opacity="0.25"/>
      <circle cx="700" cy="120" r="35" fill="#FFE700" opacity="0.4"/>
    </g>
    <circle cx="700" cy="120" r="28" fill="url(#cg-sun)"/>
    <circle cx="700" cy="120" r="15" fill="#FFFF99" opacity="0.95"/>

    <!-- Distant mountain peaks through clouds -->
    <g opacity="0.25" fill="#C9B5D4">
      <polygon points="150,300 250,150 350,300"/>
      <polygon points="500,320 600,180 700,320"/>
    </g>

    <!-- Far background clouds - very subtle -->
    <g fill="white" opacity="0.3">
      <ellipse cx="100" cy="180" rx="70" ry="25"/>
      <ellipse cx="150" cy="170" rx="50" ry="20"/>
      <ellipse cx="600" cy="200" rx="65" ry="24"/>
      <ellipse cx="650" cy="190" rx="48" ry="19"/>
    </g>

    <!-- Faint rainbow arc -->
    <g fill="none" stroke-width="3" opacity="0.25">
      <path d="M200 360 Q400 140 600 360" stroke="#FFB3B3"/>
      <path d="M206 366 Q400 150 594 366" stroke="#FFD9A3"/>
      <path d="M212 372 Q400 160 588 372" stroke="#FFFFB3"/>
      <path d="M218 378 Q400 170 582 378" stroke="#B3FFB3"/>
      <path d="M224 384 Q400 180 576 384" stroke="#B3D9FF"/>
      <path d="M230 390 Q400 190 570 390" stroke="#B3B3FF"/>
      <path d="M236 396 Q400 200 564 396" stroke="#E0B3FF"/>
    </g>
  </g>

  <!-- Middle Layer -->
  <g id="mid-layer">
    <!-- Floating cloud island left with gardens -->
    <g>
      <!-- Cloud base structure -->
      <ellipse cx="200" cy="340" rx="95" ry="35" fill="url(#cg-cloud)" opacity="0.9"/>
      <ellipse cx="150" cy="350" rx="60" ry="25" fill="url(#cg-cloud)" opacity="0.8"/>
      <ellipse cx="250" cy="350" rx="65" ry="28" fill="url(#cg-cloud)" opacity="0.8"/>
      <ellipse cx="130" cy="360" rx="45" ry="20" fill="white" opacity="0.7"/>
      <ellipse cx="270" cy="360" rx="50" ry="22" fill="white" opacity="0.7"/>

      <!-- Cloud top garden platform -->
      <rect x="130" y="315" width="140" height="25" rx="10" fill="url(#cg-grass)" opacity="0.95"/>

      <!-- Flower beds on cloud -->
      <line x1="155" y1="315" x2="155" y2="298" stroke="#5a9e6a" stroke-width="2.5"/>
      <circle cx="155" cy="296" r="6" fill="#FF69B4"/>
      <circle cx="155" cy="296" r="2.5" fill="#FFD700"/>

      <line x1="190" y1="315" x2="190" y2="303" stroke="#5a9e6a" stroke-width="2.5"/>
      <circle cx="190" cy="301" r="5" fill="#DDA0DD"/>
      <circle cx="190" cy="301" r="2" fill="#FFE4B5"/>

      <line x1="235" y1="315" x2="235" y2="297" stroke="#5a9e6a" stroke-width="2.5"/>
      <circle cx="235" cy="295" r="6" fill="#FFD700"/>
      <circle cx="235" cy="295" r="2.5" fill="#FFF"/>
    </g>

    <!-- Floating cloud island right -->
    <g>
      <ellipse cx="600" cy="290" rx="85" ry="32" fill="url(#cg-cloud)" opacity="0.9"/>
      <ellipse cx="560" cy="300" rx="55" ry="22" fill="url(#cg-cloud)" opacity="0.8"/>
      <ellipse cx="640" cy="300" rx="60" ry="25" fill="url(#cg-cloud)" opacity="0.8"/>
      <ellipse cx="545" cy="310" rx="42" ry="18" fill="white" opacity="0.7"/>
      <ellipse cx="655" cy="310" rx="48" ry="20" fill="white" opacity="0.7"/>

      <rect x="545" y="268" width="110" height="22" rx="9" fill="url(#cg-grass)" opacity="0.95"/>

      <line x1="570" y1="268" x2="570" y2="254" stroke="#5a9e6a" stroke-width="2.5"/>
      <circle cx="570" cy="252" r="5" fill="#FFB7C5"/>
      <circle cx="570" cy="252" r="2" fill="#FFF"/>

      <line x1="610" y1="268" x2="610" y2="250" stroke="#5a9e6a" stroke-width="2.5"/>
      <circle cx="610" cy="248" r="6" fill="#9370DB"/>
      <circle cx="610" cy="248" r="2.5" fill="#FFE4B5"/>

      <line x1="645" y1="268" x2="645" y2="255" stroke="#5a9e6a" stroke-width="2.5"/>
      <circle cx="645" cy="253" r="5" fill="#FF91A4"/>
      <circle cx="645" cy="253" r="2" fill="#FFD700"/>
    </g>

    <!-- Small floating island center -->
    <g>
      <ellipse cx="400" cy="200" rx="65" ry="22" fill="url(#cg-cloud)" opacity="0.88"/>
      <ellipse cx="370" cy="210" rx="38" ry="16" fill="url(#cg-cloud)" opacity="0.78"/>
      <ellipse cx="430" cy="210" rx="40" ry="17" fill="url(#cg-cloud)" opacity="0.78"/>
      <ellipse cx="355" cy="218" rx="35" ry="14" fill="white" opacity="0.65"/>
      <ellipse cx="445" cy="218" rx="37" ry="15" fill="white" opacity="0.65"/>

      <rect x="355" y="180" width="90" height="20" rx="7" fill="url(#cg-grass)" opacity="0.93"/>

      <line x1="380" y1="180" x2="380" y2="166" stroke="#5a9e6a" stroke-width="2"/>
      <circle cx="380" cy="164" r="5" fill="#E6E6FA"/>
      <circle cx="380" cy="164" r="1.5" fill="#FFD700"/>

      <line x1="415" y1="180" x2="415" y2="164" stroke="#5a9e6a" stroke-width="2"/>
      <circle cx="415" cy="162" r="5" fill="#FFB6C1"/>
      <circle cx="415" cy="162" r="2" fill="#FFF"/>
    </g>

    <!-- Vine bridges connecting clouds -->
    <path d="M170 340 Q180 370 200 390 Q220 370 240 350" fill="none" stroke="#6abf7b" stroke-width="3" opacity="0.6"/>
    <path d="M560 295 Q550 330 520 360 Q540 345 560 320" fill="none" stroke="#6abf7b" stroke-width="3" opacity="0.55"/>
    <path d="M400 220 Q350 260 280 310 Q320 280 380 240" fill="none" stroke="#6abf7b" stroke-width="2.5" opacity="0.5"/>
    <path d="M400 220 Q450 260 520 310 Q480 280 420 240" fill="none" stroke="#6abf7b" stroke-width="2.5" opacity="0.5"/>

    <!-- Waterfalls dripping off cloud edges -->
    <g opacity="0.5" fill="white" stroke="none">
      <path d="M140 365 Q138 380 140 400" stroke="#87CEEB" stroke-width="3" fill="none"/>
      <circle cx="140" cy="370" r="2" fill="#87CEEB" opacity="0.6">
        <animate attributeName="cy" values="370;395;370" dur="2s" repeatCount="indefinite"/>
      </circle>

      <path d="M640 330 Q638 350 640 370" stroke="#87CEEB" stroke-width="3" fill="none"/>
      <circle cx="640" cy="335" r="2" fill="#87CEEB" opacity="0.6">
        <animate attributeName="cy" values="335;360;335" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Foreground Layer -->
  <g id="fg-layer">
    <!-- Main cloud platform (large fluffy base) -->
    <g fill="#E8D5F5" opacity="0.95">
      <ellipse cx="400" cy="520" rx="280" ry="60"/>
      <ellipse cx="250" cy="535" rx="170" ry="45"/>
      <ellipse cx="550" cy="535" rx="180" ry="48"/>
      <ellipse cx="150" cy="550" rx="140" ry="38"/>
      <ellipse cx="650" cy="550" rx="155" ry="42"/>
    </g>

    <!-- Ground platform -->
    <rect x="0" y="550" width="800" height="50" fill="#DCC8EE" opacity="0.96"/>

    <!-- Detailed garden on main cloud -->
    <!-- Flower bed rows -->
    <g>
      <!-- Left flower bed -->
      <rect x="200" y="505" width="60" height="15" rx="3" fill="#E8D4A8" opacity="0.7"/>
      <g fill="none" stroke="#5a9e54" stroke-width="1">
        <line x1="210" y1="505" x2="210" y2="495"/>
        <line x1="220" y1="505" x2="220" y2="492"/>
        <line x1="230" y1="505" x2="230" y2="495"/>
        <line x1="240" y1="505" x2="240" y2="493"/>
        <line x1="250" y1="505" x2="250" y2="494"/>
      </g>
      <g>
        <circle cx="210" cy="493" r="5" fill="#FF69B4"/>
        <circle cx="220" cy="490" r="4" fill="#FFD700"/>
        <circle cx="230" cy="493" r="5" fill="#9999FF"/>
        <circle cx="240" cy="491" r="4" fill="#FF6347"/>
        <circle cx="250" cy="492" r="4.5" fill="#DDA0DD"/>
      </g>

      <!-- Right flower bed -->
      <rect x="540" y="505" width="60" height="15" rx="3" fill="#E8D4A8" opacity="0.7"/>
      <g fill="none" stroke="#5a9e54" stroke-width="1">
        <line x1="550" y1="505" x2="550" y2="495"/>
        <line x1="560" y1="505" x2="560" y2="492"/>
        <line x1="570" y1="505" x2="570" y2="495"/>
        <line x1="580" y1="505" x2="580" y2="493"/>
        <line x1="590" y1="505" x2="590" y2="494"/>
      </g>
      <g>
        <circle cx="550" cy="493" r="4.5" fill="#FFB6C1"/>
        <circle cx="560" cy="490" r="4" fill="#87CEEB"/>
        <circle cx="570" cy="493" r="4.5" fill="#FF69B4"/>
        <circle cx="580" cy="491" r="4" fill="#FFE700"/>
        <circle cx="590" cy="492" r="4" fill="#DDA0DD"/>
      </g>
    </g>

    <!-- Stone path through garden -->
    <g opacity="0.7" fill="#C0C0C0">
      <circle cx="350" cy="510" r="6"/>
      <circle cx="370" cy="520" r="6"/>
      <circle cx="390" cy="515" r="6"/>
      <circle cx="410" cy="525" r="6"/>
      <circle cx="430" cy="518" r="6"/>
      <circle cx="450" cy="528" r="6"/>
    </g>

    <!-- Fountain with sparkle -->
    <g opacity="0.85">
      <circle cx="400" cy="490" r="18" fill="#D3D3D3" stroke="#A9A9A9" stroke-width="2"/>
      <circle cx="400" cy="485" r="12" fill="#87CEEB" opacity="0.6"/>
      <path d="M400 485 Q390 475 385 468" fill="none" stroke="#87CEEB" stroke-width="2" opacity="0.4"/>
      <path d="M400 485 Q410 475 415 468" fill="none" stroke="#87CEEB" stroke-width="2" opacity="0.4"/>
    </g>

    <!-- Fountain sparkle particles -->
    <g filter="url(#cg-soft-glow)" fill="#87CEEB" opacity="0.7">
      <circle cx="390" cy="475" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="410" cy="470" r="1.5"><animate attributeName="opacity" values="0.5;0.95;0.5" dur="1.8s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Hanging flower vines from above -->
    <g opacity="0.6" stroke="#6abf7b" stroke-width="2" fill="none">
      <path d="M200 480 Q190 500 200 520"/>
      <path d="M600 485 Q615 505 600 525"/>
    </g>
    <g opacity="0.65">
      <circle cx="195" cy="490" r="4" fill="#FF69B4"/>
      <circle cx="205" cy="510" r="4" fill="#DDA0DD"/>
      <circle cx="610" cy="495" r="4" fill="#FFB7C5"/>
      <circle cx="600" cy="515" r="4" fill="#FF69B4"/>
    </g>

    <!-- Dewdrop decorations -->
    <g filter="url(#cg-glow)" fill="#87CEEB" opacity="0.6">
      <circle cx="310" cy="495" r="3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="480" cy="510" r="2.5"><animate attributeName="opacity" values="0.5;0.95;0.5" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="350" cy="505" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="520" cy="495" r="2.5"><animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Butterfly silhouettes -->
    <g opacity="0.65" fill="#FF69B4">
      <ellipse cx="250" cy="400" rx="6" ry="4" transform="rotate(-25 250 400)"/>
      <ellipse cx="260" cy="400" rx="6" ry="4" transform="rotate(25 260 400)"/>
      <line x1="255" y1="395" x2="255" y2="405" stroke="#333" stroke-width="1"/>

      <ellipse cx="550" cy="380" rx="5" ry="3.5" transform="rotate(-20 550 380)" fill="#FFD700"/>
      <ellipse cx="560" cy="380" rx="5" ry="3.5" transform="rotate(20 560 380)" fill="#FFD700"/>
      <line x1="555" y1="375" x2="555" y2="385" stroke="#333" stroke-width="1"/>
    </g>

    <!-- Meadow sparkle particles -->
    <g filter="url(#cg-glow)" fill="#FFD700" opacity="0.75">
      <circle cx="180" cy="440" r="2" ><animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="460" r="2.5"><animate attributeName="opacity" values="0.4;0.95;0.4" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="500" cy="450" r="2"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="650" cy="440" r="2.5"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
    </g>
  </g>
</svg>
